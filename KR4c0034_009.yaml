body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及碑銘五首唐故揚州慶雲寺律師一公塔銘並序福州都督府新學碑銘舒州山谷寺覺敘塔隋故鏡智禪師碑銘舒州山谷寺上方禪門第三祖璨大師塔銘山谷寺覺寂塔禪門第三祖鏡智禪師塔碑陰文懷玉案以上二篇皆非公作蓋就録碑文牽連誤入者姑如原本以俟後考唐故揚州慶雲寺律師一公塔銘並序公諱靈一俗姓吳廣陵人也神英華作膚淸氣和方寸地靈一作虛與太初元精四字英華作自然妙有合其純粹聞思修惠介然生知九歲出家三千斷結英華作髮嚴持律藏將紹法寶示人英華作入文學以誘英華作誇世智初不計英華作詳身中有我我中有身德充報圓緣斷相滅寶應元年冬十月十六日終於杭州龍興寺春秋三十有六臨滅顧命以香木茶毗為送終之節門弟子虔奉遺旨粵以是月某日焚身於某山起塔於某原從拘尸城之制也右補闕趙郡李紓殿中丞侍御史頓邱李湯嘗以文字言語遊公廊廡至是相與追録遺懿以詒塵劫謂公貞靜直方淵遠宏大而密識洞鑒天倪道機注不滿酌不竭沖如也自受生至於出家貪恚不入念哀樂不見色自出家至於涅槃六根不染欲界之塵自知道至於返真雙履不踐居士之門公之嚴持也初公之先世為富家既削髮推萬金之産悉以讓諸孤昆季所取者唯衲衣錫杖及身而三捨七界五欲如棄涕唾公之純白也其所底止必擇山間樹下無塵垢之地初舍于會稽南山之南懸澑寺焉與禪宗之達者釋隱空虔印靜虛相與討十二部經第一義諦之旨既辨惑徙居餘杭宜豐寺鄰靑山對佳境以嶺松澗石為梵宇竹風月露為丈室超然獨往與法印俱自是師資兩忘空色皆遣暴風偃山而正智不動巨浪沃日而浮囊自安於是著法性論以究實諦公之懸解也公智刃先覺法施無方每禪誦之隟輒賦詩歌事思入無間興含飛動潘阮之遺韻江謝之闕文公能綴之蓋將吻合詞林與儒墨同其波流然後循循善誘指以學路由是與天台道士潘淸廣陵曹評趙郡李華潁川韓極中山劉穎襄陽朱放趙郡李紓頓邱李湯南陽張繼安定皇甫冉范陽張南史淸河房從心相與為塵外之友講德味道朗詠終日其終篇必博之以聞約之以修量其根之上下而投之以法味欲使俱入不二法流公示教之攘門也內張天機外與物接捨法無我以虛受人曠焉若空谷之響止水之像優而柔之使自得之其道樞未始不無為也而飮其和者亦虛而來實而歸明徵其所以然則不得其朕公應之無涯也宜豐寺地臨高隅初無井泉公之戾止有靈泉呀然而涌噴金沙之澑于禪庭左右挹之彌淸㪺之無窮公精至感物也嗚呼日發天啓壽量彼一劫住世聖道以拯拔喪得大雲而涼大宅其公乎自日發以下至此似有訛脫吁嗟昊穹奪我善友使生不極其涯道不竟其源豈前已就諸有可出將轉現他方乎為應化之始終法身之去來非思議所及乎凡今學徒戒歸若涉大水而無梁抽毫強名以志陳迹自知道至於返真雙舄不踐居士之門六根不染欲界之塵學無常師悟不以漸內以了因證心果外以惠用接物與止水空谷同其應和而法施不住天機無方精義元言或形於章句騷雅之遺韻陶謝之缺文公能綴之其終篇必以了義傳約和者量其根之上下而投以法味飽其風者亦虛而來實而歸或以足言言必緣情一緣則萬緣作而諸相見無乃不可乎日佛法自利他不係於權實將善誘之心咱和之固日示入固波可也公乂嘗謂無生正位實相宗本二乘所感談者莫究於是著法性論以辨之而迦葉後問惠遠奧旨騞焉疑斷渙若冰釋者是以為向使大啓壽量好務宏道則法王度聞非公孰寄嗚呼生不極其涯道不竟其源豈應物之緣住世之數止於是乎為世緯之始終報身之去來非思議之所及乎淸塵緬然學者安仰若涉大水而無舟航儒生強名以志陳迹懷玉桉自知道至於返真見於英華者如此然中間字句似有訛誤須俟續考其銘曰銘詞似有脫句用韻處前後亦有錯誤據英華改正示生英華作茫茫五濁愛習如債何以為師尸羅之戒卓爾上士英華作立志一念識滅萬法英華作於焉懸解名離性空破魔結壞八字英華作持佛密藏俾道勿壞穎脫諸有獄視三界上德不器大道英華作言無方天縱之文亦和其光登彼蒙童英華作求啓迪思量我今令入英華作我皆令發直心道場奈何法船今也則亡適來豈逆英華作時適去豈順施及未普天胡英華作乎不憖飛鳥無迹法雷罷震福庭空虛來者曷問言之糟粕留為祕印福州都督府新學碑銘世與道交相興喪宏之者在人非庚桑楚不能使崴􅕲莊子作畏壘大壤向化化字據英華補唯文翁蜀學不崇閩中無儒家流成公至而俗易民賴德施古今一也初成公之始至也未及下車禮先聖先師退而嘆堂室湫狹教英華作斆學荒墜懼鼓篋之道寢子襟之詩作我是以易其地大其制新其棟宇盛其俎豆俎豆既修乃以五經訓民考教必精弦誦必時於是一年人知敬學二年學者功倍三年而生徒祁祁賢不肖競勸家有洙泗戶有鄒魯儒風濟濟被於庶政大歷十年歲在甲寅秋九月公薨于位於是羣吏庶民耆儒諸生雨泣廟門之外若有望而不至號曰豈天不欲斯文之漸漬于東甌之人歟不然何錫厥教英華無教字化而不遐公之年也吾黨瞪然嗚呼曷歸判官膳部員外郎兼侍御史安定皇甫政殿中侍御史潁川韓贄監察御史河南長孫繪率門人部從事州佐縣尹相與議以公之功績明示後世謂及嘗同司諫之列宜僃知盛德善政見託論撰以實録刻石曰公諱椅字某皇帝之諸父宗室之才子寬裕愷悌孝慈忠敬莊而成式文而強力治王氏易左氏春秋酌其精義以輔儒行故居處執事著書屬詞非周孔軌躅不踐也天寶三載應選部辨論為安陽英華有縣字尉中興之後歷御史尚書郎諌議大夫給事中十餘年間周歷三臺言中彝倫動中大本上交不諂下交不瀆家貧不樂淸近求為京兆少尹無何出守宏農宏農人和英華無此四字移上有又字移典華陰兼御史中丞華陰之近者安遠者來天子以為才任四嶽十二牧之職大歷七年冬十有一月加御史大夫持節都督福建泉漳汀五州軍事領觀察處置都團練英華作防禦等使八年夏四月龍旗六轡至自京師閩越舊風機巧剽輕資貨産利與巴蜀埒富猶有無諸餘善之遺俗號為英華作日難治公將治之也考禮正刑節用愛人頒賦遣役必齊其勞逸視年豐耗量入以制用削去事之煩苛法之掊克者使吏不奉職民不帥教則懲以薄刑俾浸遷善由是人知方矣公將安之也初哥舒晃反書至公履英華作屨及於門遽命上將帥戈船下瀨之師西與鍾陵軍會先拔循潮二州以援番禺推誠誓衆士皆奮勇既而大憝就戮五嶺砥定民是以康繄我師是賴八無姦宄寇賊之虞矣公將教之也考頖宮之制作為此學而寓政焉躬率羣吏之稍食與贖刑之餘羡以僃經營之費而不溷於民也先師寢廟七十子之像在東序講堂書室函丈之席在西序齒胄之位列于廊廡之左右每歲二月上丁習舞釋菜先三日公齋戒肄禮命博士率胄子修祝嘏陳祭典釋菜之日舋器用幣籩豆在堂樽罍在阼公元端赤舄正詞陳信是日舉士士上英華有學字之版視其藝之上下審問愼思使知不足教之導之講論以勗之八月上丁如初禮歲終博士以遜業之勤惰覃思之精粗告於公斂其才者進其等而貢之于宗伯將進必以鄉飮酒禮禮之賓主三揖受爵于兩壺之間堂下樂作歌以發德鹿鳴南陔由庚嘉魚南山有臺以將其厚意由是海濱榮之人英華無人字以不學為恥州縣之教達於鄉黨鄉黨之教達於衆庶矣公薨之明英華無二字年太常議按公叔發修衛國之班制以交四鄰故易其名曰文孔文叔其勤于公家夙夜不懈衛人銘其彝鼎以公尊教而勸學德洽荒服乃奏諡曰成詔贈禮部尚書而刻金石之禮則闕而未僃今也敢播德馨貽之無窮其銘曰公之文肅恭且仁宣力事君潤飾經術砥綏斯民公之武鰥寡不侮剛亦不吐率師勤王戡厥醜虜公之移風經始頖宮百堵皆興孔堂崇崇四科以班乃侯乃公秩秩祀典鏘鏘禮容大昕鼓徵英華作篋學士萃止褒衣方屨登降以齒從公于邁樂我泮水我廛我里講誦英華作論資始比屋為儒俊選英華作造如林縵胡之纓化為靑襟公宜難老為學者司南女金反板英華作斜日告凶實天匪忱翽翽和鸞兮不聞遺音願言思公兮如玉如金鏤餘烈于此石以塞罷市者之心舒州山谷寺覺寂塔隨故鏡智禪師碑銘並序按前志禪師號僧璨不知何許人也文粹無也字出見于周隨間傳教于惠可大師摳衣于鄴中得道于司空山謂身相非真故示有英華作以瘡疾謂英華無此字法無我所文粹作師故居不擇地以衆生病為病故所至必説法度人以一相不在內外不在其文粹無此三字中間故足英華作必言不以文字其教大略以寂照妙用攝文粹有羣品二字流注生滅觀四維上下不見法不見身不見心乃至心離名字身等空界法同夢幻亦文粹無亦字無得無證然後謂之解脫禪門英華作禪師門非文粹作禪師是率是道也上膺付囑下拯昏疑大雲垂陰國土為文粹作皆化謂南方教所未至我是以有羅浮之行其來不來也其去無英華作不去也既而以袈裟與法俱付悟者道存形謝遺骨此山今二百歲矣皇帝即位後五年歲次庚戌及剖符是州登禪師遺居周覽陳迹明徴故事其茶毗起塔之制實天寶景戌中別駕前河南少尹趙郡李公常經始之碑版之文隋內史侍郎河東薛公道衡唐相國刑部尚書贈太尉河南房公琯繼論撰之而宏道文粹作尊道英華尊作遵之典易名之禮則朝廷方以多故而未遑也長老比邱釋湛然誦經於靈塔之下與澗松俱老痛先師名氏未經邦國焉與禪衆寺原作等據英華改大律師釋澄俊同寅叶恭亟以為請會是歲嵩嶽大比邱釋惠融至自廣陵勝業寺大比邱釋開悟至自盧江俱纂我禪師後七葉之遺訓日相與歎塔之不命英華作不用命非號之不崇懼像法之本根墜于地也願申無邊衆生之宏誓以抒罔極揚州牧御史大夫張公延賞以狀聞於是七年夏四月上沛然下興廢繼絶之詔册諡禪師曰鏡智塔曰覺寂以大德僧七人灑掃供養天書錫命暉煥崖谷衆庶踴躍謂大乘中興是日大比邱衆議立石於塔東南隅紀英華作正心法興廢之所以然及以為初中國之有佛教自漢孝明始也歷魏晉宋齊施及梁武言第一義諦者不過布施持戒天下惑於報應而人未知禪世與道交相喪至菩提達摩大師始示人以諸佛心要人疑而未思惠可大師傳而持之人思而未修逮禪師三葉其風浸廣真如法味日漸月漬萬木之根莖枝葉悉沐我雨然後空王之密藏二祖之微言始粲然文粹無二字行於世間浹於人心當時問英華作問道於禪師者其淺者知有為法無非妄想深者見佛性于言下如燈之照物朝為凡夫夕為聖賢雙峯大師道信其人也其後信公以教傳宏忍忍公傳慧能神秀能公退而老曹溪其嗣無聞焉文粹無能公下十二字秀公傳普寂寂公之門徒萬文粹有人字升堂者六十有三得自在慧者一曰宏正正公之廊廡龍象又倍焉英華無焉字或化嵩洛或之荊吳自是心教之被於世也與六籍侔盛英華有焉字於戲微禪師吾其二乘矣後代何述焉庸詎知禪師之下生不為諸佛故現比邱身以救濁劫乎亦由堯舜既往周公制禮仲尼述之英華作既沒遊夏宏之使高堂后蒼徐孟戴慶之徒英華作流可得而祖焉夫天以聖賢所振為木鐸其揆一也諸公以為司馬子長立夫子世家謝臨川撰慧遠法師碑銘英華有今字將令千載之後知先師之全身禪門之權輿王命之丕顯英華作追崇在此山也則揚其風紀其時宜在法流及嘗英華作當非味禪師之道也久故不讓其銘曰衆生佛性莫匪宿植文粹作人之靜性與生偕植知誘于外染英華作率為妄識如浪斯鼓與風動息淫騃貪怒為刃為賊生死有涯緣起無極如來憫之為闢度門即妄了真以證英華作正覺源啓迪心印貽我後昆間生禪師俾以教尊二十八世迭付微言自摩訶迦葉以佛所付心法遞相傳至師子比邱凡二十五世自達摩大師至禪師凡三世共二十八世如如禪師膺期宏宣世溷法滅獨與英華作以道全周武帝下令滅佛法禪師隨可大師隱遁司空山十有三年童蒙來求我以意傳攝相歸性法身乃圓性身本空我無文粹作為説焉如如禪師道既棄世將三十紀妙文粹作朝經乃屆皇明昭賁億兆膜拜凡今後學入佛境界於取非取誰縛誰解初禪師謂信公曰汝何求曰求解脫曰誰縛汝誰解汝曰不見縛者不見解者然則何求信公於是言下證解脫知見遂頂禮請益是日禪師授以祖師所傳袈裟萬有千歲此法無英華作不壞舒州山谷寺上方禪門第三祖璨大師塔銘右淮南節度觀察使揚州大都督府長史兼御史大夫張延賞狀得舒州刺史獨孤及狀得僧湛然等狀稱大師遷滅將二百年心法次第天下宗仰秀和尚寂和尚傳其遺言先朝猶特建靈塔且加塔册諡大師為聖賢衣鉢為法門津梁至今分骨之地未沾易名之禮伏恐尊道敬教盛典猶闕今因肅宗文明武德大聖大宣孝皇帝齋忌伏乞準開元中追褒大照等禪師例特加諡號兼賜塔額諸寺抽大德僧一七人灑掃供養冀以功德追福聖靈中書門下牒淮南觀察使牒奉敕宜賜諡號鏡智禪師其塔餘依牒至準敕故牒大歷七年四月二十二日牒中書侍郎平章事元載門下侍郎平章事王縉兵部尚書平章事李使司徒兼中書令使山谷寺覺寂塔禪門第三祖鏡智禪師塔碑陰文嗚呼至聖者遺名久矣而司名者必從而與之其與之何哉尊其道行其教仰不可及故立其象者所不至強為之名名哉非道之縕捨名則道無從得得不得之際其名之寄耶我大師茂其法蛻其身去所染因際世間有幾千二百甲子崇巖未改前川日逝松栝蒼然光景如翳懇乎至誠有求舍利而建塔廟者粲乎實録有徵遺言而立碑頌者於稽其意其慕之滋遠而思之滋深將發明之終然有待歟皇唐大歷五年舒州刺史河南獨孤及字至之以慈惠牧人於兹土是唯無作作則參於元妙躊躇故山永懷道要貢善言於閶闔降吾君之明詔覺者知其本也寂者根其性也鏡者無不照也智者無不識也四者僃矣吾師之道存焉顒顒法侶如甘露灌有隋薛內史道衡洎皇朝房尚書琯與今獨孤使君及三子慧炬相燭也文鋒相摩也嗣為之碑森列淨土如經星五緯更為表裡焉然述者之詞各因所見言或蹖駮將貽惑於來世吾所辨焉薛碑曰大師與同學定公南隱羅浮山自後竟不知所終其銘曰留法眼兮長在入羅浮兮不復還據此南遊終不復此地也房碑曰大師告門人信公曰有人借問勿謂於我處得法遂託疾山阿向晦寓息忽大呼城市曰我於峴山設齋汝等當施我食於是邑居咸集乃齋於楊樹下立而終焉今以兩碑參而言之則薛內史制碑之後大師從羅浮還付囑信公然後涅槃於兹房公以得於傳記而述之非徒然也其餘事業則三碑載之詳也今則不書其錫名之詔與有地者之爵里行教護塔者之名號不可以莫之傳於後也皆刻於獨孤氏之碑陰毗陵集卷第九
