front:
  text: 毘陵集卷第十八
  hash: sha256:cde51831e0371046c17630f9696060266a48c70ba4eaea7ff12dafd96a4a1b97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_018-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及策書對詔策勅與吐蕃贊普書永泰二年荅楊賁處士書策秀才文三道對詔策問大象無體元功陰騭雖稟生之類萬殊而含道之源一致是以至人垂訓將以利物演爲眞宗貽厥後學包括六藝周流八表或因事以立言或寓言而英華作以詮意至如交樂於天交食於地不相與爲事不相英華作期與爲謀善無所私惡無所弃施之於敎何所英華作以勸勉經曰不爭善勝不言善應正直如繩平易如水常務斯道曷英華作何往不臻又曰善建不拔善抱不脫子孫以祭祀不輟斯言信矣昔放勛欽明光宅天下人歌擊壤政叶雍熙可謂善乎建抱免英華作善乎拔脫宜其帝系英華作緖蕃遠貽厥孫謀緜緜瓜瓞邁德垂裕何丹朱之不祀而祭祀輟乎此下當有譌脫又天無二日土無二王若以天下觀天下豈有二君乎夫君爲元首臣爲股肱君無賢臣誰與共理粤若舜舉八元致垂拱之化漢用三傑成霸王之業夏殷之末任佞弃英華作去賢宗社淪亡爲無匡輔經稱不尚賢者其旨何哉英華作也聖人立敎專氣致柔故形不欲勞性不欲竭深根固蔕可以常存則有固穆肆枉英華作朝穆肆任勞逸過度促齡損性都英華作卻以爲然又有惟靜惟淸守眞守朴二經之說何取則焉又聞善攝生者動與吉會武不措爪兵難容刃單豹巖居水飮身代俱損壽永色孺不免噬搏何衞生之不異而利害之頓殊子旣洞曉元經探微索隱矛盾若此何以會明側席虛心佇聞啓沃對臣聞道之爲物無名無形葢聖人酌而用之推而宏之取其精以修身用其麤以拔英華作頓物從本降迹散朴爲器於是有可道之道忘言之言其大略雖以沖寂爲宗虛極爲體然妙用無眹故不可致詰今陛下詰其體探其宗豈不欲因言演敎於敎遺一作奚有夫長風吹而衆竅號則大無不動細無不應況陛下用大道爲英華作用爲大道非風以鼓羣有臣則吹萬之一音也敢不唱於衆竅之末臣謹按天有施地有利用天之施以處其和謂之交樂分地之利以養其正謂之交食夫相與生於有爲有爲生於有事有事則謀名存矣善惡生於公私公私生於用用則廉英華無廉字棄名立矣然聖人有爲不爲焉有事無事焉有謀不謀焉有善無善焉有惡無惡焉泯善惡於一致合同異於萬殊則妙門可存敎父斯在英華一作立臣又按道德經云天網恢恢疎而不失常有司殺者殺之此不爭善勝之應也文宣王稱天何言哉四時行焉百物生焉此不言善應之驗也周書云無偏無黨王道蕩蕩此正直如繩之效也經又云居善地心善泉與善人英華作仁言善信此平易如水之證也陛下宏英華作垣其言挹其道以爲天下式四英華作三十有二載矣且復推功外名不有不恃考言詢事若沖若缺詔臣等曰常務斯道曷往不臻臣鯫生也焉知其辨雖然有一於此願陛下守而勿失與神爲一使神不遠於人人不遠於天天人合契英華作幷如影響交應則甚夷之道焉往而不臻夫有國者必善建皇極善抱至道道之不存傾其宗遷其社之謂拔桀奔英華作放南巢受死牧野是也極之不建失其器喪英華作亡其國之謂脫太康去洛汭幽王敗驪山厲王流彘是也至如堯知天歴在躬故以至公官天下天下戴之而不辭知丹朱不肖又以至公禪天下天下去之而不怨可謂邁德矣其後裔更霸迭王重之以御龍唐杜之代祿可謂垂裕矣陛下興廢繼絕立五帝祠節英華作卽春秋僃其祭典英華有亦字可謂祭祀不輟矣方之拔脫臣謂不同經曰不尚賢使民不爭大哉聖人之知微知彰乎夫尚賢者國家之所當先然古先聖王王字英華作人日雖求賢審官其用未始不無爲也而聖人能無爲於求賢不能使無爲無迹存則有爲者尚之以爲利於是有飾智以驚愚修身以明汙其漸起於一時之名其弊存乎千載之後不尚賢者非謂廢股肱之任絕匡輔之力也蓋欲因時致功功成則遣英華作遺而遺之因義立事事遂則有而無之無之則跡滅跡滅則爭息爭息則於爲無爲於事無事雖八元以翼唐弼虞三傑之勘秦滅項其無爲無事一也若夫齊天地冥萬物莫大於全眞專氣致柔全眞之本也惟淸惟靜全眞之中也各然其所然各可其所可全眞之末也設敎者三合其道一以貫之雖逍遙與道養殊途然性情英華作靜與力命同轍苟因其合英華作命而較其分則子產不得不勞於刑政朝穆不得不逸於肆任若矯其肆任之性以徇刑政之端是續鳧截鶴虧其全矣故聖人以大猷御六氣之辯以大方合二經之旨明應變無方立言不一學者宜忘言以究其體統不可執言以滯於英華作其筌蹄經不云乎返老子作及者道之動惟動而常靜靜可以取則權足以合義義無反經凡養生者以本爲精以物爲麤閉其外愼其内迹不踐凶危之境故兵不能容其刃心不居馮暴之地故武安得措其爪苟守其精而遺其觕故得於内而喪于英華作其外外内無以持其分則衞生之經悖矣謂之不異臣竊異之至如希微大體徼妙元鍵陛下得黃帝之遺珠久矣雖廣成無所陳其至精傅說無所用其舟楫啓沃之問豈臣及之有黷􅐶謀懼殞越于下謹對勅與吐蕃贊普書永泰二年勅吐蕃贊普外甥朕共贊普代爲與國自我元宗至道大明孝皇帝與生疑當作甥贊普和親結好將六十年仰思當時之約豈爲一朝之故實欲相恤災患永同休戚使代代子孫爲兄弟甥舅如手足之相衞脣齒之相依自爾使息戎罷兵二境無征戰之苦金玉綺繡問遺往來道路相望歡好不絕贊普寧忘之乎自我國家有安祿山史思明之難朕謂言贊普必有恤鄰救患之意豈知乗我之舋恣其侵軼煞略河湟之人爭奪􅊈隴之地又與朕叛臣僕固懷恩共扇誘迴紇等諸蕃同惡相濟犯我都邑三年之閒三至城下此實贊普苟窺分寸之利自弃一家之信不念㛰姻之好忍絕甥舅之歡累代親鄰一朝倂弃有目有耳者皆爲贊普羞之夫以小國伐大國且勞師襲遠而助叛臣有是三者神宜悔怒果然懷恩自斃迴紇來降羌渾諸蕃内難外散天實有眼心可負乎朕頃以背盟不祥絕親不義寧人負我我不負人所以含垢數年未忍致討旣不得已方思用師正欲悉天下精兵長驅西向弔人問罪然後凱旋上以雪宗廟之讎恥下以釋將士之憤怒自料以德征暴以大攻小以信討詐以義罰不義當如沸湯沃雪猛火焚枯人神同力何往不濟籌議之次適會彼國使來云願修前好復如舊日覽書見意良用憮然欲不許則人來歸我欲許則信不可恃是以遣御史中丞楊濟往諭朕意且探誠款九月濟與彼國宰相某乙等同到得所寄書然後知事皆由衷言無虛謬再披來旨朕甚嘉之何者自非聖哲人誰無過過而能改亦古人之所善追思六十年之舅甥有先祖先贊普之誓約言在史冊信結天地豈以小不忍而隳大體使百姓疲于甲兵兩主遂爲仇讎貳過遷怒朕所不取敬依來請彼此結和而今而後不復念惡已令内外屯戍罷柝解嚴凡我二國洗瑕遷善經略封疆素有分地各守土宇爾無有侵永爲親好復如開元中故事昊天上帝山川鬼神實聞朕言無謂不信冬寒贊普外甥比平安遣書指不多及荅楊賁處士書上德無爲其次爲而不擾及爲邦歲期英華作暮而人疲如初終英華無終字日以貢賦不入獲譴於上官遂以州比不調之琴思解弦更張之義算口徵賦英華作輸以代他征意欲因有爲以成無爲爲未著而人已吿怨跡其所以然無德故也夫導政齊刑民猶免而無恥況權道以反經爲用去德逾遠使無速謗末由也已所喜幸苟有過吾子知之貽書見讓以直諒相益商也起予孟孫愛我吾子兼之矣愧辱嘉貺顧無以當之三復白圭欲罷而不能然來書所陳富人出萬今易以千貧人出百今亦數倍富倍優貧倍苦竊詳雅旨事或未然昨者據保簿數百姓幷浮寄戸共有三萬三千比來應差科者唯有三千五百其餘二萬九千五百戸蠶而衣耕而食不持一錢以助王賦詩不云乎或燕燕居息或盡瘁事國在於是矣每歲三十一萬貫之稅悉鍾於三千五百人之家謂之高戸者歲出千貫其次九百八百其次七百六百貫以是爲差九等最下兼本丁租庸猶輸四五十貫以此人焉得不日困事焉得不日慼其中尢不勝其任者焉得不襁負而逃若以已困之人已竭之力杼軸不巳恐州將不存苟以是爲念安敢不夙興夕惕思有以拯之方今爲口賦誠非彝典意欲以五萬一千人之力分三千五百家之稅愚謂之可復英華無復字使多者用此以爲裒少者用此以爲益損有餘補不足之道實存乎其中富人貧人悉令均減倍優倍苦何從而生竊料動搖不安以遁逃相扇者不過以規避之戸與寄客耳此輩浮食偸安英華有以字久漏差科惡同均賦稅之名秪思苟免若編戸地著者雖驅之使逃亦固不從今已擇吏分官以辨其等差英華作差等量分入賦其數懸牓以示之信若信之不明分之或過等差之不均官吏之不仁困而後去誰曰不可乃未及知斂之薄厚辯之濟否望風聆聲遽吿勞而逃斯豈爲政者之過乎顧禮義之不愆孰能恤叛者之言耶天下無不食王土之臣寧有不輸王賦之民此輩飮國之澤食地之利將薄斂以助逋賦則曰挈妻子而去之是與英華作知鳥獸蠻貊無以異矣其來旣不可以奉征稅其去亦何足以病州縣違之一邦亦猶是也等不爲用又焉能資鄰然計斯人之徒亦未必悉然固或有不去者焉庶幾其所濟猶大但不防之于微拙誠有之奉敎三省英華作省躬敢不知罪子產鑄刑書作兵疑當作􅉌賦以救鄭國而獲譏於叔向及才不如子產口算不如兵賦英華有而字吾子之言過於叔向之直中心藏之何日忘之簿領拘限莫由詣展未見君子馳誠無極不宣舒州刺史獨孤及頓首策秀才文三道問儒有安身以全德有殺身以成仁有徇名以行已有忘名以救物雖俱出於儒墨而用之不同聖人立言豈其無持操歟夫魏顆違命申生受賜伍尚赴郢伍胥如吳四者孰孝比于死之英華作而微子去之太公投竿伯夷采薇四者孰義石戸竄于海上伯陽隱于柱下范蠡汎舟於五字英華作䲭夷子去越三者孰潔今欲考其本末度長以挈大較其去就合異以爲同渴聞貫之之道辯之之說問黃帝氏以無爲爲政垂衣裳而天下順周人三千其儀亦克用乂舜誅四罪天下咸服而成康恭已刑措不用致化之本豈不同源而文質殊貫損益相反以古範今何去何二字英華作爲去就孔子用鉞兩觀而魯至于道而宓子賤鳴琴愔愔單父亦化英華作宓子賤鳴琴單父而民亦自化又愔愔二字英華注云集作培幟非寛猛之際大小不三字英華作小大奚侔比權量實其義焉在敷暢厥旨敬佇嘉言問傳曰其君齋明精潔則神饗人聽故明神降之夫天地烟熅沖氣爲人神何由降明何由出至如晉祟英華作崇實沈崧生申甫編傳穀城之老言發魏楡之石檮杌杜伯與商周而存亡黃熊白毛將晉虢而興敗是何祥也根本焉在二三子賁然來斯宜究乎天人之終始其悉數以對毘陵集卷第十八
