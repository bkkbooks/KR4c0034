front:
  text: 毘陵集卷第三
  hash: sha256:2d517e0405d4ce33227851c7dfb9b3670973f200fd5301ba419b582526d5a2f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_003-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及詩下二十八首代書寄上李廣州自東都還濠州奉詶王八諫議見贈詶皇甫侍御望􅈞山見示之作垂花塢醉後戲題登山谷寺上方荅皇甫侍御臥疾闕陪車騎之贈詣開悟禪師問心法次第寄韓郞中喜辱韓十四郞中書兼封近詩見示因代書題荅同皇甫侍御齋中春望見示荅李滁州題庭前石竹花見寄暮春於山谷寺上方遇恩命到加官進服詶皇甫侍御見賀之作和張大夫秋日有懷呈院中諸公和張大夫秋夜書情傷春贈遠送陳王府張長史還京荅皇甫侍御北歸畱別得柳員外書封寄近詩書中兼報新主行營兵馬因代書戲荅同文粹作奉同徐侍郞五雲溪新亭重陽宴集作和中書常舍人晩秋集賢院卽事寄贈徐薛二侍郞登後湖亭傷春懷京師故舊荅李滁州見寄水西館泛舟送王員外得李滁州書以玉潭莊見託因書春思以詩代荅題玉潭荅李滁州憶玉潭新居見寄和李大夫同呂評事太行苦􅀬行兼寄院中諸公雨後陪王員外泛後湖陪王員外北樓宴待月代書寄上李廣州􅣰水望番禺迢迢靑天末鴻雁飛不到音塵何由達獨有輿人歌隔雲聲諠聒皆稱府君仁百越賴全活推誠魚鼈信持正魑魅怛疲民飽中和性足無夭閼天子咨四岳佇公濟方割幾時復旋歸入踐靑瑣闥賤子託明德繚若松上葛別離鄙恡生結念思所豁門䦨關山阻岐路天地闊唯憑萬里書持用慰飢渴自東都還濠州奉詶王八諌議見贈關西仕時俱稚容彪彪之鬢始相逢天地變化縣城改天寶中及尉華陰鄭縣别後經禒山之亂鄭縣殘毀城移於州西獨有故人交態在不言會合跡未幷猶以歲寒心相待洛陽居守寄酇侯君著貂冠參運籌高閣連雲騎省夜新文會友涼風秋靑􅂁白面昔攜手冉冉府趨君記否雲分雨散十五年始得一笑罇酒前未遑少畱驟遠別況値旅雁鳴秋天二華舊遊如夢想他時再會何由緣賴君贈我郢中曲别後相思被管􅁌詶皇甫侍御望天􅈞山見示之作早歲慕五嶽嘗爲塵機礙孰知天柱峯今與郡齋對隱嶙抱元氣氤氳含靑靄雲崖媚遠空石壁寒古塞漢王南遊日望秩此昭配法駕到谷口禮容振荒外焚柴百神趨執玉萬方會天旋物順動德布澤霶霈講武威巳耀學仙功未艾黃金竟何成􅇝業遽淪昧度世若一瞬昨朝巳千載如今封禪壇唯見雲雨晦長望哀往古勞生慙大塊淸暉幸相娛幽獨知所賴寒城春方正初日明可愛萬殊喜陽和余亦荷時泰山色日夜綠下有淸淺瀬媿作拳僂人沈迷簿書内登臨歎拘限出處悲老大況聽郢中曲復識湘南態思免物累牽敢令道機退瞞然一作永日誦佳句持比秋蘭佩垂花塢醉後戲題賦得俱字韻幷序一首莊周臺南十許步有丘一成上有樛藤垂花而蔓草荒之且隔大溝路不可陟道士張太和伐薪爲堰封土以壅澮余亦命薙氏治蕪穢而剗宿莽遂別爲登賦之位位廣一席席間足以函罇酒二簋三月戊子及羣英由堰而升焉諸花倒垂下拂杯案紫葩縭縰如􅁫如旒衆君子瞻弄之不足故秉燭進酒以繼落日欲稱醉而不能也因命其地曰垂花塢堰曰緣花堰亦飾之以詩云紫蔓靑條覆酒壺落花時與竹風俱歸時自負花前醉笑向鯈魚問樂無登山谷寺上方荅皇甫侍御臥疾闕陪車騎之贈梵宮香閣攀霞上天柱孤峯指掌看漢主馬蹤成蔓草寺中間石上有竅穴故老相傳云漢武帝馬跡法王身相示空棺禪門第三祖燦太師遺塔在此坊天寶中別駕李常開棺取金身荼毗收舍利重起塔􅉆養雲扶踴塔靑霄庳皮寄反松蔭禪庭白石寒不見戴逵心莫展賴將新贈比琅玕詣開悟禪師問心法次第寄韓郞中障深聞道晩根鈍岀塵難濁刼相從慣迷途自謂安得知身垢妄始喜額珠完欲識眞如體君嘗法味看喜辱韓十四郞中書兼封近詩見示代書題荅各牽于役問遊遨獨坐相思正鬱陶長跪讀書心蹔緩短章投我曲何高宦情緣木知非願王事敦丁囘切人敢吿勞所歎在官成遠別徒言岏水纔去聲容舠同皇甫侍御齋中春望見示之作望遠思歸心易傷況將衰鬢偶年光時攀芳樹愁花盡晝掩高齋厭日長甘比流波辭舊浦忍看新草徧橫塘因君贈我江楓詠春思如今未易量荅李滁州題庭前石竹花見寄殷烏門反疑曙霞染巧類匣刀裁不怕南風􅀬能迎小暑開游蜂憐色好思婦感年催覽贈􅄈離恨愁腸日幾􅂞暮春於山谷寺上方遇恩命加官賜服詶皇甫侍御見賀之作天書到法堂朽質被榮光自笑無功德殊恩謬激揚還登建禮署猶忝會稽章佳句慙相及稱仁豈易當和張大夫秋日有懷呈院中諸公至公無暇日高閣閉秋天肘印拘王事籬花思長年績成心不有慮澹物猶牽竊效泉魚躍因聞郢曲妍和張大夫秋夜書情卽事上略當分閫高情善閉關忘機羣動息無戰五兵閒鈴閣風傳漏書窗月滿山方知秋興作非惜二毛斑傷春贈遠去水流年日竝馳年光客思兩相隨咨嗟斑鬢今承弁慙媿新荷又發池楊柳逶迤愁遠道鷓鴣啁哳怨南枝憶君何啻同瓊樹但向春風訴別離送陳王府張長史還京論齒弟兄列爲邦前後差十年方一見此別復何嗟極目故關道傷心南浦花少時相憶處招手望行車荅皇甫十六侍御北歸畱別作正當楚客傷春地豈是騷人道別時俱徇空名嗟欲老況將行役料前期勞生多故應同病羸馬單車莫自悲明日相望隔雲水解顏唯有袖中詩得柳員外書封寄近詩書中兼報新主行營兵馬代書戲荅郞官作掾心非好儒服臨戎政巳聞說劍嘗宗漆園吏戒嚴應笑􅁄門軍遙知抵掌論皇道時復吟詩向白雲百越待君言卽敘相思不敢愴離羣同文粹作奉同徐侍郞五雲溪新亭重陽宴集作萬峯蒼翠色雙溪淸淺流巳符東山趣况値江南秋白露天地肅黃花門館幽山公惜美景肎爲芳罇畱五馬照池塘繁􅁌催獻酬臨風文粹作風前孟嘉帽乘興李膺舟騁望傲千古當歌遣四愁豈令永和人獨擅山陰遊奉和中書常舍人晚秋集賢院卽事寄贈徐薛二侍郞漢家金馬署帝座紫微郎圖籍淩羣玉歌詩冠柏梁陰陰萬年樹肅肅五經堂揮翰忘朝食研精待夕陽晴空露盤迥秋月瑣窗涼遠興生斑鬢高情寄縹囊葳蕤雙鸑鷟夙昔竝翺翔汲冢同刊謬蓬山共補亡差池摧羽翮流落限江湘禁省一分袂旻天三􅀨霜石渠遺跡滿水國暮雲長早晚朝宣室歸時道路光登後湖亭傷春懷京師故舊昨日看搖落驚秋方怨咨幾經開口笑復及看去聲花時世事空名束生涯素髮知山山春草滿何處不相思前年春與獨孤常州兄花時爲別倏巳三年矣今鶯花又爾覩物增懷因之抒情聊以奉寄時蒙溪幽居在義興益增懷愬近日霜毛一番新別時芳草兩􅂞春不堪花落花開處況是江南江北人薄宦龍鍾心􅈸慢故山寥落水奫淪緣君愛我疵瑕少願竊仁風寄老身荅李滁州見寄相逢遽歎別離牽三見江臯蕙草鮮白髮俱生歡未再滄洲獨往意何堅愁看郡內花將歇忍過山中月屢圓終日望君休汝騎媿無堪報起予篇水西館泛舟送王員外單醪敢獻酢曲沼荷經過汎覽親魚鳥夤緣涉芰荷劇談增惠愛美景借淸和明日汀洲草依依柰別何得李滁州書以玉潭莊見託因書春思以詩代荅春物行將老懷君意詎堪朱顏因酒強白髮對花慙日日思瓊樹書書話玉潭知同百口累曷日辦抽篸題玉潭碧玉徒強名冰壺難比德唯當寂照心可竝奫淪色荅李滁州憶玉潭新居見寄從來招隱地未有剖符人山水能成癖巢夷擬獨親猪肝無足累馬首敢辭勤掃洒潭中月他時望德鄰奉和李大夫同呂評事太行苦􅀬行兼寄院中諸公駟馬上太行脩途亙遼碣王程無畱駕日昃未遑歇請問此何時恢台朱明月長蛇稽天討上將方北伐明主命使臣皇華得時傑巳忘羊腸險豈憚溫風􅀬搖策汗􅒔滄登崖思紆結炎雲如煙火溪谷將恐竭晝景赩可畏涼飇何由發山長飛鳥墮目極行車絕趙魏方俶擾安危俟明哲歸路豈不懷飮冰有苦節會同傳檄至疑議立談決況有阮元瑜翩翩秉書札起予歌赤坂永好踰白雪誰念剖竹人無因執羇紲􅀨晴後陪王員外泛後湖得溪字遠山媚平楚宿雨漲淸溪㳂泝任舟檝歡言無町畦酒酣相視笑心與白鷗齊陪王員外北樓宴待月勸酒論心夜不疲含情有待問誰思佇看晴月澄澄影來照江樓酩酊時毘陵集卷第三終
