front:
  text: 毘陵集卷第二
  hash: sha256:7a07e2521849b441bab6b91b58cd4a080dc86bcf885d815a91835df7464e78da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_002-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及詩中三十一首送陳兼應辟兼􅀉高􅃴賈至早發龍沮館舟中寄東海徐文粹作李司倉鄭司戶海上懷華中舊遊寄鄭縣劉少府造渭南王少府崟將還越畱別豫章諸公雜詩山中春思傷春懷歸九月九日李蘇州東樓宴李􅀸東池夜宴將赴京荅李紓贈別江寧詶鄭縣劉少府兄贈別作送􅉑州王錄事之任送長孫將軍拜歙州之任送何員外使湖南送江陵全少府赴任送虞秀才之長沙送陽翟張主簿之任送李賓客荆南迎親詶常郿縣見贈送游員外赴淮西送馬鄭州蕭文學山池宴集送荆南張判官送義烏韋明府送相里郞中赴江西和虞部韋郞中尋楊駙馬不遇和贈遠和題藤架官渡柳歌送李員外承恩赴揚州覲省同岑郞中屯田韋員外花樹歌奉和李尙書畫射虎圖歌送陳兼應辟兼寄高適賈至結綠處燕石卞和不必知所以王佐才未能忘茅茨罷官梁山外穫稻楚水湄適會傅巖人虚舟濟川時天網忽搖頓公才難棄遺鳳皇翔千仞今始一鳴岐上馬指國門舉鞭謝書帷預知大人賦掩郤歸來詞天子方在宥朝廷張四維料君能獻可努力副疇咨舊友滿皇州高冠飛翠蕤相逢絳闕下應道軒車遲高侯秉戎翰策馬觀西夷方從幕中事參謀王者師賈生去洛陽焜耀琳瑯姿芳名動百步逸韵淩南皮肅肅舉鴻毛泠然順風吹波流有同異由是限別離漢塞隔隴底秦川連鎬池白雲日夜滿道里安可思夢想浩盈積物華愁變衰因君附錯刀送遠益悽其四海各橫絕九霄應易期不知故巢鷰決起棲何枝蚤發龍沮館舟中寄東海徐文粹作李司倉鄭司戶沙禽相呼曙色分漁浦鳴榔十里聞正當秋風度楚水況値遠道傷離羣津頭卻望後湖岸別處巳隔東山雲停文粹誤作亭艫目送北歸翼惜無瑤華持寄君海上懷華中舊遊寄鄭縣劉少府造渭南王少府崟涼風臺上三峯月王任鄭縣日於城角築小臺號涼風臺每與數公置酒登臨望二華雲月不夜城邊萬里沙離別莫言關塞遠夢魂長在子眞家將還越畱別豫章諸公客鳥倦飛思舊林徘徊猶戀衆花陰他時相憶雙航葦莫問吳江深不深雜詩百花結成子春物捨我去流年惜不得獨坐文粹作立空閨暮心自有所待甘爲物華誤未必千黃金買得一人顧山中春思􅆩祭川水大人家春日長獨謠晝不暮搔首慙年芳靡草知節換含葩向新陽不嫌三逕深爲我生池塘亭午井竈閑雀聲響空倉花落沒屐齒風動羣木香歸路雲水外天涯杳茫茫獨卷萬里心深入山鳥行芳景勿相迫春愁未遽忘傷春懷歸誰謂鄕可望望在天地涯但有時命同萬里共歲華昨夜南山雨殷雷拆萌芽源桃不余欺先發秦人家寂寂戶外掩遲遲春日斜源桃默無言秦人獨長嗟不惜中腸苦但言會合賖思歸吾誰訴笑向南枝花九月九日李蘇州東樓宴是菊花開日當君乘興秋風前孟嘉帽月下庾公樓酒解畱征客歌能破別愁醉歸無以贈祇奉萬年詶李􅀸東池夜宴得池字政成機不擾心愜宴忘疲去燭延高月傾罍就小池舞盤􅂞雪動􅁌奏躍魚隨自是山公興誰令下士知將赴京荅李紓贈別膠漆常一作長投分荆蠻各倦遊帝鄕今獨往溝水便分流甘作遠行客深慙不繫舟思君帶將緩豈􅀡日三秋江寧詶鄭縣劉少府兄贈別作往年脫縫掖接武仕關西結綬腰章竝趨階手板齊仙山不用買朋酒日相攜抵掌誇潭壑忘情向組珪事遷時旣往年長跡逾睽何爲靑雲器獨嗟濁水泥役牽方遠別道在或先迷莫見良田晩遭時亦杖藜送虢州王錄事之任謂子文章達當年羽翼高一經俄白首三命尙靑袍未遇須藏器安卑莫吿勞盤根儻相値試用發硎刀送長孫將軍拜歙州之任臨難敢橫行遭時取盛名五兵常典校四十又專城浪逐樓船破風從虎竹生島夷今可料繫頸有長纓送何員外使湖南夙昔皆黃綬差池復瑣闈上田無晚熟逸翮果先飛前路舟休繫故山雲不歸王程儻未復莫遣鯉書稀送江陵全少府赴任冢司方眘選劇縣得英髦固是攀雲漸何嗟趨府勞楚山迎驛路漢水漲秋濤騫翥方兹始看君六翮高送虞秀才擢第歸長沙充賦名今遂安親事不違甲科文比玉歸路錦爲衣海運同鯤化風㠶若鳥飛知君到三逕松菊有光輝送陽翟張主簿之任舊聞陽翟縣西接鳳高山作吏同山隱知君處劇閑少年當效用遠道豈辭艱遲子揚名後方期綵服還送李賓客荆南迎親宗室劉中壘文場謝客兒當爲天北斗曾使海西陲旄節精誠著銅樓羽翼施還申􅉆帳別言赴倚門期恩渥霑行李晨昬在路岐君親兩報遂不敢議傷離詶常郿縣見贈愛君脩政若脩身鰥寡來歸乳雉馴堂上五􅁌銷暇日邑中千室有陽春謂乘鳧舄朝天子卻媿猪肝累主人辭後讀君懷縣作定知三歲字猶新送游員外赴淮西多君有奇略投筆佐元戎巳佩郞官印兼乘御史驄使星隨驛騎歸路有秋風莫遣無書札他年懷袖空送馬鄭州使君朱兩轓春日整東轅芳草成臯路靑山涼水源勉修循吏跡以謝主人恩當使仁風動遙聽輿誦諠蕭文學山池宴檀欒千畝綠知是辟疆園遠岫當庭戶諸花覆水源主人邀盡醉林鳥助狂言莫問愁多少今皆付酒罇送別荆南張判官輶車駱馬往從誰夢浦蘭臺日更遲欲識桃花最多處前程問取武陵兒送義烏韋明府妙年能致身陳力復安親不憚關山遠寧辭簿領勤過江雲滿路到縣海爲鄰每歎違心賞吳門正早春送相里郞中赴江西君把一尺詔南游濟滄浪受恩忘險艱不道岐路長戎狄方搆患休牛殊未遑三秦千倉空戰卒如餓狼委輸資外府諏謀寄賢良有才當陳力安得遂翶翔豈不愼幷賦賦均人亦康遙知軒車到萬室安耕桑火伏金氣騰旻天欲蒼茫寒蟬慘巴鄧秋色愁沅湘昨日攜手西於今芸再黃歡娛詎幾許復向天一方蹢躅話世故惆悵舉離觴共求數刻歡戲謔君此堂今日把手笑少時各他鄕身名同風波聚散未易量曷月還朝天及時開智囊前期儻猶闊加飯勉自強和虞部韋郞中尋楊駙馬不遇金屋瓊臺蕭史家暮春三月渭川花到君仙洞不相見謂巳吹簫乘早霞和贈遠憶昔去年春風至中庭桃李暎瑣窗美人挾瑟對芳樹玉顏亭亭與花雙今年新花如舊時去年美人不在兹借問離居恨深淺祇應獨有庭花知和題藤架䔿䔿葉成幄璀璀花落架花前離心苦愁至無日夜人去藤花千里強藤花無主爲誰芳相思歴亂何由盡春日迢迢如線長官渡柳歌送李員外承恩往揚州覲省君不見官渡河兩岸三月楊柳枝千條萬條色一一勝綠絲花作鈆粉絮葉成翠羽帳此時送遠人悵望春水上遠客折楊柳依依兩含情夾郞木蘭舟送郞千里行郞把紫泥書東征覲庭闈脫郤貂襜褕新著五彩衣雙鳳幷兩翅將鶵東南飛五兩得便風幾日到揚州莫貪揚州好客行剩淹畱郞到官渡頭春闌巳應久殷勤道遠別爲謝大隄柳攀條儻相憶五里一􅂞首明年柳枝黃問郞還家否同岑郞中屯田韋員外花樹歌東風動地吹花發渭城桃李干樹雪芳菲可愛不可畱武陵歸客心欲絕金華省郞惜佳辰祇將棣萼照靑春君家自是成蹊處況有庭花作主人和李尙書畫射虎圖歌飢虎呀呀立當路萬夫震恐百獸怒彤弓金鏃當者誰鳴鞭飛控流星馳居然畫中見眞態若務除惡不顧私時和年豐五兵巳白額未誅壯士恥分銖遠邇懸彀中不中不發思全功捨矢如破石可裂應􅁌盡敵山爲空殺氣滿堂觀者駭颯若崖谷生長風精微入神在毫末作繢造物何同功方叔秉鉞受命新丹靑起予氣益振底綏靜難功可擬嗟嘆不足聲成文他時代天育萬物亦以此道安斯民毘陵集卷第二終
