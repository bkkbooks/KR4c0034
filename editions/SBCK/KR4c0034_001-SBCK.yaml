  text: 毘陵集卷第一
  hash: sha256:6fe101cf52f9529e1ffe470933a34dcf80f683ad72d7457fc4b0d1a2cdc9df85
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_001-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨􅀌及賦夢遠遊賦詩上二十三首壬辰歲過舊居夏中酬于逖畢燿問病見贈三月三日自京到華陰水亭獨酌寄裴六薛八海上寄蕭立唐文粹作五酬梁二十宋中所贈兼別梁少府東平蓬萊驛夜宴平盧楊判官醉後贈別姚太守置酒畱宴觀海􅀨後公超谷北原眺望寄高拾遺丙戌歲正月出洛陽書懷季冬自嵩山赴洛道中代書寄裴冀劉穎客舍月下對酒醉後別畢四燿庚子歲避地至玉山詶韓司馬所贈下弋陽江舟中代書寄裴侍御題思禪寺上方蚤發若峴驛望廬山癸卯歲赴南豐道中聞京師失守寄權士繇韓幼深初晴抱琴登馬退山對酒望遠醉後作賈員外處見中書賈舍人巴陵詩集覽之懷舊代書寄贈寒夜溪行舟中作江上代書寄裴使君與韓侍御同尋李七舍人不遇題壁畱贈李張皇甫閻權等數公竝有送別之作見寄因題荅賦夢遠遊賦老氏稱吾所以有大患者爲吾有身大哉聖人之知微乎夫生者一氣之暫聚耳有天地之和自然之力以運其行止節其夭壽非智力之所能扶明矣而舉世矻矻莫不保持形骸謂爲已有執迷妄往而不返小者攘禮樂竊忠信以賈譽大者盜天地之權至於忘身道德之衰皆英華誤偕此物也余生於浮而長於妄汨沒當世與羣動俱智不能逃形於名聲之韁鏁脫屣於冠冕之籠檻及其世界顚倒萬物反覆始返照收視以觀身世然後知一生之患假合豈􅈂芻狗土苴英華一作梗􅀬燄聚沫而已則我之身也與百憂偕長況重險之中乎思欲沖三淸岀五濁乘淩虛極與造物者爲伍莫有由矣嘗中夜夢飛昇太空若有以名跡見誚者覺而自失乃爲賦以狀遠遊且旌悟道之晩也其詞曰仰太素兮觀元精之煙熅孰官司乎物物兮得流形而爲人太皡遺我八卦藏天地於文字黼而黻之爲聖爲智褒衣之徒相與擊建鼓而揭日月兮奔孝慈而走仁義其英華一作而弊也古是而今非身賤而名貴驂驔馺遝兮道路屯雲而奔波絢煥轇轕兮玉帛鐘鼓之駢羅霍􅜱英華作兮心懸天地而火馳蒼黃兮得未終也而失已繼之百骸與日月竝走英華一作馳五藏與哀樂交戰羲和未及弭轡榮枯紛而萬變何生涯之侘傺兮蹇吾降此中州憑世道以上下若涉水而無津兮與吹萬同其波流況世緒坱軋英華作圠兮如棼絲之相樛英華一作繆見辰極之􅊠昂兮知杞人之殷憂顧􅈷呀以蝕月兮天地閉而雲愁鳳凰焚其故巢兮遶舊國以失儔埃􅅽以上薄兮虞羅紛其四周吾始未知夫六合湫隘之若此孰與吾兮遠遊豈無太淸之路兮夫何漫漫而迢遰望帝鄕之低佪兮微白雲與之偕逝澄予神於遙夜與顥氣期乎無垠眞境沕穆以傍感精誠薰然而來親歘乘夢以奮飛博至靈英華一作虛以上賓望見碧落天地如掌洞開八門別有萬􅁚亭亭物外乘化直上身世雙遣英華作遺獨與道往其往也泛兮若遊魚振鱗而泳淸川冏兮若胡雁得順風而緣秋天忽不知誰之身夫何爲者䍘英華一作深入空界七耀在下問予津於混茫兮蹇倘佯以延佇若有人兮縹緲指人間以唁予曰鳳兮鳳兮何德之暌天固桎若以禮義梏若以機事盍支離其德而起英華一作逃乎物累使逸翮可得而籠樊兮孰云夫吾毛英華作五色又作五毛之自異天運地載剛柔生焉千變萬化如環無端彼興廢與往復同大壑之波瀾將令歸根明徵其源則吾與若皆幻也又奚睢盱於其閒幻未始有封物未始有壃成則虧進則傷無汨而和無易而方山立其中央善汝行密汝藏道將自光吾在大羅之上元都之所乾坤爲家日月爲宇噓吸元氣太虛之下音戶尙一乃心勿謂道阻遊乎無窮吾顧見汝奉眞吿以自省兮五情惄英華作愁其增􅀬哀攀龍之無階兮思過英華一作遇天之曷月未知去下方幾萬億兮退將返遵吾歸轍脩玉虛以下降濟銀漢以中歇憑東井以俯視識故國之城闕千門萬戶遙如蟻穴百川綺分五嶽羅列覓舊山與喬木纔依稀而明滅見伊川一有之字大道鞠爲戎狄歴陽故人半作魚鼈英華一作龜曩之奔命於市朝者如紛紜飛馳讘讘嗤嗤蹩􅍷蹁蹮肖翹陸離若蟣虱之聚壞絮蜘蛛之乘遊絲吾乃英華乃字下誤有命字今日識羣動之變態兮莞然倚長空而笑之亦旣自得周覽未畢愓焉形開萬􅁚如英華一作都失羣有儼以皆作百慮繽其來歸乃夙昔之人寰始故時之喧卑向之俯仰欣慼無非妄者然後知吾之生也與妄英華有皆字生邪氣乘之萬緣合幷爲憂爲患爲虧爲盈彼君子英華有兮字方碌碌然自以爲覺猶飾妄以賈名安知聖人不以世界爲重狴生死爲大夢視變化與英華一作以品類亦猶英華一作由神交英華有之字飛動與遺英華一作貴物以顧身兮悟生浮而質陋以一氣之倐英華作秒忽與萬化而紛糅自視􅛺英華作俄然寄形宇宙尙何能濡首於榮辱之境甘心英華一作口於哀樂之囿鷦鷯于飛載翩載翻英華一作翾君子至止栖息化元獨立道英華作載又作乾樞怡神胚渾萬物轉薄吾眞長存止水不波浮雲無根與時盈虛委質乾坤倚伏相軋吉凶同源物各自爾予欲無言優哉游哉聊以窮年詩上壬辰歲過舊居少年事遠遊出入燕與秦離居歲周天猶作勞歌人負劒度潁水歸馬自知津緣源到舊廬攬涕尋荒蓁鄰里喜相勞壺觴展慇勤酒闌擊筑語及此離會因丈夫隨世波豈料百年身今日負鄙願多慙故山春夏中詶于逖畢耀問病見贈救物智所昧學仙願未從行藏兩乖角蹭蹬風波中薄宦恥降志文粹作淪跡未攄念臥痾非養蒙閉關涉兩旬羇思浩無窮鸑鷟何處來雙舞下碧空離別隔雲􅀨惠然此相逢把手賀疾間舉杯欣酒濃新詩見久要淸論激深衷高館舒夜簟開門延微風火雲赫嵯峨日暮千萬峯遙指故山笑相看撫號鐘聲和由心親事感和氣同出處未易料且歌緩愁容願君崇明德歲暮如靑松三月三日自京到華陰水亭獨酌寄裴六薛八祇役匪遑息經時客三秦還家問節候知到上巳辰山縣何所有高城閉靑春和風不吾欺桃杏滿四鄰舊友適遠別誰當接歡忻呼兒命長瓢獨酌湘吳醇一酌一朗詠旣酣意亦申言筌蹔兩忘霞月祇相新裴子塵表物薛侯席上珍寄書二傲吏何日同車茵詎肎使空名終然羇此身他年解桎梏長作海上人海上寄蕭立唐文粹作五朔風翦塞草寒露日夜結行行到文粹作届瀛壖歸思生暮節驛樓見萬里延首望遼碣遠海入大荒平蕪際窮髮舊國在夢想故人胡且文粹作且胡越契闊阻風期荏苒成􅀨別海西望京口兩地各天末索居動經秋再笑知曷月日南望中文粹作日窮南望盡唯見飛鳥滅音塵未易得何由文粹作以慰飢渴詶梁二十宋中所贈兼畱別梁少府少讀黃帝書肎不笑機事意猶負深衷未免名跡累厭貧學干祿欲狥賓王利甘爲風波人豈復江海意擔簦平臺下是日飮羇思逢君道寸心蹔喜一交臂緒言未及竟離念巳復至􅇞陵望南丘雲雨成兩地途殊迹方間河廣流且駛暮帆望不及覽贈心欲醉愛君如金錫昆弟皆茂異弈赫連絲衣榮養能錫類君子道未長深藏靑雲器巨鱗有縱時今日不定定字俗改足吳本亦作足議唯當加餐飯好我袖中字別離動經年莫道分首易東平蓬萊驛夜宴平盧楊判官醉後贈別姚太守置酒畱宴驛樓漲海壖秋月寒城邊相見自不足況逢主人賢夜淸酒濃人如玉一斗何啻􅈂十千木蘭爲樽金爲杯江南急管盧女􅁌齊童如花解郢曲起舞激楚歌採蓮固知別多相逢少樂極哀至心嬋娟少畱莫辭醉前路方悠然明日兮飛儻相憶祇應遙望西南天觀海北登渤澥島􅂞首秦東門誰尸造物功鑿此天池源澒洞吞百谷周流無四垠廓然混茫際望見天地根白日自中吐扶桑如可吳本作何捫迢遙蓬萊峯想像金臺存秦帝昔經此登臨冀飛翻揚旌百神會望日羣山奔徐福竟何成羨門徒空言唯見石橋足千年潮水痕􅀨後公超谷北原眺望寄高拾遺崖口􅀨足收淸光洗高天虹蜺歛殘靄山水含碧鮮遠空霞破露月輪薄雲片片成魚鱗五陵如薺渭如帶目極千里關山春朝來爽氣未易說畫取花峯贈遠人丙戌歲正月出洛陽書懷往歲衣褐見受服金馬門擬將忠與貞來酬主人恩天地蹔雷雨􅇝波生平原窮鱗遂蹭蹬夙昔事罕存幸逢帝出震授鉞淸東藩白日忽再中萬方咸駿奔王風從西來春光滿乾坤蟄蟲競飛動余亦辭籠樊遭遇思自強寵辱安足言唯將四方志􅂞首謝故園季冬自嵩山赴洛道中作皇運偶中變長蛇食東土天葢西北傾衆星殞如􅀨胡塵動地起千里聞戰鼓死人成爲阜流血塗草莽策馬何紛紛捐軀抗豺虎甘心赴國難誰謂荼葉苦天子初受命省方造區宇斬鯨安溟波截鼇作天柱三微復正統五玉歸文祖不圖漢官儀今日忽再覩升高混京邑佳氣連海浦寶鼎歊景雲明堂舞干羽虎臣口激昂口口口禦侮腐儒著縫掖何處議鄒魯西上轘轅山丘陵橫今古和風蒸萬物臘月春靄吐得爲太平人窮達不足數他日遇封禪著書繼三五代書寄裴六冀劉二潁昔余馬首東君在海北汭音入聲盡屏簿領書相與議巖穴載來詣佳境每山有車轍長嘯林木動高歌唾壺缺此辭月未周虜馬嘶絳闕猛虎踞大道九州當中裂聞君棄孤城猶自握漢節恥栖惡木影忍與故山別脫舄桂嶺雲冏然若鳥逝入聲唯畱潺湲水分付練溪月爾來大谷棃白花再成雪關梁限天險歡樂竟兩絕大盜近削平三川今底寧勾芒布春令屏翳收雷霆伊洛日夜漲鳴臯蘭杜靑鶱鶱兩黃鵠何處遊靑冥疇昔切玉刀應如新發硎及時當樹勲高懸景鐘銘莫拖一作抱白雲意徑往丹丘庭功成儻長挹然後謀滄溟客舍月下對酒醉後寄畢四燿鄕路風雪深生事憂患迫天長波瀾廣高舉無六翮獨立寒夜移幽境思彌積霜月照膽淨銀河入簷白沽酒聊自勞開罇坐簷隟主人奏絲桐能使高興劇淸機蹔無累獻酢更駱驛慷􅁣葛天歌愔愔廣陵陌旣醉萬事遣耳􅀬心亦適視身兀如泥瞪目傲今昔故人間城關音信兩脈脈别時前盟在寸景莫自擲先是畢贈及詩云􅇝鑪無火停日月速若飛忽然囗人身飲酒不須疑心與白日􅃲十無一滿百寓形薪火內甘作天地客與物無親疎斗酒勝竹帛何必用自苦將貽古賢責庚子歲避地至玉山詶韓司馬所贈滄海疾風起􅇝波駭恬鱗巳無濟川分甘作乘桴人揮手謝秣陵舉帆指甌閩安知風塵表偶與瓊瑤親共悲行路難況逢江南春故園忽如夢返復知何辰曠野豺虎滿深山蘭蕙新枉君灞陵什􅂞首徒酸辛下弋陽江舟中代書寄裴侍御故鄕隔西日去水連長天前路知幾許但指天南邊愴恨極浦外隱映靑山連東風滿帆來五兩如弓􅁌遙羨繡衣客冏然馬首先得餐武昌魚不顧潯陽田屈指數別日忽乎成兩年百花巳滿眼春草漸碧鮮豈是離居時柰何于役牽洞庭有深涉曷日期歸旋且作異鄕料詎知攜手緣離憂未易銷莫道罇酒賢題思禪寺上方溪口聞法鼓停橈登翠屏攀雲到金界合掌開禪扃鬱律衆山抱空濛花雨零老僧指香樓云是不死庭文粹作亭非眇眇於越路茫茫春草靑遠山噴百谷繚繞馳東溟目極道文粹作想何在境照心亦冥騞然諸根空破結如破瓶下視三界狹但聞五濁腥山中有良藥吾欲隳天形早發若峴驛望廬山􅀨罷山翠鮮泠泠東風好斷崖雲生處是向峯頂道誰謂峯頂遠跂予可瞻討忘緣袪天機脫屣恨不早祗恐歲云暮遂與空名老心往迹未幷慙媿山上草癸卯歲赴南豐道中聞京師失守寄權士繇韓幼深種田不遇歲策名不遭時胡塵晦落日西望泣路岐猛虎嘯北風麕麚皆載馳深泥駕疲牛踸踔余何之詰屈白道轉繚繞淸溪隨荒谷嘯山鬼深林啼子規長歎指故山三奏歸來詞不逢眼中人調苦車倭遲士繇松筠操幼深瓊樹姿別來平安不何階一申眉白雲失帝鄕遠水限天涯昂藏雙威鳳曷月還兩枝努力愛華髮盛年振羽儀但令迍難康不負滄洲期莫作新亭泣徒使夷吾嗤初晴抱琴登馬退山對酒望遠醉後作年長心易感況爲憂患纒壯圖迫世故行止兩茫然王旋方伐叛虎臣皆被堅魯人著儒服甘就南山田挈榼上高磴超遙望平川滄江大如綖隱映入遠天荒服何所有山花雪中燃寒泉得日景吐霤一作溜鳴湔湔舉酒勸白雲唱歌慰頽年微風度竹來韻我號鍾􅁌一彈一引滿耳􅀬知心宣曲終余亦酣起舞山水前人生幾何時大半百憂煎今日羇愁破始知濁酒賢賈員外處見中書賈舍人巴陵詩集覽之懷舊代書寄贈海岸望靑瑣雲長天漫漫十年不一展知有關山難適逢阮始平立馬問平安取公詠懷詩示我江海瀾蹔若窺武庫森然矛戟寒眼明遺頭風心悅忘朝餐大駕今返正熊羆扈鳴鑾公遊鳳凰沼獻可在筆端繫越有長纓封關祗一丸冏然翔寥廓仰望慙羽翰嘉會不我與相思歲云殫唯當就佳句持比靑琅玕寒夜溪行舟中作日沈諸山昬寂歴羣動宿孤舟獨不繫風水夜相逐雲歸恆星白露下天地肅月輪大如盤金波入空谷魏闕萬里道羇念千慮束倦飛思故巢敢望梧與竹沈吟登樓賦中夜起三復憂來無良方歸候春酒熟江上代書寄裴使君何地離念劇江臯風雪時艱難傷遠道老大怯前期疇昔行藏計祗將力命推能令書信數猶足緩相思與韓侍御同尋李七舍人不遇題壁畱贈三徑何寂寂主人山上山亭空簷月在水落釣磯閒藥院雞犬靜酒壚苔蘚斑知君少機事當待暮雲還李張皇甫閻權等數公竝有送別之作見寄因桉目錄有題字荅洞庭正波蘋葉衰豈是秦吳遠別時謝君篋中綺端贈何以報之長相思毘陵集卷第一終毘陵集補遺漢光武渡滹沱冰合賦以上天無親惟德是輔爲韻昔漢光武收河北之年馳馬將進滹沱在前爲敵所迫當冰不堅及軍裝隱轔以登岸殺氣崢嶸而塞川意者欲定神器於茲日彰聖人之動天若非使不道者喪有德者王則水不能以造次而結冰不能以斯須而壯變浩浩之流爲峩峩之狀擁高旌以進雷長轂以上及企路以全軍又迎風而破浪於時進隔關於長津顧邀遮其後塵患勢莫之敵沒不可振求一徑而莫遂惟羣臣之不親賴王霸至誠之力協光武至聖之德人從悅已之詐天贊勤王之􅀡故得舟楫不設衣裳不濡避地以往乘冰以趨一水之上兩軍相殊使後人視水則有求冰則無望飛塵而惆悵對寒流而踟躕由是知天人之合發與神祗而相符不然則何以延十二之祚總四七之輔滅新室流毒之日作漢氏中興之主受命之瑞也亦何異元女降於軒轅白魚躍於周武燕趙之閒淸流瀰瀰高風以遠遺躅於是懷玉案此賦當是試作英華文粹皆不載惟見於歴代賦彚卷五十三禎祥不知何自采入所限八韻失押惟字可見唐時賦律之寬也賀赦表集無見文苑英華五百五十八卷臣某言中使某至宣示赦書大赦天下者臣伏以作解宥過前王之茂典嚴配享神聖朝之縟禮非大孝無以肅祇宗廟非􅇝勳不得吿承天下伏惟皇帝陛下誕敷文德昭烈武功鋪於八埏橫被四海拯兆人之苦恢累聖之􅇝業伐叛問罪電發王師爲人除災爲時誅惡陛下恬神凝累儲道蘊德以義制事以欲從人雷霆之震也心不恕於兇戾元惡之戮也勳不書於􅂤策淡泊功德陰隲萬邦大哉聖王之爲君也無德而稱矣頃者賊臣伺梟獍之變翠華巡遊四方愁寃百神震駭誅剪大憝淸復闕庭事不稽於浹旬慶已延於萬億接踵之禍又起近郊犬羊猖獗相繼夷滅然後舉墜典修禮文鏟革繁苛捜揚嘉遯自上古之所不臣前聖之所未賔梯航而來悗當作悅我聲敎掃除氛沴日月載貞大安反側上下交泰而又發德音降明詔歸過罪已降去鴻名含生動植許遂其性草木知感況在人倫今以履端之初先陳盛禮豐潔􅂤易應時順人展敬於郊壇薦誠於淸廟丕昭列聖咸秩神祇抑臣聞之仲尼曰明乎郊社之禮禘嘗之義是陛下德合祖宗道符三五慶於祉福與天無疆鴻私湛恩溥施萬國洗蕩痕垢咸使維新牢獄空虛囚拘蕩滌禎祥鬱於川瀆嘉氣塞於乾坤天下臣妾不勝慶幸同前集無見文苑英華五百五十八卷臣某言伏奉今月某日制大赦天下恭承恩詔宣布藩隅􅀒瑕累者咸荷生成被傷痍者如蒙覆育中賀臣聞春以首時葢本於陽德澤以周物取􅁚於鴻私伏惟皇帝陛下出震繼明體元立極作解施會順時致和問安禮備於三朝班朔恩加於九有猶念􅆿不可變死不復生泣辜興慈納隍軫慮與民更始其命惟新禦魑魅者復還係桎梏者咸宥丹檄疑當作徼無滯黃沙已空疎漢網而遠無不賔祝湯羅而下無犯順雖水旱繫於常數每惻憂勤以征賦本於黎人載加蠲貸應天以實推已以誠疇庸懋能自家􅆿國或圖舊以延賞或錫類以崇先日月徧燭於幽明雨露不私於中外舊章備舉墜典咸秩崇儒術所以宏敎化旌孝義所以厚時風憫耆耋而廩賜有差廢橫斂而凶荒是禦皆歴代哲王之茂典今陛下脩一作惣而行之洋洋聖謨曠所聞見雖虞帝之孝殷后之仁垂拱而人無間然鞬櫜而兵不復用方於今日未足比崇臣幸屬昌期謬領藩服官惟責實未効涓埃之勞賞及無功亦洽一作沾渙汗之寵拜恩竊抃萬倍恒情餘姚盧學士文弨云此篇不似獨􅀌公手筆代獨孤將軍讓魏州刺史表集無見文苑英華五百七十六卷臣莊言伏奉今月十九日制書以臣爲中大夫持節魏州諸軍事守魏州刺史寵命光臨心靈震奪中謝臣才質汚濫學藝空疎往緣乏人謬參多士膏􅀨降而鮮鱗躍和風流而短翮飛遂以庸微累升淸貫天臺望重始預廊官帝贊務殷仍霑縣宰翊州司而罕效撫邊鎭而何功􅐶澤㫄滋皇明遠照曲顧先臣之舊不忘支屬之姻遷臣以大樹之榮總臣以儀本之任旣而力微招責祿厚延疴深慮卽塡溝壑不得重趨階陛伏屬天地仁慈聽臣入都醫療承恩之日頓咸當作減焦勞在路巳來小將瘳健若何以仰祗嘉惠俯策疲駑當河北之奥藩忝山東之厚寄魏郡太守豈岑熙之可攀冀州刺史寧籍章之敢列伏乞迴光斂露寢汗停綸矜臣竊位之誠遂臣量能之請庶知人之鑒影響不差循吏之聲期年而至無任忝冒屏營之至表陳讓以聞其所讓人別狀封進爲崔使君讓潤州表集無見文苑英華五百七十六卷臣某言伏奉今月日制書以臣爲使持節潤州諸軍事􅃳州刺史散官如故前命甫流後恩遄集進退惟谷憂喜聚門臣某中謝臣材質孤陋藝能鄙薄徒以頗承舊業遂得歷踐淸資國庠司級一作极非旣非所據六衞陪軒又無足採久欲避賢公府移疾家園不悟沖眷曲臨殊私屬委瓠溝東望始拜寵於韓臺竹里南浮遽遷榮於楚澤何以仰承皇寄俯緝甿謠伏乞日月迴光雲雨流霈深惟鑒察改任良能則朝有至公臣知免戾無任屏營之至代于京兆請停官侍親表代宗集無見文苑英華五百八十卷臣某言臣聞審官而用者君上之明也量力而動者人臣之義也然則審官先於責實量力在於知止苟違斯道是必終凶臣以薄劣素空行藝遭逢際會累忝驅馳自受京尹向逾周月上無報國安民之效下乏推賢審己類表作進善之能官􅉪日深内省知愧伏以去年冬末迄於今日竊聽閭閻頗有流散在於京輦亦多攘奪臣兄枉橫爲賊所傷哀苦之中忍恥尢甚雖久令分捕而竟未就擒臣之無能於茲可驗偷安重任夫亦胡顏況臣同氣數人相次淪沒閨門之内哭不絕聲應由臣無德而祿召此殃釁興言感慕痛骨摧心又臣老母素多羸瘵近從數載頗益沈綿臣妻先亡無人侍側飮膳衣服臣悉躬親頃任京兆少尹中間又司帑藏雖稱要劇亦有餘閒臣每退朝便道蹔親方藥自公言歸早見安否老母以數在左右都忘呻吟及臣典領大府事繁務切雞鳴而出暮夜方歸淸晝之時莫見親面凡所服餌或非調適心有未快類表作愜疾亦轉侵在臣焦灼類表作惶啓處無地專力飬則有妨吏職徇公事則闕奉慈顏忠孝兩􅉛紀綱將廢以天倫哀緒未平之日憂老母方寸已亂之時雖欲自強必不勝任倘漸荒府政小紊朝經類表作章他日噬臍固將何及或當重責已􅀒前恩是敢泣血祈天瀝肝請命乞特免臣所職就養私門非惟有光孝理實亦少裨元化􅀛蛇賤類上報何階烏鳥微情反哺斯足無任懇願迫切之至謹詣右銀臺門奉表陳乞以聞誠惶誠恐頓首頓首謝勅書兼賜冬衣表集無見文苑英華五百九十三卷臣某言伏奉某月日勅書慰問將士等跪承寵錫仰荷天慈忭躍周章不知所措臣某中謝陛下體仁恤遠崇德念功恩浹勳賢禮優方國臣行能無取志畧非長徒以嘗謬台司遂叨藩守誠寛覆餗之罪更切致寇之憂豈謂宸睠不遺天波薦及􅅄飾加於尸素恩意逮於庸微嶺嶂萬里迴日月之私照偏禆一介沐乾坤之厚施緇黃載躍班白相歡騰喜氣於城壘舞祥風於旌斾臣曠官已久無補休明戀闕慈當作滋深又移寒燠累忝逾涯之賜敢安非據之榮丘山至重灰壤寧報無任感恩戀主屏營之至爲郭令公請停親征表代宗集無見文苑英華六百十五卷臣某言經略副使太子右本誤有諭德傅濤至伏承鑾駕欲有親征恭聞聖旨載惶載懼臣以薄劣謬總元戎受命於朝成師以出雖志期靜難而力未摧兇邦甸多虞有貽聖慮遂使六軍雷動七萃天行臣實無能萬死餘責然臣面辭之日已具奏聞假令寇賊猖獗猶願陛下務於持重内安宗廟外固人心臣之素懷正在於此縱微臣智力淺短終無所成陛下仍須別擇英才授之師律豈有事非至切便欲親戎誠恐上國衣冠自生震恐遠方士庶更有驚疑以臣觀之竊謂非便兇虜傷沮其勢式遏集作其運已窮天威赫赫所向皆靡陛下責成之日愚臣死難之秋伏望付臣以專征委臣以集事囘鑾上國端拱中朝豈惟微臣受賜抑亦萬方幸甚謹奉表以聞鹿泉本願寺銅鐘銘本缺從文粹卷六十七補八音之列數者金爲長金聲之動物者鐘爲大相彼創制本乎無心隨輕重之所考遇􅇝纖而必應其體妙乎其幾神乎故帝庭用之以和樂梵宇作之而助道其有旨哉伊本願道塲昔鬼土所卜卽輪王建塔之地有隋氏因而緝焉皇唐統天增壯厥構雖臺殿有赫而鐘簴未雄曰都維那某等顯允令德鬱爲紀綱洞三學之奥府張二嚴之臣翼以爲是聲聞則有以敷衆美不則無以遍十方乃同寅叶恭唱議改作我心匪石彼應如雲緇流輔仁而或勤或懋淸信委施而爲岡爲陵於是乎遠貿精金博召良冶鳬氏宰陶人翼鎔範修林樸植火正叱咤以啓號風師䦧怒而陳力巨扇咆哮􅇝鑪赫曦焮奪淸夜光連紫微㫄通竇以決注下潛成於數圍察夫陰未凝陽爲烈爙爆泉沸氣憤雲􅂥旣旬而後實旣堅而後發轉於隧漸於堂混乎其輪圓洞然而博暢仙獸勒於下驪龍􅂿於上蓄精誠含寥亮乃神工之旣濟而寶器之大壯也且夫作有度而體有經侈奄均厚薄中則不播不石不鬱不柞雖鴻音未揚識者已知其妙矣故緇衆咸躍善願克充而縣之衣冠里之髦彥聚捨珍玩翕營層臺峻嶒百常沆瀣一色然後插雲柱倚天梯駢轆轤綰修索攢㔣力以下拔軋豐容而上昇雄以筍鱗顚以交扛猛以簴權作以離立大器斯屬􅇝椎乃鏗威音潼溶而一吼虓響岌嶪乎三界上極有頂下彌空輪飛行天仙海陸神識莫不警革塵滯褰開㝠蒙滌曠劫之瑕滅長夜之苦使浩福潛潤冥機坐融其諸佛神通之用乎不然者千鈞之聲一杵之播則曷以臻於是矣允釐僧移本三勢而克終式遏劍輪後四爰而長擊故初起細而促漸登鍠以舒旣銳而入微又增而復壯於是壯也乃而畢爲八字有誤若是者何皆皇覺啓導抑揚之深思也實欲普其念周乎仁張皇慈音引曵悲韻使萬物咸若六時登聞不惕不惶以安以樂或謂霆鬬雷裂山傾河􅂥靈祗殲走猛毅僵蹷皆恐怖殺傷之事我大雄氏慈制又悲乎然哉若乃顒顒聖賢翼翼龍􅁚以之懺薩以之引宣微妙其心精進厥德有秩有序不差不忒住持我象敎洋溢我元風洞達我幽明淸寧我邦國神之不可以已其在茲乎皇唐十有八年春仲月八日是鐘也旣成卽其秋孟月上􅁌茲臺也復構他方聖衆咸飛來而讚揚地中菩薩咸踊出而瞻仰於是陳巨會以落之張梵樂以考之煌煌乎休哉越寳庭之能事畢矣而宏範莫紀又八稔於斯河南史凛然文林之秀也尉於右邑攝茲銅章惠化一淸於灌壇希聲重美於􅇝器命我昭述式副羣心之望焉而主簿宏農楊量新尉楊光朝等竝高幹才敏力懋於道勉奉天秩允恭仁祠輔營樂石贊就厥美雖默者果得不言乎銘曰靈鐘上空儀法天體道内虛含至圓雄威蓄毓時乃宣震擊鏗鍠流大千十萬調御及聖賢應我眞聲開梵筵一切苦輪悲熾然聞我眞聲咸息肩虛空有盡福無邊神用莫大莫與先招北客文本缺從文粹卷三十三補蜀之先曰􅁞叢兮縱其目以稱王當周室淩頽兮亂無紀綱洎乎杜宇從天而降鼈靈泝江而上相禪而帝據有南國之九世蜀本南夷人也皆左其袵而椎其髻及通乎秦也始於惠王之代五牛琢而秦女至一蛇死而力士斃二江雙注羣山四蔽其地卑濕其風脞脆蠻貊雜處滇􅈎爲鄰地偏而兩儀不正寒薄而四氣不均花葉再榮秋冬如春暮夜多雨朝旦多雲陽景罕開陰氣恆昬以暑以濕爲瘵爲癘氣浥蟄以中人吾知重膇之疾兮將嬰爾身蜀之不可往北客歸去來兮其東則有大江澐澐下絕地垠百谷相吞出於荆門突怒吼劃附於太白渤潏硼砰會於滄溟跳噴浩淼上濺飛鳥蹙縮盤渦下旋黿鼉三峽兩壁亂峰如㦸嶬岈屹崪􅐓洞劃坼高於天電雲外水積晝日無光其下黑窄瞿塘無底淺處萬尺啼猿哀哀腸斷過客復有千歲老蛟能變其身好飮人血化爲婦人衒服靚裝遊於水濱五月之閒白帝之下􅇝濤塞峽不見灔澦翻天蹙地霆吼雷怒亦有行舟突然而去人未及顧棹未及舉瞥見陽臺不辨雲雨十里一歇日未移午須臾黑風暴起拔樹震山石走沙飛波騰浪翻舟子失據摧檣折竿漩入九泉沒而不還支體糜散蕩入石閒水族呀呀拔刺爭餐蜀之東不可往北客歸去來兮其西則有高山萬重峻極屬天西有崑崙其峰相連日月巡環閡於山巓巒崖盤嶔天壁夐絕陽和不入陰氣固閉千年增冰萬古積雪谿寒地坼谷凍石裂夏月草枯冬天水折蒼煙凝兮黑霧結人墮指兮馬傷骨江水噴激􅂞盤紆縈棧壁緣雲鉤連相撐繩梁嶫虛傍沓杳􅄀下不見底空聞波聲過者矍然亡魂喪精復引一索其名爲笮人懸半空度彼絕壑或如鳥兮或如玃倏往還來幸不落或有豪猪千羣努鬛射人寒熊孔碩登樹自擲見人則擘巨麋如牛修角如劍餓虎爭肉吼怒闞闞復有高崖墜石兮聲若雷之軿轟上敲下􅯳似火迸兮滿山流星礀溪忽兮倒流林崖爲之頽傾碎騰狖與過鳥駭木魅兮山精飛石壓人兮不可行西有犬戎與此山通形貌類人言語不同氊廬隆穹毳裘蒙茸啜酪啖肉持鎗挾弓依草及泉務戰與功其聲如犬其聚如蜂中國之人兮或流落於其中豈只掘鼠茹雪以取活終當鈹其足而纍其胸泣漢月於西海思故鄕於北風蜀之西不可往北客歸去來兮其南則有邛笮之關天涉險艱少有平地連延長山橫亘廬江隔閡百蠻吁彼漢原上當漏天靡日不雨四時霶然其人如魚爰處其泉終年霖霪時復日出㹞㹞諸犬向天吠日人皆濕寢偏死腰疾復有陽山之路毒瘴下凝白日無光其氣瞢瞢暑雨下濕黃茅上蒸南方之人兮不敢過豈止走獸踣兮飛鳥墮吾不知造化兮何知此方些蜀之南不可以往北客歸去來兮其北則有劍山巉巉天鑿之門二壁谽谺高㟁嶙峋上拄南斗傍鎭於坤下有長道北達於秦秦地神州中有聖人左右伊臯能致我君雙闕峩峩上覆慶雲千官鏘鏘朝於紫宸玉樓鳳凰金殿麒麟布德垂澤搜賢修文皇化欣欣煦然而春蜀之北不可以往北客歸去來兮毘陵集補遺終毘陵集附錄朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤公神道碑銘幷序中書舍人賜紫金魚袋博陵崔祐甫昔劉向稱賈誼言三代與秦亂之意其論甚美達於國體雖古之伊呂英華作管未能遠過又稱董仲舒有王佐之材雖伊呂無以加管晏之屬殆不及也於戲二君以偉才當盛漢之崇而位止於下國二千石祐甫聞於先君僕射曰主恩非臣下之所圖天命豈生人之所制有唐碩量深識之士曰獨孤常州諱及字至之河南洛陽人皇朝左千牛備身元慶之曾孫蔡州長史思􅌔之孫殿中侍御史贈祕書監通理之第四子仕而遭時鵠立於朝建旟東夏三著嘉績嗚呼痛乎奄忽捐館其時也大歴十二年夏四月二十九日其地也常州之路寢其壽也五十三年中朝名公素見知者後進之士聞義嚮風者洎濠舒常三州之百姓莫不塡英華作堪膺流眥英華有皆字非不宴不相浹辰彌月厚而惜之者往往失聲出涕沲若公有子朗郁等年未齠齓厥兄檢校水部員外郞兼侍御史汜方佐浙河東帥聞喪來奔半旬而至惋毒之甚如英華作情不欲生旣受吏人賔客之弔乃忍哀英華作死謀事以六月六日引使君之柩去常州歸洛陽其年歲次丁巳十月朔七日葬我使君於河南府壽安縣某原先祕監之塋左英華無左字以夫人博陵縣君崔氏祔焉禮也水部曰天之降割英華作災害於我家仲叔季盡矣吾將老矣吾弟常州之子未立今不刻石表墓則常州之令名何以傳於後乃託我故人敘而銘之常州稟元和以生幼有成人之量祕監府君親授以孝經常州一覽成誦祕監問曰汝志於何句對曰立身行道揚名於後世是志所尚也自是徧覽五經觀其大義不爲章句學成童丁祕監憂勺飮不入口者累日先夫人同郡長孫氏諭以不可滅性之義由是微進饘粥杖而後起旣免䘮加於人一等鄕族稱其孝焉長孫夫人高行明識訓導甚至常州漸敎成器卓然有立著延陵論君子謂其評議之精在古人右天寶末年以洞曉元經對策上第詔拜華陰縣尉著古函谷關仙掌二銘格高理精當代詞人無不畏服俄屬中原兵亂避地於越丁太夫人憂毀瘠過禮旣外除江淮都統使戸部尚書李峘奏爲掌書記授左金吾衞兵曹參軍軍旅之事非其所好未幾返初服今上卽位下詔收俊茂舉滯淹政之大者以公爲左拾遺凡所諫諍􅀡而不訏婉而不撓屬英華無屬字削藁訓英華作詭詞不傳於外遷太常博士時新平大長公主之子裴倣尙永淸公主初以太子少傅裴遵慶爲㛰主將行五禮公實相焉中使口宣詔旨易之大長公主後夫姜慶初常州曰㛰姻之禮王化之階以異姓之人主之不可甚矣某不奉詔中書令汾陽王時爲五禮本誤侯据英華改使從焉又百官薨卒定諡之際綜覈名實皆居其當與嚴河南郢酬答呂荆州諲諡議博而正當時韙之遷尚書吏英華作禮部員外郞受詔考第吏部選人詞翰旌別淑慝朝野稱正上方大䘏黎庶精選牧守以公爲濠州刺史平其徭賦恤其冤弱課績聞上加朝散大夫遷舒州刺史舒英華有之字境瀕江􅅖山羣盗所聚或蟠結林藪或趑趄城市本誤寺据英華改公惠以柔之武以讋之釋矛服耒盡爲良俗其他如在濠之政居一年璽書勞問就加尙書司封郞中錫以金章紫綬屬淮英華作江南旱歉比境之人流傭英華作移甚衆公悉英華作忠心以撫舒獨完安天子聞而休之擢拜常州刺史常州當全吳之中據名城沃土兵興之後中華翦覆吳中州府此焉稱大故朝之選牧恒屬意焉公宣中和平易之敎務振人毓德之體百姓蒙化遷善不知所以安而安之英華無之字吏不忍欺路不拾遺餘糧棲􅅕膏露降庭英華作之公平生聞人之善必揄敭之氣盡與之不啻若身得之後進有才而業未就者敎誨誘掖之唯日不足公之文章大抵以立憲誡世裦賢遏惡爲用故論議最長其或列於碑頌流於詠歌峻如崧華盛如江河淸如秋風過物邈不可逮公有集二十卷行於代若夫贊堯舜禹湯文武英華無文武二字之命爲誥爲典爲謨爲訓人皆許之而不吾試論道之任英華作位宜而不陟前是公之從英華作仲是兄季弟伯姊三年之間繼殁執天倫之喪如荼如蓼竟以無祿天何不仁然則賈與董名位不盡其材吾先君之歎主恩天命斯見矣銘曰常州之英華有德字孝行爲大葉校謂之下脫一字非也按下轉韻處皆七字句起此句行字當在孝字上則與下文皆配矣蒸蒸翼翼以敬以愛友於兄弟如捧如戴常州之義篤於英華有朋字友用之有恒行之可久扶危拯溺爾身我手常州之才施於英華有有字政撫柔三部以仁爲柄龔遂國僑千古迭映常州之文究其英華有原字本質取其正英華作深艷從其損在星之緯在衣之衮常州之年止英華有于字中身去昭昭之盛世與萬鬼而爲隣白馬江上靑烏洛濵鶺鴒在原嗟爾元昆縗袵英華作經霑血長號訴冤纂述遺美謂余不諼我遘英華作見之子將二十年相投藥石胡疚英華作疹不痊譬我於池子爲之泉譬我於桐子爲之􅃶榮不獨遂難不􅃗全如何淑明摧馥碎堅廞英華作斂衣楚挽徘徊墓田望之不見赴之無緣狸首斑如女手拳拳如天如天涕泣英華作泣涕漣漣一作狸首斑如女手拳知天如天如泣涕漣如朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤公行狀此狀原集所無從英華增入梁肅仲尼述易道於坤曰君子敬以􅀡内義以方外詩三百一言以蔽之曰思無邪公天生懿德外方内􅀡氣茂才全發爲時文得大易之中詩人之正邈乎其不可及已七歲誦孝經先祕書異其聰敏問曰汝志如何句公曰立身行道揚名之義集作於後是所尚也後博究五經舉其大略而不爲章句學確然有可大之業知者益器之十五祕書捐館公茹血集作銜恤在疚踰時而後杖由是鄕黨稱孝三集作二是十餘以文章遊梁宋間通人潁川陳兼長樂賈至渤海高適見公皆色授心服約子孫之契天寶十三年集作載應詔至京師時元宗以道莅天下故黃老敎列於學官公以洞曉元經對策高第解褐拜華陰尉故集有國字相房琯方貳憲部請公相見公因論三代之質乂問集作此六經之指歸王政之根源憲部大駭曰非常之才也趙郡李華扶風蘇源明竝稱公爲詞宗由是翰林風動名振天下及函洛寇擾公違難於江南上元初授左金吾兵曹掌都統江淮節度書記非其好也未幾徵拜右集作左拾遺因上疏陳便宜及方鎭有冒於貨賄舉􅀡錯枉大者十餘事不行皆焚其藁時大盜之後百度草創而太常典故尢所壞缺公爲博士祇考古道酌􅆓革之中凡有集作無損益莫不悉悉集作字當作事居其當新平公主之子裴倣尚永淸公主公實相禮初以裴僕射遵慶主㛰中詔長主後夫姜慶代焉公奏曰㛰姻人道之大使異姓主之非禮也且無以示天下臣不敢奉詔上從之又議定諡法公爲爲當作謂諡者葢跡其事業邪正而裦貶之舉一字可使賢不肖皆勸故其議呂禋盧奕郭知運等諡皆參用典禮約夫子之旨其事覈其文高學者傳示以爲式時有上議謂景皇帝未升尊位不宜爲太祖詔下百寮公按禮經以爲王者禘其祖之所自出而以其祖配之故三代皆以受命始封君配昊天上帝唯漢氏崛起豐沛豐公太公皆無位無功德不可爲祖宗故以高帝爲太祖若景帝肇啓王業建封於唐高祖原誤宗今改正因之遂以爲原脫此字据本文補有天下之號天所命也宜百代不遷因具故事條奏從之於是郊廟之禮遂定踰月拜公尚書禮部員外郞遷吏部每歲以書判試多士而朝列有以文學稱者必參校辨論定其甲乙丙科至是公分其任求爲郡守以行其道除濠州刺史公下車以淮士輕剽承兵革之後率多不法長吏不能制遂先董之以威格之以政然後用愷弟寛厚漸漬其俗三年而闔境大穰優詔褒美移拜舒州刺史又以行聞璽書就加朝散大夫檢校司封郞中賜金印紫綬其明年吳楚大旱餓夫聚於萑蒲者十七八唯舒安阜近者悅遠者來犬牙之境草竊不入上聞之詔曰斷獄歲減流庸日歸以人俗之豐給當淮湖之災旱爾守之力也擢拜常州刺史本州都團練使常州爲江左大郡兵食之所資財賦之所出公家之所給歲以萬計公削其煩苛均其衆寡物有制事有倫􅆿罰罕用頗類自息公又謂安人之道淸而靜之則定爲而察之則擾故寛以居之仁以行之一變而百姓不知其理又一變知其理而不知理之所由比及三年吏不忍欺路不舉遺年穀屢熟一作成災害不作甲辰歲冬十月二十日甘露降於庭樹二十七夕乃止嗚呼公庇斯一作方庇人人方仰公彼天不惠降此大厲爲郡之四載大歴十二年四月壬寅晦暴疾薨於位行路慟哭罷市者相弔踰月又吁嗟之聲相聞自寮屬相吏下逮鄕老里尹皆率以僃齋祭及葬之日緦衰送喪者數千人唯公體黃老之淸淨苞大雅之明哲尊賢容衆而交不諂瀆本仁祖義而文以禮樂乃至集作至乃溫良能斷應用不滯達識足以表微厚德足以載物善而不伐光而不耀内不機巧外無緇磷隤然中立豁若虛受其長人也先敎愛而後法禁不遷怒以臨下集作拘故威而不猛不私己以欺人故易而無僃其茂學博文不讀非聖之書非法之言不出諸口非設敎垂訓集作法之事不行於文字而達言發辭若山嶽之峻極江海之波瀾故天下謂之文伯有集二十卷行於代若藝文之士遭公發揚集作揮盛名比肩於朝廷則有故中書舍人吳郡朱巨川中書舍人渤海高參今尙書左丞天水趙璟職方員外郞知制誥博陵崔元翰考功員外郞潁川陳京禮部員外郞北海唐次蘇州刺史高陽齊抗其章章者也其睦親與善自內姻及朋友所知之家振窮分災恤孤哀喪頒祿歸贈必加於常人一等故啟手足之日室無餘財惟四布集作待賜布然後乃斂議者於是謂公有文子之淸子產之仁史魚之􅀡平仲之與人賈生之行義集作文學文翁之政事叔子之遺愛而不躋巖廊不享期頤闕致君論道之美以遺史􅁽故凡百以爲痛在昔孔文子以敏而好學爲文公叔發集有廩字恐非以恤衞國凶飢爲惠矧公功存於人言垂於代有文有質不沗前烈者與易名之禮請從令集作舊典謹狀尙書考功伏以褒德尙賢設敎之崇軌加諡易名飾終之令典謹按故朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤某蘊黃裳之服協中庸之德正詞復禮施化爲邦淸風存乎省寺遺愛結於黎庶具美之道何以尙茲窀穸旣安音徽日遠請追公叔之諡式播臧孫之列謹上唐故常州刺史獨孤及諡議權德輿將仕郞守太常博士權德輿議曰獨孤及剛方􅀡淸根於性術其修身莅官􅃀乎處中立言遣辭有古風格辯論裁正昭德塞違濬波瀾而去流蕩得菁華而無枝葉其摳衣入室之徒皆足以掌贊書而秉方􅁽則及之爲文可徵矣其爲博士時有上議景皇帝不宜爲太祖者詔下庶官及舉夏殷周漢之故事尊祖配天之大旨以爲景皇帝始封於唐天所命也於是定議爲一代典法新平長公主之子裴倣尙永淸公主欲以他宗主㛰及相禮上陳不可竟得以裴僕射遵慶爲主當時稱之定呂諲盧奕郭知運之諡用禮文憲度得褒貶之正凡所往復詞旨堅明其理舒州屬歲饑旱鄰郡庸亡什四巳上而舒人生聚悅安不知凶年優詔襃異就賜金紫其初在濠其後在常皆因俗爲理人用愛戴雖不得居公􅀸長帥之任然其奉常議論三郡績用亦足以列於文苑附於循吏按諡法曰博文多能曰憲獻一本作薦可替否曰憲及酌三王四代之典訓作爲文章以輔敎化是爲博聞位參中外必以稱職聞是爲多能定宗廟之饗爲獻一本作薦可正㛰姻之主爲替否有司稽美行而易其名者請諡及曰憲謹諡祭獨孤常州文崔祐甫維大歴十二年歲次月日外從祖舅朝散大夫權知中書舍人賜紫金魚袋崔祐甫遣表妷前鄧州南陽縣尉李綜以淸酌之奠祭於從外孫甥常州獨孤使君至之之靈往矣至之此時何時空原拱木荆榛狐貍林風月露以之增悲子之往也高格遠量秀氣茂姿亡兮何若有兮誰對豈流蘇寓馬從之巳而嗚呼哀哉王事適我政事一埤益我在籠而不能求其釋獨有懷君之淚臨秋風而自滴平生相期聊復一敘一以豁胸中之憤氣二以􅂤明靈而晤語吾與至之思宏道義自家􅆿國張維舉墜吾與至之思敦交好平居琢磨遇死赴蹈吾與至之思邁純德言爲士凖動有時則吾與至之思全高節風􅀨如晦嘐嘐不輟吾與至之思闡斯文不俾臯契獨謩華勛吾與至之談空覈元夢蝶喻筏去之蕭然吾與至之期諸晚歲偃臥山樊同披薜荔舉其大較良難名數念我交情千枝萬縷霜風掃葉或散或聚萬化紛然同歸野土向之所務孰云其主嗚呼哀哉爛然澄酤平昔共歡如何此奠取象於觀我思此飫子必吾劇目想道周暫畱徒御所可懷者徐生之絮新唐書本傳獨孤及字至之河南洛陽人爲兒時讀孝經父試之曰兒志何語對曰立身行道揚名於後世宗黨奇之天寶末以道舉高第補華陰尉辟江淮都統李峘府掌書記代宗以左拾遺召旣至上疏陳政曰陛下屢發德音使左右侍臣得􅀡言極諫壬辰詔書召裴冕等十有三人集賢殿待制以僃詢問此五帝盛德也然頃者陛下雖容其􅀡而不錄其言所上封皆寢不報有容下之名無聽諫之實遂使諫者稍稍自鉗口飽食相招爲祿仕此忠鯁之臣所以竊歎而臣亦恥之十室之邑必有忠信況朝廷之大􅀸大夫之衆陛下選授之精歟假令不能如文王之多士其中豈不有溫故知新可懋陳政要而億則屢中者陛下議政之際曾不採其一說堯之疇咨禹之昌言豈若是邪昔堯設謗木於五達之衢孔子曰以能問於不能以多問於寡然則多聞闕疑不恥下問聖人之心也願陛下以堯孔心爲心日降淸問其不可者罷之可者議於朝與執事者共之使知之必言言之必行行之必公則君臣無私論朝廷無私政陛下以此辨可否於獻替而建太平之階可也師興不息十年矣人之生產空於杼軸擁兵者第館亙街陌奴婢厭酒肉而貧人羸餓就役剝膚及髓長安城中白晝椎剽吏不敢詰官亂職廢將墯卒暴百揆隳刺如沸粥紛麻民不敢訴於有司有司不敢聞陛下茹毒飮痛窮而無吿今其心顒顒獨恃於麥麥不登則易子齩骨矣陛下不以此時厲精更始思所以救之之術忍令宗廟有累卵之危萬姓悼心失圖臣實懼焉去年十一月丁巳夜星隕如􅀨昨淸明降霜三月苦􅀬錯繆顚倒沴莫大焉此下陵上替怨讟之氣取之也天意丁寧譴戒以警陛下宜反躬罪已旁求賢良者而師友之黜貪佞不肖者下哀痛之詔去天下疾苦廢無用之官罷不急之費禁止暴兵節用愛人兢兢乾乾以徼福於上下必能使天感神應反妖災爲和氣矣又言減江淮山南諸道兵以贍國用陛下初不以臣言爲愚然許卽施行及今未有沛然之詔臣竊遲之今天下唯朔方隴西有吐蕃僕固之虞邠涇鳳翔兵足以當之矣自此而往東洎海南至番禺西盡巴蜀無鼠竊之盜而兵不爲解傾天下之貨竭天下之穀以給不用之軍爲無端之費臣不知其故假令居安思危以僃不虞自可阨害之地俾置屯禦悉休其餘以糧儲屝屨之資充疲人貢賦歲可以減國租半陛下豈遲疑於改作逡巡於舊貫使大議有所壅而率土之患日甚一日是益其弊而厚其疾也夫療廱者必決之使潰今兵之爲患猶廱也不以漸戢之其害滋大大而圖之必力倍而功寡豈易不俟終日之義邪俄改太常博士或言景皇帝不宜爲太祖及據禮條上諡呂禋盧奕郭知運等無浮美無隱惡得襃貶之正遷禮部員外郞歴豪舒二州刺史歲饑旱鄰郡庸亡什四以上舒人獨安以治課加檢校司封郞中賜金紫徙常州甘露降其廷卒年五十三諡曰憲及喜鑒㧞後進如梁肅高參崔元翰陳京唐次齊抗皆師事之性孝友其爲文彰明善惡長於論議晚嗜琴有眼疾不肎治欲聽之專也子朗郁毘陵集附錄終
