body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及集序三首檢校尙書吏部員外郞趙郡李公中集序唐故左補闕安定皇甫公集序唐故殿中侍御史贈考功郞中蕭府君文章集錄序讚六首蘇州刺史兼御史大夫襄武李公寫眞圖讚尙書右丞徐公寫眞圖讚幷序楊起居畫古松樹讚張侍御寫眞圖讚佛頂尊勝陁羅尼幢讚幷序觀世音菩薩等身繡像讚幷序檢校尙書吏部員外郞英華無九字趙郡李公一作華中集序志非言不形言非文不彰是三者相爲用亦猶涉川者假舟檝而後濟自典謨缺雅頌寢世文粹作王道陵夷文亦英華作敎下衰故作者往往先文字後比興其風流蕩而不返乃至有飾其辭而遺其意者則潤色愈工其實愈喪及其大壞也儷偶章句使枝對葉比以八病四聲爲梏拲拳拳文粹無二字守之如奉法令聞臯繇史克之作則呷然笑之天下雷同風驅英華作馳雲趨文不足言言不足志亦猶木蘭爲舟翠羽爲檝玩之於陸而無涉川之用痛乎流俗之惑人也舊英華作久矣帝唐以文德旉祐英華作乂于下民被王風俗稍丕變至則天太后四字文粹作天后時陳子昂以雅易鄭圓英華作學者浸而嚮方天寶中公與蘭陵蕭茂挺長樂賈幼幾勃焉復起振中古之風以宏文德二語英華及文粹俱作用三代文章律度當世公之作本乎王道大抵以五經爲泉源抒情性以託諷然後有歌詠美敎化獻箴諌然後有賦頌懸權衡以辯天下公是非原本無非字据文粹増然後有論議至若記敘編錄銘鼎刻石之作必採其行事以正褒貶非夫子之旨不書故風雅之指歸刑政之本根英華作根本忠孝之大倫皆見於詞英華於詞下有然後中古之風復􅄱於今十字於時文士馳騖颷扇波委二十年閒學者稍厭折楊英華作抑揚皇華而窺咸池英華作韶之音者什五六識者謂之文章中興公實啟之公名華字遐叔趙郡人安邑令府君第三子質􅀡而和純固而明曠達文粹作遠而有節中行而能斷孝敬忠廉根於天機執親之喪哀達神明其英華作而任職􅁵績英華作務外若坦蕩而内持正性諫不犯顏英華作謙而不犯見義乃勇舉善唯懼不及務去惡如復讎與朋友交然諾著於天下其偉詞麗藻文粹無藻字非則和氣之餘也學博而識有餘才多而體愈迅每述作筆鋒二字英華作則筆端風生聽者耳駭開元二十三年舉進士天寶二年舉博學宏詞皆爲科首由南和尉擢祕書省校書郞八年歴伊闕尉當斯時唐興百三十餘年天下一家朝廷尙文夫羿工乎中微拙於使人無己譽公才與時幷故不近名而名彰時輩歸望如鱗羽之於虬鸞也十一年拜監察御史會權臣竊英華有政字柄貪猾當路公入司方書岀按二千石持斧所嚮郡邑英華作列郡爲肅爲姦黨所嫉不容於御史府除右補闕祿山之難方命圮族者蔽天聰明勇者不得奮明者不得謀公危行正詞獻納以誠累陳誅兇渠完封疆之策􅕡犬迎吠故書畱不下時繼太夫人在鄴初潼關敗書聞或勸公走蜀詣行在所公曰柰方寸何不若文粹無二字閒行問安否然後輦母安輿而逃謀未果爲盜所獲二京旣復坐謫杭州司功參軍文粹脫司功二字太夫人棄敬養公自傷悼以事君故踐位亂而不能安親旣受汙非其疾而貽親之憂及隨牒願終養而遭天不弔由是銜罔極之痛者三故雖除喪抱終身之戚焉謂志巳􅉛文粹作厭息陳力之願焉因屛居江南二字英華作江淮閒省躬遺名誓心自絕無何詔復授左補闕又加尙書司封員外郞璽書連徵公􅀸巳下傾首延佇至止之日將以司言處公公曰焉有隳節奪英華作辱志者可以荷君之寵乎遂移疾英華作稱病請吿故相國梁公峴之領選江南也表爲從事加檢校吏部郞中文粹無中字明年遇風痺徙家於楚州英華作楚州山陽縣文粹作山陽疾痼英華作痛貧甚課子弟力農圃贍衣食英華作服雅好修無生法以冥寂歴文粹無歴字是思慮視爵祿形骸與遺土同唯吳楚之士君子譔家傳修墓版及都英華作郡邑頌賢守宰功德者靡不齎貨幣越江湖求文於公得請者以爲子孫榮公遇暇英華作勝日時復綴錄以應其求過是而往不復著書少時二字英華作素所著書多散落人閒自志學至校書郞巳文粹作以前八卷幷常山公主誌文竇將軍神道碑崔河南生祠碑禮部李侍郞碑安定三孝論哀舊遊詩韓幼深避亂詩序祭王端員外沈起居興宗裴員外騰文別元亘詩幷楊騎曹集序王常山碑竝因亂失之懷玉按自志學至失之八十六字從文粹及英華補名存而篇亡自監察御史巳後所作頌賦詩歌碑表敘論誌記贊祭凡一百四十三篇公長子羔字宗緒編爲二十卷號中集其中陳王業則無疆頌主文而譎諫則言毉含元殿賦敦禮敎則哀節婦賦靈武三孝讚表賢達盛德則崔賓客集序元魯山碣房太尉德政碑平原張公頌梁國李公傳德先生誄權著作墓志李太夫人傳盧夫人頌一死一生之閒杼其交情則祭蕭功曹劉評事張評事文吟詠情性達於事變則詠古詩思舊則三賢論辨􅀸大夫之族姓則盧監察神道碑思自敘則别相里造范倫序詮佛敎心要而合其異同則南泉眞禪師左溪朗禪師碑其餘雖波瀾萬變而未始不根於典謨故覽公之文知公之質不俟覿容貌聽詞氣假令束帶立於史臣之位足以潤色王度天而病之時不幸歟時不幸以後文粹絕異公之病也嘗以斯文見託詒某書曰桓譚論揚雄當有身後名華亦謂足下一桓譚也及於公才宜播其述作之美明於後人故拜命之辱而不讓今著其文德冠於篇首焉自監察御史已後迄至于今所著述者公長男字宗敘編而集之斷自監察御史巳前十卷號爲前集其後二十卷頌賦詩碑表敘論誌記讚祭文凡一百四十四篇爲中集其中陳王業則無疆頌議世道則原卜論質文論主文而譎諫則言醫含文殿賦敦禮敎則哀節婦賦靈武二孝讚與外孫女二孩書表賢達盛德則元魯山碣房太尉頌德銘崔賓客集序平原張公頌梁國李公傳德先生誄權著作墓表李夫人傳盧夫人頌一死一生之閒杼其交情則祭蕭功曹劉評事張博士文吟詠情性達於事變則詠古詩辨􅀸大夫族姓則盧監察神道碑思舊則三賢論自敘則别相里造范倫序詮佛敎心要而㑹其異同則南泉眞禪師左溪朗禪師碑其餘雖比興萬變而未始不根於道德故覽公之文知公之質不俟覿容貌聽詞氣而後覩其行若使束帶立於史臣之位具僃獻替足以潤色王度正一代之訓典天而病之國不幸也然遐叔身甚病而心甚壯文益贍而才不竭則前路逸氣詎可度矣他日繼於此而作者當爲後集及常游公之藩也久故錄其述作之所以然著於篇懷玉按自監察御史以下見於文苑英華者如此而英華注中但載然遐叔以下五十八字與原集公之病也以下文字互異今僃錄之以俟考焉文粹脫平原張公頌梁公李公傳十字餘同唐故英華無二字左補闕安定皇甫公集二字文粹作冉文集序五言詩之源生於國風廣於離騷著於李蘇盛於曹劉其所自英華有者字遠矣當漢魏之英華無之字閒雖已朴散爲器作者猶質有餘而文不足以今揆昔則有朱絃踈越大羮遺味之歎歴千餘歲至沈詹事宋考功英華作員外始財成六律英粹作呂彰施五色使言之而中倫歌之而成聲緣情綺靡之功至是乃僃雖去雅寖遠其麗有過英華作近是於古者亦猶路鼗出於土鼓篆籒生於鳥跡也沈宋旣殁而崔司勳顥王右丞維復崛起於開元天寶之閒得其門而入者當代不過數人補闕其人也補闕諱冉字茂政元晏先生之後英華有也字文粹無銀靑光祿大夫澤州刺史諱敬德之曾孫朝散大夫饒州文粹無銀靑下二十二字樂平縣令諱价之孫中散大夫文粹無四字潭州刺英華作長史諱顗之子十歲能屬文粹無屬字文十五歲文粹無歲字而老成右丞相曲江張公深所歎異謂淸穎秀㧞有江徐之風文粹無謂下十字伯父祕書少監彬尢器之自是令問休暢舉進士第一歴無錫縣文粹無縣字尉左金吾兵曹今相國太原公之推轂河南也辟爲書記大歴二年文粹作載遷左拾遺轉右文粹作左補闕奉使江表因省家至丹陽朝廷虛三署郞位以待君之復不幸短命年方五十四而沒嗚呼惜哉君忠恕廉恪居官可紀孝友菾讓自內刑外言必依仁交不苟合得喪喜慍罕見於容故覩君述作知君所尙以景命不永斯文未臻其極也葢存於遺札者凡三百有五十篇其詩大略以古之比興就今之聲律涵詠風騷憲章顏謝至若麗曲感動逸思奔發則天機獨得非師資所奬每舞雩詠歸或金谷文會曲水修禊南浦愴別新意文粹作聲秀句輒加於常時一等才鍾於情故也君母弟殿中侍御史英華無五字曾字孝常與君同稟學詩之訓君有誨誘之助焉旣而麗藻競爽盛名相亞同乎聲者方之景陽孟陽孝常旣除喪懼遺製之墜於地也以及英華作予與茂政前後爲諫官故銜痛編次文粹作集以論譔見託遂著其始終以冠於篇唐故英華無二字殿中侍御史贈考功郞中英華無五字蕭府君英華作蕭君文章集錄序足志者言足言者文八字英華作詩者志之所之也情動於中而􅄱於聲文之微也粲於歌頌暢於事業文之著也君子修其詞立其誠生以比興宏道殁以述作垂裕此之謂不朽侍御諱立南蘭陵人也御史中丞汝州刺史府君之仲子奕世純嘏英華作厚及公始大襁褓克岐十五而立神靜氣和才與道幷孝悌忠信以爲己任行有餘力故幼而學文嘗謂揚馬言大而迂屈宋詞侈而怨㳂其流者或文質交喪雅鄭相奪盍爲之中道乎故夫子之文章深其致婉其旨􅀡而不野麗而不艶天寶元年詔徵賢良方正以僃多士公時年十七射策甲科盛名翕然震諠英華作怛京邑論者知遠大之跡自此始也旣而荏苒宦途遭遇世故歴佐戎幕周旋江海攸徂之邦必聞其政嘉謨成績藏在諸侯之策旣言中彝倫亦動與吉會由是自廷評尉拜監察御史轉殿中侍御史三字英華作丞觀其逐逐利往􅄀㝠翰飛方將乘驚風以騁騖視靑雲如咫尺天道何善而無報與其才而不與其壽成其器而不成其志命矣夫斯才也而有斯年也公之元兄尙書庫部員外郞兼侍御史曰某與公俱以文學政事爲臺閣領袖丹穴之雙鳳纔舉棠棣之一花先落天倫之慟可勝旣耶以公瑰姿瑋英華作璞度利器淑德與東流皆逝今則已矣可以藏遺芳以示後嗣者其唯夙昔麗藻平生翰墨乎於是茹痛開緘抆英華作收血散帙緝其遺札得詩賦贊論表啟序頌銘誄誌記凡若干篇編爲五卷以爲集錄庶幾弔賈生者省鵩集之日問相如者知禪草英華作封禪猶存云爾蘇州刺史兼御史大夫襄武李公寫眞圖讚作繢精至於藝懸解擬公德容四字英華作擬公之德容與化同製獨立正色神和氣邁婉兮淸揚若聞嘉話公綽不欲仲山匪懈形乎懿範觀者目駭百城仰止羣吏儆戒成務安民亦猶此英華作作畫尙書右文粹作左非丞徐公寫眞圖讚幷序侍御史韓公志英華作至淸以學藝書畫之美聞於天下辛丑歲三月以王事靡盬館英華作客於豫章與前尙書右丞徐公同舍於慧命英華作明寺之淨室室一作宇嘗以暇日裂素灑翰寫英華作畫徐公之容英華作貌陳於公之座隅而美目方一作箕口和氣秀骨毫􅁵無差若分形於鏡入自外者或欲擎跽曲拳文粹作揖讓俯僂拜英華作上謁不知其畫也衆君子嗟嘆之不足則言以讚其美及亦繼唱於後二字一作其讚英華作詞曰文粹無讚曰二字哲匠運思天姿是具假之筆精實以神遇居然成􅁚豁若披霧瞻仰一作如瞻神鋒如窺武庫婉婉高識昂昂獨步絕頂孤松空陂英華作波白鷺不犯之色匪躬之故孰知造文粹作其化亦在毫素楊起居畫古松樹讚道在毫末神凝意注闖然物生千歲古樹龍蠖盤屈精魅固護霜封雪埋翠幄如故宜搆大厦胡爲中路豈猶有待公輸之顧落落貞姿傳之繪素張侍御寫眞圖讚堂堂乎張洵美且恭執法柱下分形畫工玉立天英華作冰姿霜淬神鋒武庫森戟寒山勁松方彈獬豸以佐䕫龍他年雲臺與古同風佛頂尊勝陁羅尼幢讚幷序道無形相心英華作不離文字非言無以導引故諸法生於假名非智無以調伏故大音傳於密敎茫茫五濁客塵覆之根識相緣生滅相隨世未英華作王有爲之牢獄二乘求惠而著空十地英華作住見性而弗英華作不了微我智印侯誰司南敦英華作故如來以大悲自定之慧力示惣持無畏之祕藏雲覆世界雷震羣有淨除我垢令入法性設字英華作宗根本假文以筌意也足聲齒舌因音以見法也以十四音英華作意攝一切智雖入無漏而不捨有爲卽色以證空也奉之者惡趣固可使開英華作關閉黑業必爲之淸淨況勝緣乎初太保韓國苗公以兩朝秉鈞所積廩賜顧命英華作令宗子家老曰喪祭之餘以庀功德於是我相國潁川公將演成公宏誓之果也五字英華作宏恩廣慧是以樹因此幢韓公生代天工德本植焉殁無鬼責惠牙滋焉而潁川公猶興哀於絕􅃶之地將乞靈於無我之法度英華作庶俾法雨􅀨公身田故琢貞英華作堅石以刊微言仰之贊之如揭日月烏戲墨點之界有極鐵圍之山有壞唯梵音與法印等空虛而無窮則公之前際疇可宏英華作彌婺本作宏度其辭曰六趣輪轉根塵相刃死生變化如響如瞬英華作如嚮如勝何用拯溺揔持祕印道罔不在宏之者人乃經英華作繼靈幢公子之英華作是因贊持大力啟迪迷津天魔遁形地獄開門㧞箭解縛如日破昬韓公善根與石長存觀世音菩薩等身繡像讚幷序元年建寅月前相州安陽縣令何昌系以是月甲子當受生之辰痛欲報而罔極哀見在之無住顧非大雄之􅄌法雲之悲則莫能救拯我無明苦果敷祐我宏誓願力乃彰施五色以刺繡成文寫菩薩之眞相等觀音之全身於是乎諦觀晬英華作􅄌容瞻仰聖位知海潮之梵音不遠蓮花之法座英華作塵可識將令功德池水漑灌英華作灌漑其三業菩提根牙發生於一􅀨至哉安陽之樹善也宏矣欲廣其善利以偈讚云英華作日法雲垂蔭光破黑業五眼周視四魔怖懾以色觀空於相見法永殖􅄌英華作茲緣恆英華作河沙億刼毘陵集卷第十三
