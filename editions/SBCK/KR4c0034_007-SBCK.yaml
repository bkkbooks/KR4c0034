body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及銘三首仙掌銘幷序古函谷關銘幷序􅇝州大雲寺銅鍾銘頌慶鴻名頌幷序阮公嘯臺頌幷序碑陳畱郡文宣王廟堂碑幷序論吳季札論仙掌銘幷序陰陽開闔英華作闢元氣變化泄爲百川凝爲崇山山川之作與天地竝疑有眞宰而未知尸其功者若文粹作有若巨靈贔屭攘臂其閒左排首陽右拓太華絕地軸使中裂坼山脊爲兩道然後導河而東俾無有害畱此巨跡於峯之顚後代揭厲於元蹤者聆其風而駭之或謂詼詭不經存而不議及以爲學者拘文粹作惣其一域則惑英華作感非於餘方曾不知創宇宙作萬􅁚月而日之星而辰之使輸轉還遶箭馳風疾可駭於俗有甚於此者徒觀其陰騭無朕未嘗駭焉而巨靈特以有跡駭世世果惑矣天地有官英華作觀陰陽有藏煆煉六氣作爲萬形形有不遂其性氣有不達於物則造化英華作物者取元精之和合而散之財而成之如埏埴鑪錘之則英華無則字爲瓶爲缶爲鉤爲棘規者矩者大者細者然則黃河華嶽之在六合猶陶冶之有甁缶鉤棘也巨靈之作於二字英華作居也自然七字文粹作於其自然蓋萬化之一工也天機冥動而聖功啓至英華作元精密感而外物應故有無跡之跡介於石焉可以見神行無方妙用不測彼筦窺者方循跡而求之揣其所至於巨細之境一作際則道斯遠矣夫以手執大􅁚力持化權指揮太極蹴􅂿顥氣立於無閒行乎無窮則捩文粹作據長河如措杯擘太華若破塊不足駭也世人方以禹鑿龍門以文粹作而導西河爲神奇可不爲文粹作謂大哀乎峩峩靈掌纖指如畫隱轔磅礴上揮太淸遠而視之如欲捫靑天以文粹作而掬皓露攀扶桑而捧白日不去不來若飛若動非至神曷以至文粹作生此唐興百三十有八載余尉於華陰華陰文粹無陰字人以爲紀􅙜嵫勒之罘頌嶧山銘燕然舊典也元聖巨跡豈帝者巡省伐國之不若歟其古之闕文以俟知言歟仰之歎之斐然英華無二字琢石英華作玉爲志其詞曰天作高山設險西方至精未分川壅而傷帝命巨靈經啓地脈乃眷斯顧高掌遠跖砉如剖竹騞若裂帛川開山破天動地拆黃河太華自此而闢神返虛極跡挂石壁跡豈我名神非我靈變化翕忽希夷杳冥道本不生化亦無􅄱天何言哉山川以寧斷鼇補天世未覩焉夸父文粹作娥愚公莫知其蹤屹彼靈掌懸諸巃嵸介二大都亭亭高聳霞赩煙噴雲抱花捧百神依憑萬峯朝拱長於上古以閱羣動下視衆山蜉蝣蠛蠓彼邦人士永揖遺烈瞻之在前如揭日月三川有竭此掌不滅古函谷關銘幷序王者建邦經野觀􅁚立極於是有重門擊柝以待暴客故封略土宇守在關塞山川邱陵爲之城池天作崤函俾屏京室崇山􅂞合連岡藂倚長河屈盤萬里來束崖奔嶺蹙谷抱溪鬬崛起重險爲秦東門截函夏於閫閾鏁天府於戶牖外扼九文粹作入州之咽喉故百二形焉内擁六合之奧區故霸王出焉當其周英華作中原鹿駭戰國蝟起嬴氏建瓴山東擇肉宇内持戟百萬連衡此關是時也開關而九國師遁振策而二周鼎人奄有大寶遂吞中區及二字英華作國洎江返秦璧天祐漢祚高皇帝提劒而西英華作起以遏亂略斬白帝紲降王舉漢中平咸陽廓金城以建都活萬姓於英華作以三章取威定功此焉是保粵若詢事國牒聆風仙籙則眞氣靈蹤起乎其中柱史一去流沙萬里畱玉函於舊宅傳寶圖於本枝豈上帝乃眷興王是感不然何錫羨開國如此其盛文粹作大耶歲歳上英華有其太二字在大火余適下陽停驂塞門憑覽舊國衿帶如故世道不畱秦餘空山漢爲英華作遺茂草恐復舟失於壑岸化爲谷萬載之後昧者不知乃刻頌此石以示來裔其詞曰天地雷雨英雄交爭設險守國作藩于京姓易時移山空塞平千秋陵谷想見精靈仙駕長往雄圖杳冥何英華作于以志之勒碑巖扃洪州大雲寺銅鍾銘參變化孕律呂和神人莫疾於聲故天地以雷震萬物聖人以樂節八風佛土以鍾警六時天造聖作同符異貫自眞乘開設其輪三轉􅁚教不墜而法鼓之制存二字英華作製在焉彤彤蓮宮于江之濱萬井在其前善惡興乎人將欲誕敷我法音啓迪我善根我英華無我字是以作萬鈞之鍾太其器所以昭其度也侯誰尸之長者杜海洎此文粹作北方上士釋文粹作精法觀釋法吳本作精鸞與比丘衆百三十有五人實果其願將辦所作于時火官金工脩英華作循厥戒令法英華作範陰陽九六之數以合造化均薄厚侈弇之齊以諧淸濁聚精會神鳩工於其閒宏誓旣達昬疑皆破故衆心如城施者如市大悲之感與萬靈接況英華無況字祝融囘祿髣髴交應越五月英華作日辛丑新鍾成於是此邦民大和會膜拜縱觀盈川塞衢英華作川塞衢溢億兆諦聽鯨魚乃發訇然如扶搖號而萬竅怒霹靂作而崇山破在坑滿坑在谷滿谷金界岌峇若震若盪旣而拗怒散渙與􅂞飇俱激越若英華作度越大千周流六虛經於嚴英華作禁城入于梵宮徘徊乎霜天淩厲乎淸夜千門徹萬戶警魚龍皆奮蟲豸不蟄於是聆其音者貪騃遷善聾盲知方識浪安流地獄淸涼吒王解刑刀輪摧藏嚴乎心者聞聲以知受觀受以悟法若露淸耳根鏡照身業彼金鼓聲氣木鐸徇路整衆孚號方斯陋矣蓋聖人宏道以勸善因善以建法作法器以爲天下利利者敎之果法者敎之因善者敎之宗我鍾乃英華作我懸是訓是崇世界有極大音無窮慶鴻名頌幷序唐興百三十有英華無有字八載皇帝在宥天下鑄五兵爲農器栖萬姓於壽域道證德洽神人以和春正月冢臣上將􅀸士庶尹洎三老五更公侯伯子男相與揭厲皇猷請增明號上撝謙而未許也僉曰陛下孝達神明道起先帝以德則符廣運以時則復太朴以功則保定丕業格于上下而尊稱猶淺鴻名未光億兆之心何戴神祗之望何塞天子南嚮英華作向南而讓者九不得巳而俞之乃命有司具昭吿之禮二月乙酉僃法駕朝太淸宮敕英華作飭宮神以洒掃詔月將使警蹕雲動天旋至於靈壇報功乎三淸祈禠英華作福乎上元景戌享太廟用明水越席玉豆彫篹之禮焫蕭以合薌灌鬯以報魄英華作魂神休擁而萬靈接精意陳而六幽感丁亥朝羣臣於蓬萊前殿於是四方人大和會命太尉班五瑞合六樂遂展禮奉策虔受大號曰開元天地大寶四字英華作天寶聖文神武證道孝德皇帝是日也解商野之三網受塗山之萬玉大赦天下與人更始協時月同度量贊傑俊書雲物恤高年禮大祗接天瑞受地釐撫柔萬邦存省其安危遂迎日推筴布慶行賜扇薰風調元氣拓英華作接千歲之大統操三皇之遺珠垂其衣裳與天地合符樂遍禮崇乘輿乃入然後屏椒房而徹黃屋徜徉乎大庭氏之館迫兮凝神怳英華作沈兮存眞想􅇝崖廣成之倫披霓裳而下鳳闕蹁蹮左右上千萬壽凡遭逢昌運沐浴聖渥而不能頌蒸人賦江漢吉甫仍叔之罪也臣敢有二事乃作頌曰穆穆閟宮敷時繹思天有成命孝孫受之鋪衍下土報功神祗我瑞如山我福孔夷聖敬攸感上元豈私誕受鴻名載揚緝熙風動雲行雨飛露垂昆蟲昭蘇草木阜滋恭已南面無爲之師英華作端拱無爲柏皇尊盧萬代一時昭假遲遲上帝是祗永錫多祜萬壽無期阮公嘯臺頌幷序按晉陽秋阮公諱籍字嗣宗陳畱尉氏人也夫雲蒸於山不擇時而出故公以全德生於衰世於時中州多故大道浸缺於用者知膏火自鑠逃乎累者懼木雁兩傷公由是内張道機外隳天彀土梗聖智粃糠軒冕遂登廣武以覽古望梁臺而寓詞埋照于竹林放神于蓬池德充也爾其興懷昔遊故爲東平相貽情善釀故受步兵校尉㢮張蘧甯之際出處夷惠之表否泰莫得介於靈府名實不足汨其沖氣螭蟠龍臥與道偕隱所以沈吟志全慷􅁣神王獨立長嘯遺榮此臺當其寓興也蓋將毫視泰山囊括顥氣頽然自得與造化者爲友故卷其用而懷之世莫得而窺也其外物所感則寄之翰墨焉謂道莫至于專氣抱一於是著釋老論哀莫大於矯時死名於是有弔比干文情動於中而形於言賦詠懷詩問道蘇門笑而不荅作大人先生傳歲在元黓余登大梁之墟墟中之人方誦公遺塵歎元風蕪沒議樂石以旌朽壤余採其故事之存於糟粕者勒而爲嘯臺頌頌曰天下多故賢人穀恥隱於沈飮以俟傾否越禮逃用晦德忘已不知我者謂我狂且長嘯懷人詠古著書感時而慟非必窮途沔彼汴水東流無返跡是人非荒臺可踐升高延佇想見靑眼道烏乎在日逝日遠一本云五運相錯三徴交戾天地之氣有時而閉君子迷陽亦旣懸解萬象離境一杯韜世大辯不言至淸無徒泠然長嘯味道之樞神和天倪跡寄窮途物我兩忘獨與化俱湯湯汴河東流不返之子巳往德音日遠荒臺未傾嘉樹勿翦升高延佇想見靑眼山有萊隰有􅅔逝者不作吾誰與歸望古刻石永昭淸徽陳畱郡文宣王廟堂碑幷序唐天寶十有一載歲次壽星陳畱郡守河南道採訪處置使元彥沖吳本缺五字所以崇德樹風敬教勸學初公以三務之􅂩分命有司修廢功舉墜禮而此堂也舊規偪陋下宇吳本作而將壞我是以有經始之制冬十月丙午新宮成凡天下有道則文教大洽爲政者克廣舊典以尊先聖禮也浚儀令河東裴勝叶恭大猷祇奉成績乃立石於廟庭以旌盛德所庇云有三才然後有剛柔剛柔交而利害作乎其中於是橫目蚩蚩天不能節黃帝堯舜氏始以仁義拯溺其流及乎夏商而周監二代有明堂之禮樂敎之首也逮德下衰王室卑而五霸起彝倫墜而六學缺天將持其木鐸以授後聖繇是周公殁五百歲而夫子生雲從龍風從虎大道旣作天下化成故夫子脩詩書以酌虞夏殷周之損益而國風帝典僃約魯史記以書二百四十二年之廢興而亂臣賊子懼烏戲不大壞何以見聖人之全功乎粵若中都之制立民極也以匡頽風防不爲曲兩觀之法用重典也以去姦宄政不爲苛夾谷之會誅無禮也以尊兩君刑不爲􅆫三預是邦之政而魯至於道向使鳳鳥來河圖出東周之化其在魯乎嗚呼明王未興亢龍無輔運匪我與德兮何衰蓋宏其道以救物處其順以安時行藏屈伸與化推移也其世衰也揭仁義於天下其大來也啓土宇於身後出入百代波流萬方孰不日用聖猷欽若祀典然後知素王之德與天地竝或曰夫子栖栖魯衞陳蔡之閒或者其未智歟君子曰是智也聖人與時消息同彼憂患不有匡蒲之難麟鳳之感何以試苟合安蒙求使達者順時窮者知命然則卷舒之跡其可究乎奕奕新廟庶人成之有以見誕敷之德勿亟之化蓋黝堊其楹元端其服加亹器之等正當宁之位王命所以寵舊章也兩楹之下四科以班兗公東序西嚮費侯齊侯黎侯吳侯衞侯西序東嚮其餘未入於室者畫衣冠於西牖配祭所以辯等威也議者謂我邦君於是乎建宏規而播新命修令典而崇明祀講義以度公懋功以從時訓人以成德昭德以合禮六者禮之善物而時有遷邑有改不銘考父之鼎紀奚斯之功是廢名也何以示後嗣遂命客􅀸前封丘縣丞泗上陳兼志之其詞云缺吳季子札論謹按季子三以吳國讓而春秋褒之余徵其前聞英華作文非於舊史氏竊謂廢先君之命非孝英華有也字附子臧之義非公英華有也字執禮全節使國篡君弑非仁英華有也字出能觀變入不討亂非智英華有也字左丘明太史公書而無譏余有惑焉夫國之大經實在擇嗣王者愼德之不逮英華作建故以賢則廢年以義則廢卜以君命則廢禮是以泰伯之奔勾吳也蓋避季歷季歷以先王所屬故纂服嗣位而不私泰伯知公器有歸亦斷髮文身而無怨及武王繼統受命作周不以配天之業讓伯邑考官天下也彼諸樊無季歷之賢王僚無武王之聖而季子爲泰伯之讓是徇名也豈曰至德且使爭端興於上替禍機作於内室遂錯命於子光覆師於夫差陵夷不返二代而吳滅以季子之閎達博物慕義無窮向使當壽夢之眷命接餘昧之絕統必能光啓周道以霸荆蠻則大業用康多難不作闔廬文粹作閭安得謀於窟室專諸何所施其匕首嗚呼全身不顧其業專讓不奪其志所去者忠所存者節善自牧矣謂先君何與其觀變周樂慮危戚鍾曷若以蕭牆爲心社稷是恤復命哭墓哀死事生孰與先釁而動治其未亂棄室以表義挂劍以明信孰與奉君父之命慰神祗之心則獨守純白不干義嗣是潔已而遺國也國英華作吳之覆亡君實階禍且曰非我生亂其孰生之哉其孰生之哉毘陵集卷第七終
