body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及記述一十二首風后八陳圖記上元二年豫章冠蓋盛集記江州刺史廳壁記吏部郎中廳壁記太常少卿廳壁記金剛經報應述並序琅琊溪述並序盧郎中尋陽竹亭記馬退山茅亭記撫州南城縣新亭記鄭駙馬孝行記慧山寺新泉記風后八陳圖記物不終靜必受之以動當純坤用事陰疑於陽則飛龍戰大朴巳英華作以散聖盜並起故戎馬生乃有並英華作力吞八荒爭截九有大者天柱折地維絶小者作慝盧山負阻中冀上帝憑怒下土是恤乃眷武德黃帝受之始順煞氣以作兵法文昌以命將於是乎征不服討不庭其誰佐命曰元老風后蓋戎行之不修則師律用爽陰謀之不作則凶氣何恃故天命聖者以光英華作廣戰術俾懸衡於未然察變於倚數英華作奇獸握機制勝作為陳圖夫八宮之位正則數不愆神不惑文粹作忒故八其陳所以定位也衡抗於外軸布於內風雲負英華作附其四維所以僃物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢所以致用也至若疑兵以固其餘地遊軍以案其後列門具將發然後合戰弛張則二廣迭舉犄角則四奇皆出必使陷堅陳拔深壘若星馳天旋雷動山破彼文粹無彼字魏之鶴列鄭之魚麗周文粹有成字之熊羆昆陽之虎豹出匪以律我異於是既而圖成樽俎帝用經略北逐獯鬻南平蚩尢戡黎於阪泉省方於崆洞底定萬國旁羅七曜鼎成龍至去而上仙於是在英華無在字遺風冥冥時亡而圖存文粹有焉字於戲聖迹長往神機未昧酌其流者猶足以決勝九英華作三軍禦侮萬里故項藉得之以霸西楚黥布得之奄有九江孝武得之攘胸奴服甌越東收獩貊西拓大夏然則聖圖幽贊未始有涯唐文粹無唐字天寶中客有為韜鈐者得其遺制於黃帝書之外篇裂素而圖之則文粹無則字勝敗之眹在我股英華作指掌天地之心見於毫末議欲獻諸策府用廣武事會天子以不戰為師無為為寶則是圖也興於多難廢於升平堙淪不書盛德其沒及英華作乃旌諸圖側以為三皇之故事六藝之餘伎云上元二年豫章冠蓋盛集記鳳皇鵷雛翔于碧霄非梧竹不下而食賢人君子有四方之志非樂國不適其土豫章郡左九江而右洞庭接苗民英華作氏之遺墟非觀風按郡英華作部參事蕆職二字英華作蒞職者則長者車轍莫由至也歲次辛丑孟英華無孟字春正月東諸侯之師有事于淮泗是伇也以蜂蠆竊發華夷類聚作夏震驚執事者匪遑啓居亦既播越我都督防禦觀察處置使兼御史中丞韋公元甫克振遠略殷為長城且修好于鄰侯從交相見敦英華作執同盟戮力之義圖靜難勤王之舉故三吳舟車八使冠蓋名公髦士羣后庶尹輻輳英華作輳輻鱗集其來如歸於是戶部尚書兼御史大夫李公峘至自廣陵越州刺史兼御史中丞杜公鴻漸至自會稽潤州刺史試鴻臚少卿韋公儇至自京口蘇州刺史韋公之晉至自吳廬州長英華作刺史前尚書右丞徐公浩至是合肥由是越人吳人荆人徐人以其孥行駱驛漸英華作洊至大江之涯於是乎宏舸巨鷁舳接艫隘輶車鸞鑣轊挂轂擊每講射合禮賓主好會峩星辨執象笏雁行而揖英華有者字五十有九人凡處八座者一歷中司者三尚書司轄者二建隼旟者九冠獬豸者十一其載筆掖垣曳裾廷寺分曹環衛典校蓬萊英華作閣者印纍纍綬若若架肩於宇下十一字英華作印綬纍然若差肩駕於宇下翼如也夫衛甸侯也以多君子而夸列國梁孝王漢寵弟也有鄒枚嚴馬之盛而焜耀後世孰與以一郡之狹五湖之阻而濟濟俊乂馳軒冕而就客位者殆九州多士之半則鵷鳳羣翔而萃止英華作至不若也彼昔人所評英華作稱方斯其陋乎歲二月楚氛掃除江介砥定然後皆整歸旗分鑣言旋縶維莫從音徽將遠不頌不述後嗣何觀公於是謹而月英華作目之且列其爵里名氏於館俾來世知衆君子之車塵在此境也江州刺史廳壁記古者國有史氏君舉必書倚相董狐史鰌史賀英華作嚚是即其人也秦已來國化為郡史官廢職策牘之事英華作制浸滅記事者但用名氏歲月書於公堂而春秋檮杌存乎屋壁其來舊矣是州也在荆之域于潯之陽江英華作酉從岷山東注渤澥洪濤至是派分為九而廬山湓水周于雉堞洞庭彭蠡為之襟帶故自晉元康迄于梁陳出入五代四百餘載世稱雄鎮且曰大英華作天府匪親匪賢莫荷其寄唐有天下六合一軌設險斯廢惟民之英華作是恤則命官擇任與列郡等矣至德已來戎馬生而楚氛惡猶以是邦咽喉秦吳跨躡荆徐而提封萬井岐路五裂每使臣計郡縣之財入調軍府之儲峙璽節旁午羽書絡繹走閩禺而馳於越必出此之之字衍英華無路而防虞供億功倍他郡故亦大其任而難其人今年春渤海封公繼踐厥位夫為政猶工之攻木也得于手應于心則盤曲擁腫迎刃而解況美材乎故公以發硎之利導勝殘之俗布政三月而人從乂每歎曰茫茫舊壤千載在目觀乎版築則灌嬰之業皎英華作朗或作廓而存焉披乎圖牒則溫太真庾元規之車塵若可窺焉義寧巳來百四十有九載纂斯位者風聲相聆軌躅相躡前賢後賢纍纍如貫珠善惡成敗我之元龜酌而行之吾師存焉于是徵諸故老鳩其名氏之存者凡若干人揭而書之以為九江郡國志吏部郎中廳壁記太微五帝星座後十五星曰郎位秦漢之君則而象之乃建郎官英華作中至魏世祖分尚書曹為六郎各六人今之吏部魏之選曹也掌選舉銓核以正公卿大夫士羣綸舊章悉英華作厥如初政嘗以前哲軌躅我之韋弦而武德以來廨署鼎新者數官曹易名者五若姓不表年不紀是廢德也將來何觀故謹而列之俾我曹之春秋存乎座右其選部司列天官文部之目各因其所革時之先後冠于其首以為志云太常少卿廳壁記太常掌玉帛鍾鼓等威文物以報本乎天神人鬼地祇六字英華作天地神祇人鬼凡吉凶賓軍嘉之禮唐虞謂之秩宗周謂之宗伯秦謂之奉常漢謂之太常其掌一也後魏太和十五年始建少卿官少小也用別二卿大小之序亦猶宗伯有小宗伯列國有上卿下卿郡有守丞亦位亞一等以少參長而佐其成務焉故事自御史中丞給事中中書舍人遷秩為亞卿者必於是司故官因職雄地以人貴餘八卿不敢與太常齒廣德中上尢審官注意禮樂其選也以才據英華補能不以資以恩澤不以勞謂李公卿材也是用超拜公將以忠孝敬愼肅恭神人且懋其官府政令俾無不恪方議酌前賢之遺塵而損益之乃瞻屋英華作居壁史英華作所記漫滅於是夏五月己丑皆姓而名之使如珠之貫盱衡指顧儼若對面曰賢者吾得而師之不賢者丑韋而弦之賢遠乎哉既進牘然後命博士河南獨孤及為之志金剛經報應述並序洪州牧刑部尚書兼御史大夫魏公身挂元冕心冥真如昔常奉般若法以宏正見雖顚沛造次必與經俱十有若干年矣皇帝中元年冬十月車駕有避狄之師百僚蒼黃南馳商於公為盜所攘而亡其經其往也匪家之念唯經是悼行與其獲七寶也寧見經生與其亡四句也寧捨身明年王正月大駕返正公為京兆尹痛宏誓之未從也則唯經是圖末於元法寺之藏藏人以送公發函披卷乃商於所亡之本也問守藏者英華作云亦曰不知其所自而能得公瞻禮悲喜捧持而泣然後知精專感達故隨心而至昭報肸蠁其疾若答顧謂孟子太常博士友順志之或曰得與喪偶然耳何必謂誠感乎及對曰誠於此者形於彼故出其言善千里之外應之此以仁義忠信感於物者也況弟一義諦超貫仁義自在惠力不啻忠信則因發而果從心誠而經還是法味幽贊非思議所及豈佛以般若之雨啓公善牙使因相以英華有次字獲願進登英華作啓乎無願法之英華作之法法歟不然何心境元合若律呂相召歲在乙酉公以異見告及跪而述之曰上士勤道精誠英華作應若馳願形於心報亦隨之至感無礙經斯來歸護公身田俾公斷疑公之善根疇可度思琅琊溪述並序文粹誤琅琊溪述序隴西李幼卿字長夫以右庶子領滁州而滁人之飢者粒流者占乃至無訟以聽故居多暇日常寄傲此山之下因鑿石引泉釃其流以為溪溪左右建上下方文粹作坊作禪堂琴臺以環之探異好古故也按圖經晉元帝之居琅琊邸而為鎮東也嘗遊息是山厥迹猶存故長夫名溪曰琅琊溪他日賦八題題於岸石及亦狀而述之是歲大歷六年歲在辛亥春三月丙午述曰自有此山便有此泉不濬不刊幾萬斯年造物遺功若俟後賢天鍾靈奇公潤飾文粹作色之流文粹作疏為回溪削成崇臺文粹有山字不過十仞意擬衡霍溪文粹有不字袤數丈趣侔江海知足造適境不在大怪石磑磑涌湍潺潺洞壑無底雲興其間仲春氣至草木華發亘陵被坂吐火噴雪公登山樂樂者畢同無大無小乘興從公公舉觴酒酒酣氣振溪水為主人文粹作而身為賓捨瑟詠歌同風舞雩時時醉歸與夕鳥俱明月滿山朱轓徐驅石門松風聲類笙竽於戲人實宏道物不自美向微羊公遊漢之涘峴山寂寞千祀誰紀彼美新溪維公嗣之念茲疲人繄公其肥後之聆淸風而歎息者挹我於泉乎已而文粹作而已盧郎中尋陽竹亭記懷玉按記字原本訛作序據英華改正古者半夏生木槿榮君子居高明處臺榭後代作者或用山林水澤魚鳥草木以深其趣而嘉英華作家景有大小道機有廣狹必以寓目放神為情性筌蹄則不俟滄洲而間不出戶庭而適前尚書右司郎中盧公地甚貴心甚遠欲卑其志英華作製而高其興故因數仞之邱伐竹為亭其高出於林表可用遠望工不過鑿戶牖費不過翦茅茨以儉為飾以靜為師辰之良景之美必作於是憑南軒以瞰原隰沖然不知錦帳粉闈之貴於此亭適也亭前有香草怪石杉松羅生密篠翠筠英華作竿臘月碧鮮風動雨下聲比簫籟亭外有山圍湓城峯名香爐歸雲輪囷片片可數天香天鼓若在耳鼻是其所以誇逋客而傲漢貂者百里奚爵祿不入故飯牛而牛肥盧公恬智相養於是竹亭構而天機暢嘗試論亭之趣夫物不感則性不動故境英華作景對而心馳也欲不足則患不去英華作至故意愜而神王英華作完也耳目之用繫於物得喪之源牽乎事哀樂之柄成乎心心和於內而事英華有物字應於外則登臨殊途其適一也何必嬉東山禊蘭亭爽志蕩目然後稱賞公欲其迹之可久故命豫為志馬退山茅亭記冬十二月作新亭於馬退山之陽因高邱之阻以面勢無欂櫨節梲之華不斫椽不翦茨不列墉白雲為藩籬碧山為屛風昭儉也是山崒然起於莽蒼之中蛇奔雲矗數十百里尾蟠荒陬首注大溪諸山來朝勢若英華作落星拱蒼翠萬英華作跪非柳集作詭狀綺布繡錯蓋天鍾英華作儲秀於是不限於遐裔也然以壤接荒服俗參夷徼周王之馬迹不到謝公之屐齒不及巖徑蕭條登採英華作探柳集同者以為歎歲在辛卯我仲兄以方牧之命試於是邦夫其德及故信孚信孚故人和人和故政多暇日繇是嘗徘徊此山以寄勝槩乃構乃墍英華少二字柳集作乃墍乃塗作我攸宇於是不崇朝而攻木之功四字柳集作木工英華功作工告成每風止雨收煙霞澄鮮輒角巾鹿裘率昆弟友生冠者五六人步山椒而登焉於是手彈絲桐目送還雲西山爽氣在我襟袖八極萬類攬不盈掌夫美不自美因人而彰使蘭亭不遭右軍則淸湍修竹蕪沒於空山矣是亭也僻介嶺閩英華作閩嶺柳集同佳境罕到不書所作使盛迹鬱堙是貽林澗之愧也故志之懷玉按此文見柳子厚河東集二十七卷文苑英華八百二十四卷則作獨孤至之之文前輩謂文之造句頗與李太白顧逋翁近又多直用前人語決非柳作辛卯為元和六年子厚既振拔當時文體豈尚有是且前此辛卯為天寶十載至之有初晴抱琴登馬退山對酒望遠醉後作一篇詩中有王旅方伐叛虎臣皆披堅魯人著儒服甘就南山田之語于時方討南詔則此文必出於至之有可徵也撫州南城縣客館新亭記古者國野之道十里有廬廬有飮食三十里有宿宿有路室於是此英華作乎賓客有底止英華作止之羈旅有寄寓而是邦也英華作下與兩粵英華作越七閩犬牙其疆守官者以為地遐途窮而瑣瑣行邁之罕到也則殺其禮而闕其物焉無修除之僃無井樹之設及賓英華作客至則候人不為導里不受館而盤飧薪芻之貺弆英華作業如也由其英華作是途而往者僉曰陋如之何是歲也台司審縣尹之寄擢王公昕為南城公至之日則考於英華作制其事典陳其藝極視年之上下去民所英華作之疾苦凡三月而南城之人和於是飾廏置以候賓客葺旅次以待羈旅夏六月築其館辨其域於道周英華作用作新亭于館之陽廈屋耽耽俯瞰濬壑賓位在左主位在右然後剗英華作剷墝埆堙坎窞以為大逵屬之于溪設雙航英華作船于淸津以僃經度二字英華作徑渡每將之迎之則自郊勞至于致餼英華作飮是無曠禮無違物而茲亭之經始也取廢徹之材以移英華作利用用乃有節入鞭朴之贖以庀工工忘其勞杜燥溼之虞五字英華作崇棟宇之製以憩賓賓至如歸三者不愆于素功是以懋政是以立若行者有犯軷之祭居者修飮餞之好登斯臨斯釃酒以贈之則溪雲竹風生于棟牖英華作戶而緑野靑山為吾庭衢三爵之後可以送千里之目道四方之志焉茲又勝會之佳境也英華無也字凡底績以興利革故以謀始修禮以僃物僝功以成務政之大者宜其刊作者之茂實以示後嗣不然他山之石何以在茲亭乎三字英華作此是歲廣德二年也鄭駙馬孝行記特進駙馬都尉滎陽鄭潛曜字某五字英華作鄭潛曜其字􅐶宗外孫元宗之甥代國長公主之才子也膚敏而文生知純孝開元中長公主寢疾公年二十八觿燧侍左右帶不解面不靧者纍月嘗藥請禱憂懇僃至而疾無瘳乃刺血濡翰書為策英華作榮非祝請命于上下神祇願以身代親之身乞靈祈死泣盡繼血既而誠達於神感而遂契徹筵俟命焚其章草英華作畢獨神道許三字在乎二字作存於煨燼之中翌日長公主疾間公固命左右勿敢言於其請天之章公之客尹靈琛之辭也向微靈琛言之則人莫知之者矣君子謂天道遠人道邇其死生冥運吉凶陰騭未嘗與人英華作天同功也而孝子竭誠上元為感神符靈貺來若響答乃知行或精至則幽明英華作冥不能逃其應而況人乎鄭氏之子其事親也可謂孝矣惟武王周公與天合德三壇之祝宜有丕應若公者也英華作地在綺襦紈袴之中非有植璧秉圭之禮而精誠上之神亦降福非德性純至其孰能致感如此其速者歟公開元二十八年尚元宗第十二女臨晉長公主公主柔明而賢輔佐以禮公力行好學處貴不驕跋履夷險無替忠信歷太僕光祿嗣滎陽郡公佩金印列長戟垂三十餘載克荷大業而崇其家聲善而必慶為不誣矣懼他日史氏闕疑也故著之於篇若釃醴二字作醴濃乳噴發英華作及于禪牀周于僧房灌注于德地英華作池經營于法堂潺潺有聲聆之耳淸濯其源飮其泉能使貪者讓躁者靜靜英華作惰者勤道道者堅固境淨故也夫物不自美因人美之泉出于山發于自然非夫人疏之鑿之之功英華作工則水之時用不廣亦猶無錫之政煩英華作頗民貧深源導之則千室襦袴仁智之所及功用之所格動若英華作者響答其揆一也豫飮其泉而悅之乃志美于石毗陵集卷第十七
