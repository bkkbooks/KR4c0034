front:
  text: 毗陵集卷第十五
  hash: sha256:3789c93b723283e80f15000015b898a9d97cf5dc3486cddceb59ff7961d51dce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_015-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及序中一十五首送韋員外充副元帥判官之東都序送孫侍御赴鳳翔幕府序淸明日司封元員外宅登臺宴集序送澤州李使君兼侍御史充澤潞節度副使赴本道序送兵部梁郎中奏事畢還幕府序送成都成少尹赴蜀序送吏部杜郎中兵部楊郎中入蜀序送商州鄭司馬之任序送洪州李別駕還任序送韋司直還福州序送潁州李使君赴任序送屯田李員外充宣慰判官赴河北序送歸中丞使新羅弔祭册立序送渭南劉少府執經赴東都覲省序送餘杭薛太守入朝序送韋員外充副元帥判官之東都序太尉臨淮王之秉旄淮沂也天子命公為介洎臨淮薨而相國英華作公非太原公繼授兵符盡護東夏諸將亦表公參成周軍事如初命故事登掖垣者不驅傳居諫臣者不就辟十四字英華作官至左右掖垣不驅傳不就辟將使其能必易其秩故自左補闕為尚書郎元年仲春始以使節赴洛陽經大盜虔劉之餘頑民雖遷汙俗未返三軍之心注於帥帥之耳目屬於參佐以公貞諒文敏能恤大事且成宣之後也故以部從事咨焉夫民殘則訛訛則流禁流莫若以德兵不戢則玩玩則暴禁暴莫若以信建信與德以為幕中之畫繄吾子是冀將賀不暇別於何有我飮餞者姑以詩代路車乘馬送孫侍御赴鳳翔幕府序右扶風之地跨枕隴蜀扼秦西門帝命司徒為唐方叔開府之日搜賢自二於是孫侯以監察御史領司徒掾夫子卿族也用文學纘緒而弟兄皆材伯曰宿以秋官郎辟丞相府仲曰絳拾遺君前及余為寮夫子則以貞幹肅恪之能入主方書出佐戎政花萼灼於三臺時人榮之二月丙午乘傳詣部人謂扶風於是乎有三幸獲白額而南山有採藜藿者一幸也先是司徒於南山擒賊帥高玉今夫操兵者如虎而司徒仁而愛人二幸也其府君則賢其幕府多士而孫侯懿之以文德三幸也恪於德以臨事度其英華作於義以從政力於忠以成績吾子勉之其蔑不濟矣士為知己者用豈干榮哉英華作乎請居者歌之持貺行邁淸明日司封元員外宅登臺宴集序可以排天下細故使憂吝不作莫聖於酒況與同志者共之復遇司烜出火勾芒宣氣天地氤氲熙我以春乎是日也卉木羅其庭除柔嘉充於圓方言必遺纍笑必造適故談話不及朝市迹無町畦事不機括故和樂不待笙磬主人有才子四人侍酌於前臺下有南山倚庭碧草芊芊溝塍圃畦如龍鱗龜甲芳樹繡布白花雪下於是一觴解顏再觴解憂三觴忘形而傲隨之商絃數奏墻陰移而坐客醉手持濁醪笑向朗月夫以世道之多故年歲之不吾與也若憂患歡樂衆寡之不侔苟來者猶可追無亦顧隟間之駟以樽酒買笑余敢惜費貽靑春羞几今日娛莫我若也吾乃今日視薄遊空名如爭蝸角又何用知接輿伯夷不愚於杜康乎顧謂滿坐展詩以贈亦命夫四子者志之送澤州李使君兼侍御史充澤潞陳鄭節度副使赴本道序今歲皇帝擇可以守四方之臣分命大司徒涼公作藩岐英華作􅊈陽平秩西夏涼公季弟曰抱真敬事好學仁勇忠信凡仁則不偷勇則不撓忠則能英華有宣字力信則人任焉故天子器之方倚以胥附英華作朗非使宅高平綏厥有衆董次將之任且以柱後惠文冠冠之詔下之日軍府胥悅蓋蕭何守關中舉宗詣軍而涼公荷方召之寄亦以愛弟居東旅於行間忠之大者夫高平上黨之地當趙魏燕代潞之咽喉太行恆山為之襟帶公居有專城之任行有亞旅之職其略足以固其封疆其惠足以柔其民人朂哉夫子進吾往也伯兮仲兮執兵之要謹身以肥家自家以刑國高平之政可以未行而窺矣彼瞻望佇立壯夫恥之非歌詩莫足以贈送梁郎中奏事畢歸幕府序元年夏相國涼公將城􅊈陽百里二城即戎於境先命從事兵部郎中安平梁公鎮如京師請王命且料民以調兵食五月甲戌至自雍危冠上前手畫地圖以兵機軍儲屈指條奏上甚悅事下三府六月庚戌以璽書還雍改轅而西既犯軷於是追送者皆賦美使臣專對以直而君遣使臣以禮詩之所由作也公嘗以郎官宰昭應昭應之賦均人和參事相府相府穆穆今元帥七萃之士萬計以王命伐不庭公章甫其冠縵胡其纓咨諏乎轅門討軍實以輯戎政票衛之制勝營平之威謀子姑佐之固亦整軍經武將王室是奬豈載驟四駱皇華原隰之謂秋晚筋徑隴關雪下企豫望吾子以班固之筆札銘崆洞山而還悠悠我思章句以贈之送成都成少尹赴蜀序歲次乙巳定襄郡王英乂出鎮庸蜀謀亞尹僉曰左司郎成公可溫良而文貞固能幹力足以參大略弼成務既條奏詔曰俞往公英華有亦字朝受命而夕撰日卜十一月癸巳出車吉尚書諸曹郎四十有二人歎軒騎將遠故相與載籩豆盞斚刲羊鱠魴修飮餞於肅明觀以為好飮中客有賦蜀道難者公曰士感遇則忘軀臣受命則忘家姑務忠信夷險一致患己不稱於位於行邁乎何有言訖抗手建節即路且以紛帨刀礪侍輕軒而西凡強學以修業積行以取位赴知己不為名適四方不違親卿大夫之孝也吾子其無忘可移之忠將咨度是務使岷峨其乂苛慝不作天聽自民誰謂蜀遠別細故也豈蠆芥乎凡今會同非詩無以導居者之志送吏部杜郎中兵部楊郎中入蜀序二公罷東西英華有之字曹草奏啓事之劇而參軍西南時人或譏朝廷易其大而英華無而字難其細及以為不然方當天子命將帥以守四方丞相秉鉞為唐南仲擇佐命介宜先才者英華有賢者二字事孰大焉彼採薇出車以遣役勞勤我則異於是受王命者不言勤赴知己者不愴離今日斗酒姑展交好遂以道吾英華有子字四方之志亦使滿座歌二公乎送商州鄭司馬之任序往歲司馬宰湖而湖人安輯大駕東狩之往復也供帳職辦天子以為能故寵之以兩綬勞勤也今兹佐商增秩也人謂使人任器之道當處司馬以劇而觀其利用司馬曰與其徇名以利人寧勤身以安親況佐郡之逸乎於是五彩其衣是日南邁流火戒節寒蟬嘹唳嶢闕白雲片片秋色二三子之感時傷離者斯可以言詩矣送洪州李別駕還任序別駕以英華作者嘗宰三縣佐四郡未始不以廉直為己任亦未始以廉直衒己名仕有餘力則寄傲於琴趣遠是以曲高意精是以聲全得於心而形於手故非外奬所及當其操弦如操政焉時人知其琴不知其政善而無伐光而不耀故也今也來斯英華作思上台解榻卿大夫士從之如不及時因觀操縵之妙可以見從政之道是行也吾子其懋修乃德恪警爾位夫亦將抑與不睱求於何有唯湯湯郢音明旦將遠廬峰湓水大江間之風景可同而聽不可共由是衆君子賦詩以壯別且曰僃折楊皇英華作黃華之韻用抒他年之相思送韋司直還福州序遠別非難行路難行路非難相逢難始者與吾子會於撫以吾一日長乎子子嘗敦弟兄之好而不吾先自雲搖雨散凡四悲秋而一會面亦既道舊別又繼之斯可以愴矣然君子患德之不逮英華作建不患人英華有之字不我知吾子克愼厥身以荷先大夫之覆露賁然將命為邦司直被服文行而鏃礪之揚其家聲吾唯子之望豈行邁與聚散足貽志士之欣戚乎是別也祇以歌詠貺吾子而巳送潁州李使君赴任序公之為潁州也朝廷以不失人為明潁人以得父母為幸公獨以去色養為戚故執事者難之其為公謀者則曰受命忘家公也愛親讓祿私也君子不以私廢公不以孝棄忠況國家方親親賢賢而當潁人傒師長之日可以此時急聞禮而緩君命乎公曰諾然後明日朱兩轓而東竭力致身之誠於是乎全矣方當輯寧疲人𥜗而袴之宜其大王事而小行役豈徂暑之熱遠道之思與前期之難足攪胸臆賦詩朂別於以持贈英華作特瞻非送屯田李員外充宣慰判官赴河北序秦吳燕送之別昔人所愴若君子以令德佐王之使臣將命以適四方當用文教柔遠威懷示德則其舉也司以悅其愴也可以遣況吾子家本全趙倦遊一紀駟馬以過故鄉足展南枝北風之思買臣歸越相如還邛古今相望是可同轍明日渡滹沱涉桑乾布王澤覽風俗之暇為我問藂臺蒯丘厥狀何似平原樂毅故事存否歸而揚攉用廣異聞夫道別離者緣情而巳送歸中丞使新羅弔祭册立序儒家者流鮮肯冠獬豸冠者天子以公身衣儒服力儒行行之修可移於官學之精可專對四方是故公任執法之位且使操節以濟大海頒我王度於大荒之外夫新羅嗣王以喪訃且請命於我我則歸賵繼好以策命命之實懷遠示德禮之大者夫亦將宏宣王風誕敷微言使雞林塞外一變可至齊魯不然歸公何以不陋九夷之行也蓋行於忠信者無險易拘於王程者無近遠故公受詔之日則遺其身視涉海如蹈陸謂窮髮猶跬步豈鯨怒鼇抃足戒行李凡以詩貺別姑美遣使臣之盛云爾送渭南劉少府執經赴東都覲省序彼徇名者遭時多故乘地高勢罕不爭先英華有著字鞭而務飛速以誇當代獨吾子以文行裕蠱思不出其位奉籯金之所遺羞地芥而不拾其初以英華無以字筮仕也典校祕書祕書之職修尉於渭南渭南無粃政歲二月以紛帨觿燧歸覲於洛白華之戀也和氣用事春物滿眼之子于征五綵其服想成臯花合穀洛水大是吾子拜嘉慶問淸高之日歟夫克家而家肥策名而名彰居官而官辦孝之大者則貂蟬羔雁在子外府姑務遠圖何嗟少別到洛陽為我寄聲謝鳴臯故山杼離如之何詩以贈遠送餘杭薛郡守入朝序有大道者遺小成之迹抱宏略者非曲士所見公嘗以匪躬之故三入承明時議用舟楫期公者七載矣而猶建隼河壖洗幘江島興貝錦之歎詠跋胡之詩豈不以名至盛德至廣而厦材多節夷道若纇乎今天子受宣室之釐忽思賈誼以謗書之篋先示樂羊且搜元珠俾詣丹闕則巨鱗方縱未可料也雖欲抱黃老之術與赤松子遊公器所歸難乎免於圭組矣夏五月弭棹睢渙脂車而西火雲成峯郊草如織誰謂秦遠跂豫望之有以見升赤英華作靑霄捧白日在此行也謂攀四牡者各賦南山有臺之四章取樂只君子德音是茂以為志云爾英華無云爾二字毗陵集卷第十五
