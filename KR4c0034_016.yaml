front:
  text: 毗陵集卷第十六
  hash: sha256:eee173e0d13c47f42ff18c129642f0e25a60dd520eda949d5f970bdbfbf4bf7a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_016-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及序下十四首崔中丞城南池送徐侍郎還京序送蔣員外奏事畢還揚州序揚州崔行軍水亭泛舟望月宴集賦詩序送武康顏明府之鄂州序送六合林明府赴選序送崔詹事中丞赴上都序送李副使充賀正使赴上都序送孟評事赴上都序送柳員外赴上都序送崔員外還鄂州序送朱侍御赴上都序送少欲上人赴天台國淸寺序送陳贊府兼應辟赴京序送司華自陳留移華陰赴任序崔中丞城南池送徐侍郎還京序侍郎昔為河南督郵河陽令其解龜也東人思其遺美今出入夷險歷二十英華作三十餘載而一來廳樹未老佐吏半在公位望章綬輝光城邑觀者榮之而東都主人亦以籩豆盞斚徵會修好之不暇凡萃止十有五日而去去之日主人歎瞻佇英華作仰之莫及也故又釃酒于此池池上有雙綵艫與竹齋對布賓主位于樽之左右而蘭臺金閨建禮承明之英十有八人序列其次池外有闕塞雙嶺遙作外戶嵩高逶迤數峯當窗伊洛春樹若刺繡布錦仙桃火燃顧我則笑於是遊眺之不足則舉白以相勸而狂歌送之唱棹鳴桹簫鼓陳乎其間醉中疑三江五湖去人不遠謂千慮萬事無非妄作況少別可以興愴乎但駟馬行塵明日將遠登而無賦謂樽酒何宜歌而詩之且以見追攀者之志志字英華作心也送蔣員外奏事畢還揚州序揚州牧趙國崔公使其部從事侍御史吳興蔣朝如京師條奏官府之廢置歲月之要會其來也吳楚之衆君子酒而詩之而薛水部辨李司直翰雙為之序以冠篇首既將命趙公拜左僕射蔣侯加尚書郎之位其還也之子日執書卷以言於朝曰始者與數賢別賴斯文故常若在眼今幸而遷秩行車在門明旦離羣想今日之會亦猶於此而思彼也非置書袖中人謂我何然後西人之舊者皆賦韻道別而鄙夫和之詩大略蓋美蔣侯以才智任職有周爰咨諏之用而將事不墜專對不辱能一其心以佐大府之政政靡小大唯公是謀謀之臧歸于府不知我者則謂我專趙公所以有成瑨坐嘯之論而無慙示樂羊謗書之篋而不疑斯可謂之明矣今也于歸腰曳兩綬然濁涇素滻春水始生秦原靑靑諸草皆秀可共樂也而又別焉凡我同僚是以有瞻望不及之歎故送遠之志悉形于文揚州崔行軍水亭泛舟望月宴集賦詩序言同者無約束而信心同者未謔浪而樂聲應情至則不俟外奬況遺言之言造適之笑與杯中物池上月風中弦五者合以貺余歡其可勝既乎于時衆君子棲公翰林如翔鳥之得茂樹也至是登于仙舟泳彼新流掇芳玩奇以永今日日不足故用夜漏繼之羽觴未及數覆銀河橫而金波上樂作神王百憂如失而弦繁管淸悲歡交乎其間則高歌爭進或道舊以泣酒酣意真樂極感至故也當斯時視身後之竹書鼎銘猶稊米芻狗也況細故乎二三子醉猶能賦且酌且詠余屬而和之其詩云明月借秋興流光在此池山公顧我厚酩酊稱未疲勿謂嘉會易但憂離别隨飽君醉中德敢使松心移送武康顏明府之鄂州序多故以來于祿者進必欲速大抵悉棄夷道而趣捷徑顏子獨曳儒服非其知己之命不苟合非稽古力所致不妄動今其來斯也不以賄不以名不以遊眺挾策讀書藝成而去君子哉若人耶將以特舟片帆泝洄于大江秋濤之中涉彭蠡歷西塞浮于潛踰于沔吾子安于忠信亦當安于風波況滔滔江漢茫茫禹迹乎于此乘渚返顧齊吳榜以擊汰其聲可想司馬子長浮沅湘窺九疑亦此路也足以覽古乘興窮極視聽行將搜異不暇懼於何有凡今賦詩以抒居者之思且用勗吾子四方之志云爾送六合林明府赴選序今之為邑者袛事趣辦而巳矣之子獨以公廉不苛聞于朝英華有廷字夫公則能力英華作廉廉則不苟英華作苛不苛則無害六合之人飽是三德故家肥人讓而名隨之宜英華無宜字其黜陟幽明英華作考績之日首冠賢能之選也宜哉上方勤恤人隱渴良吏如不及之子令問將與位偕行當見函浴春物迎馬首於千里之外勿謂蕪城衰草足愴遠別二三子何以持贈其歌詩乎送崔詹事中丞赴上都序初公由尚書郎出佐蜀郡無何熊軾暢轂專席而坐休績布于巴漢天子器之時人謂公逸足駸駸視公卿猶步武耳既而剖符驅傳出入吳楚專五城佐三府府罷身退復藏於密出處之道歷二十載而未光知公者不堪其歎公未始屑於胸臆貞直廉讓之德內充故也夫貞則專直則固廉則不競讓則後時故其寵不及而名益茂也宜哉今上方厲精熙載用官人安民為急百工以釐不至者知罪故公朝賁然伏軾入闕時然後行動而不格在是伇也銷憂者莫若酒酒中樂酣可以道千里之意者莫若文羣賢詩之以送遠蓋古人雜佩以贈之之流也送李副使充賀正使赴上都序之子領祕書著作于是邦參我軍事事必肅謀必忠居處必恭三年矣而身無擇行職無粃政政之和非吾子曷賴今兹將東諸侯之命朝于京師稱壽之儀舉專對之才達是行也將為度材者所得豈復顧池中乎正月元日和氣資始大行設九賓於蓬萊前殿皇帝輦出百辟奉賀公將以此時捧章奏於雲陛之下得觀虞舜之九成簫韶塗山之萬國玉帛況惟仲氏典司宸翰棠棣之華交映於朝斯可謂之榮矣懋修乃職尚愼行邁勉從欒伯之戒將復臧孫之烈至如遵大路之歎不足為吾子設矣吾嘗同寮且士龍之執也江樓醉别何用貺遠以其章句當佩玉瓊琚乎送孟評事赴上都序孟子以鄉舉秀才射策甲科二十年矣同時中楊葉者今或蔚為六官亞卿或彤襜虎符秩二千石而孟子猶羸馬靑袍客江潭間遇與不遇何其寥敻也然君子不患貧患業不修不患位下患道不行孟子言忠信行篤敬好學工文令名藹然今兹入關有司之喜也諸公展相遇之禮其肯不以推之挽之為己任見三月四月之交澧灞之間王雎飛鳴草木暢茂是吾子彈冠之時也二三子不可以不賦送柳員外赴上都序初弱用之拜也吏者隱者相見皆賀曰朝廷搜賢不遺邱壑中人則搢紳之賢者日至矣未有賢人至而太平不興者而弱用獨以衰疾行邁為憂諌議大夫昌黎韓幼深貽弱用書曰君子之命知己之遇其可易乎由是不敢言病即日戒路夫君子之道進不苟容退不懷安不以欲咈人不以私棄公時止則止時行則行弱用之心也仁矣哉與夫捨龜觀頤自盛以槖者異矣方今主上用文思柔遠魏邴謀謨唯賢是渴想見厖眉大冠俯僂於朝廷與公卿大夫言三代故事由入金馬石渠之署國人孰不宜之今之史臣樂安蔣鎮博陵崔儒頃與弱用同以德進儻與夫二君子道舊必話鄙夫疲於郡齋之狀勿使不知我者謂我不思若夫抒今日秦吳之別斗酒之外詩而已矣送崔員外還鄂州序員外曳朱組擁使節將鄂州牧御史中丞吳公之命方舟如吳祗役蕆事肆覲伯姊展歡申悲浹辰而還飮水恪愼夙夜匪懈孝悌友恭形於容止追攀者觀禮於公見公之仁繄公之先德與位偕由大王父已下一門三太子保傅二御史大夫一宰相四二千石家之範可刑於國今則兄掌冬官弟列郎署閨門怡怡花萼相鮮欲辭必復之榮朝廷其肯捨諸永言夙昔將繼舊好惠而顧我其敢不以久要為答雖嘉肴充圓方旨酒盈樽罍祇攪別緒不足慰瞻望不及之歎故可以於此乎言詩送朱侍御赴上都序子以才茂經明鄉黨稱仁起褐衣四五年超參夏口軍事同時諸生有未登賢能之書者公以惠文冠出入殿中蘭臺其以文章干祿何啻如拾芥吳中賢士大夫由是益勸今復戒鞅而西言赴所從昔陸士衡入洛張華如舊相識之子之文章粲然有昔賢風采彼茂先之徒其肯捨吾子乎將子獻詩著論特僃風雅以宣上德抒下情為己任勿獨誇吳趨閶門之廢興辨蓴羮羊酪之優劣而巳急賢之日何患人不己知凡今贈別皆吳士也送少微上人之天台國淸寺序或問上人曰文者所以足言也言説將忘文字性離示入此徒無乃纍一相乎答曰稱示入者過矣以習氣未之泯也率性修道庶幾因言遣言故欲罷之而未能耳時人謂上人為知言知道歲次乙卯自京持鉢而來給事中天水趙公涓賦詩抒別卿大夫已下屬而和者二十七章既而飛錫濟江休于晉陵又東至于姑蘇將涉震澤踰會稽上天台至國淸上方而止趣靜境者不料遠近登漸門者不計歲月則上人還斯詎可知也上人之文章可得而聞也諸公將議遠別得不以斯文為贈乎送陳贊府兼應辟赴京序初公讀梁竦傳始慨然薄遊恥揭其公器退而耕於楚縣知言者以為子真吳都禦寇圃田卜商西河與公道雖不同其操一也羿工於中微拙於使人無己譽固知大名之下天爵難讓十二載冬十月果以公才徵龍泉自惜暫隱牛斗之次美玉無脛竟為秦人所得且晉以梁山召伯宗漢以明堂延申公尊德問禮於斯為盛況朝廷頓八紘久矣頃來儒服立於魯人之門者公祇命台鉉將濯纓而孤矣當貞女不字十年反常及大翼怒飛知一日幾萬問離羣何贈請賓賦車乘主人賦南有嘉魚以代零雨之什送司華自陳留移華陰赴任序去年春公自京兆北部尉謫掾陳留議者或歎公大才未光直道而黜君子則曰否患德不立不患遇坎始用舉至是雖速謗何傷有才與時不遠而復其明年春肆大眚冢宰量殿最厚薄以令聞遷公于華陰然後知朝廷之祿用也華陰者左崤函右雍州潼津鍾池綴于分野長河太華為之襟帶甸近所以難其選地雄所以寵其秩公將以利器刃物淸機臨人吾見岑公孝不得專美于南陽大火初落昊天欲高遠山雲開歸路秋色請各抒別操使行者得歌而咏之毗陵集卷第十六
