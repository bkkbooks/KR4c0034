body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及頌二首唐故太子賓客兼御史大夫洪州刺史洪吉八州防禦觀察處置使平原郡開國公張公遺愛碑頌並序唐故開府儀同三司試太常卿兼懷州刺史贈太子少傅楊公遺愛碑頌並序碑三首唐故睢陽郡太守贈祕書監李公神道碑銘並序唐故朝議大夫申王府司馬上柱國贈太常卿韋公神道碑銘並序唐故朝議大夫高平郡別駕權公神道碑銘並序唐故太子賓客兼御史大夫洪州刺史洪吉八州都防禦觀察處置使平原郡開國公張公遺愛碑頌並序英華作唐故洪州刺史張公遺愛頌北斗魁戴匡六星曰文昌宮其三曰貴相聖人法天建官作為台司以左右民於是乎有敬敷五教平章百姓之職居之者下代天工上應星宿其或一麾出守八命作牧內為吉甫外為方叔宏道利物其政一也惟唐七世皇帝誅羿澆纂舊服得柱石之臣曰平原張公諱鎬字從周秉中庸之德舍光大之量輟耕隴畝為唐臯夔推轂於河南樹風於荆門作賓銅樓登侍禁掖牧撫人半歲洪州再稔鰥寡不侮神人咸若慈惠之政洽於百城享壽六十有一歲在癸卯七月壬寅薨於位夫德之被物也厚則物之興感也至故公之捐館自九江至於敷淺原南暨於梅嶺東臻於閩徼而蚩蚩之民靡幼靡艾泣涕乎遺風悽愴乎棠陰懇懇乎若求而不得企而不及者英華作也僉曰平原其可謂盛德也巳子惠困窮俾富而庶若解衣衣我輟食食我公棄我往矣英華作其誰育我矣逝矣遠矣音徽沫矣吾儕小人嗚呼疇依盍詠歌之刻諸金石秋八月既殯耆壽英華作老吉州安福縣丞鄧琳英華作林玉等一百十有二字英華作一十五人乃率籲衆戚謀及故吏從事州長縣尹虎賁亞旅卿卿字英華作鄉老大夫相與稽乎陳迹見頌表德用廣留侯之世家紀子産之遺愛禮也公曾祖曰善見位朝散大夫越州司馬司馬生武定任荆州都督府戶曹參軍戶曹生知古官止代州司功參軍四字英華作司馬廣德元年贈太子少傅自司馬至少傅世以儒顯天鍾美于其後嗣四世而生平原河目英華作燕頷犀額山立玉色森然若大厦棟梁淸廟祭器該綜六學大抵以周易為師將探英華作觀化元恥觀朵頤隱居南山蓋三十期天寶十有四祀英華作年始褐衣召見凡用舍繫乎英華作于才行止牽乎英華作于時當無為無事則則字英華作即詔許由善卷各得安其節及人思俾乂則黃公角里不能逃于英華作其用勢使然也由是一命左拾遺再命右補闕修國史三命侍御史四命諫議大夫五命中書侍郎同中書門下平章事起布衣三歲英華作二年綰相印佐王業名敡之盛輝動今古英華作古今于時至德二載也天王英華作子方以復夏之師搜于岐陽三河之人左袵是懼公入除英華作敘是百揆出分二陜帥東諸侯之兵收復宋鄭誅後至者以懲不恪安危之機懸于方寸方將董正東夏懷柔山戎會帝咨百工曰有能典朕荆楚俾姦宄不作豫惟克邁乃勳於是拜公荆州大都督府長史明年元良肇建上曰疇若豫樂正父師之職汝作賓客卒調護太子嘉言惟允於是授太子賓客上思夙夜出納言語侍從之臣命公作左散騎常侍會鍾陵鄱陽之間人咨艱食上又曰命汝作州伯惣十連英華作聯之任俾豫全無虞惟汝英華作爾賢於是有洪州之拜粵寶應元年冬十月公朝服受命至自臨川彰善用明疸惡用威一法度用信布愷悌用德慰薦掾吏勞徠鰥寡化以公廉扇以禮讓煦而嫗之使自得淸而靜之使自定於是豪民猾吏革面斂手家有忠信人懷恥格英華作孝弟暢于事業播英華作布于風俗浹于人心被于歌詠是歲也三吳飢民英華作人相食厲英華作勵非鬼出行札喪毒痡淮湖之境骼胔成嶽而我倉如陵我民孔阜犬牙之境疫英華作疵癘不入英華作作災不勝德也臨海賊帥袁朝狃于會稽之役侵我東鄙江界大恐民斯繹騷公命左軍屯上饒隘塞常山之口斬其搪突者二千餘級英華作三千餘人自是姦黨散落不敢南向而諸郡人安焉十字英華作不敢南向而射邦人安焉是舒城賊帥楊昭憑蜂聚之衆殺同安郡守英華無守字劉狄英華作秋子以叛師潰而奔犯我疆場公覆而取之懸其首于五達之衢凶徒殲焉沈千載英華作乘者新安大豪結椎剽一作掠之黨為之囊槖弄英華作用兵潢池虔劉我民桴鼓之聲相聞郡國二千石不能禁公命次將斬之以徇鉏其根株俾無遺類新安民庶家室英華作室家相慶江干淸焉振六條之宏綱開布大信從善如不及視民如赤子赤子英華作流克已推誠以百姓心為心飮之以和俾服從教化輕剽呰窳奪攘矯虔之俗罔或干正英華作干于政憀悴蹇亟苛察繳繞之吏不能見其巧哀二字本缺從英華補敬明庶庶疑當作恕期于無詞德政行焉愼選乃僚必國之良有若博陵崔賁昌黎韓洄趙郡李惟嶽北海王士華河間邢宙河東裴孝智隴西李道昌英華無昌字皆卿才也以嘉言碩畫參公軍事澄淸之內無濁流審克之下無冤民淑􅑯英華作德旌焉公之解裋褐而施英華作拖國章也十有一年矣雖匪躬之故宣力不暇而滄州願言未始弭忘每曰少伯子房吾之師也纍乞駭骨將角巾故山朝廷方虛三老五更之位英華作員待公而除書未下英華作僃書未及下而公薨焉嗚呼哀哉褒德之盛典退身之正志嚮英華作享用之遐福三者俱未從人欲斯可以歎矣唯公出將入相文武為憲讜言成略藏在策英華作册府代莫得而聞也今采其德刑禮義之善利物者頌之于石慰彼墮淚者之心焉爾其文曰純粹之氣升為星辰降為賢人皇王得之以釐百工以騭下民九江之南五品不遜百姓不親平原來斯英華作思道英華作遵之以德俾民化淳寬厚淸靜英華作以寧飭躬率先是訓是勤猛獸不噬夜犬不吠豐年來臻藹藹令德家有膏雨戶有陽春牧我若暮英華作晚棄我若早英華作新實天不仁南州寥寥東山依依德音若存千載之後魂魄登此頌聲不泯唐故開府儀同三司試太常卿懷州刺史贈太子少傅楊公遺愛碑頌並序皇帝嗣位二載河內得賢二千石曰猗氏楊承仙者剛毅公廉仁明愛人起鞞鼓間為唐循吏天生英華作性貞方非有經術潤飾推誠御衆以身帥先民用不擾政是以茂于時王師始平河北而賈懷才歸于我大兵英華作軍之後城郭為墟相國梁公拔公于戎馬之上表為刺史俾尉安斯人英華作民公既至則弔其瘡痍為翦荆棘省事節用寬其征而均其力然後濬決古溝引丹水以溉田田之汙萊遂為沃野衣食河內數千萬口流人襁負不召自至如歸市焉鰥煢無告不能自耕者貸其種與農器而教之視五穀所宜督其程課勞來不怠使民英華作人無不咸返其本每循行屬縣問所疾痛時其飢飽心為慘怛如身之恤臂指慈父英華作母之視幼子也性嚴不不字據英華補殘而恭於奉法訓軍以律禁暴以英華作必肅有抵刑者雖拔葵犯英華作把禾煞之無赦由是兵不為盜猛獸不食人河內之犬無夜吠者人人得敦其業而厚其生上奇其能以璽書勞勉封宏農郡公邑二千戶拜其男鋭河南府參軍方倚以牧人英華人作民並重一民字不遐其福大歷二年八月六日公薨于州春秋五英華作四十四皇帝悼惜詔曰軍興巳來列郡凋耗二千石少能以教英華作政化稱者唯承先苦心精力惠此一州家給而人知禮節氣和而無災害三年有成表課第一賢守既殁誰其嗣之宜英華作可贈太子少傅好事者撰公景行謂公淸直強力能勤其官百城之州三軍之帥可使居其任量英華作重不極英華作期而殁惜哉初岐國公魯炅之守穰英華作襄鄧也公為新軍佐敢殊英華作冒死督戰奮士卒先矢英華作藺石亂中敗面滅鼻而不言病卒以是挫敵軍中服其義勇及涼公秉鉞而英華作公委質焉前後保河陽守高平安潞鎮鄴董戎壺口戮力危機之中賈勇倉卒之間唯盡敵是求未嘗英華作嘗不顧身元戎賴之卒集大勳由是歷羽林金吾光祿光祿下英華多殿中由光祿五字大夫加開府儀同三司試太常卿而後至於是州也公嘗表請歸葬途由于洛洛陽人聞楊懷州之至也環而觀之及其還也懷人數千須于路其亡也闔境相弔童子不巷歌凡立誠應物者信不足則不信二字英華作行失飾知沽名者實不足則名喪若楊公者非仁必由已而誠在言前則不能使千萬人悅之之速如是某官某耆壽某等願復攀公之朱轓望公之淸揚而靡因也故立石為碑慰彼永思云五字英華作慰彼後人思其詞曰其詞曰三字據英華補吳公文翁遭時無危因而綏之其績易施公之來斯英華作思大盜始夷師旅飢饉丁英華作因于此時頑民反側比屋流離飮公醇仁而忘怨咨飢者得食寒者得衣豈知典謨以吏為師豈必法令信則不欺功倍古人愛及煢嫠宜從人欲俾壽無期嗚呼不傭捨我曷歸公俾我活何以報之我思公兮泣淚此碑唐故睢陽郡太守贈祕書監李公神道碑銘並序漢家之建侯親親也以荆燕吳楚為首封而後嗣多材世濟厥美辟疆路叔更生子駿比肩而英華有首字出慶鍾故也唐有天下肺腑是依有若江夏淮安河間東平以明略茂勳左右大業其休德粹氣降為百祥公子公孫或哲或仁勤勞王家焜耀國牒從東平三葉後生睢陽言春秋者謂公族多士與炎漢侔矣公諱少康字某太祖景皇帝五代孫英華有也字太祖生雍王繪雍王二字英華作繪生東平王紹東平王三字英華作紹生高平王道立高平王三字英華作道立生畢公景淑初畢公娶于太常京兆韋萬石女有才子三人伯曰孟康忠敬直溫謙光不耀官至太子左贊善大夫仲曰仲康宏毅密重文敏貞諒由尚書主客郎中剖符楚州楚人到於今由其教而思其躅公楚州之母弟也纂二昭二穆愼身二字英華作為修之烈迪英華作允迪元方季方裕蠱之範家貽其謀天鍾其休故蓄為和氣播為盛德年始孩而畢公捐館七歲授孝經至喪親章捧書孺慕哀哽不食鄰伍英華作里長幼為之涕泗既冠遭太夫人棄孝英華作敬養苴英華作毀貌茹毒血泣無聲者三年自是孝稱鄉英華作親黨名冠宗室會垂拱永昌巳後天下有燕啄之謠英華作譖非七廟支庶不絶若綖英華作線公正志蒙難危行全德貞厲二十年以俟人作後據英華改道長中興後乃筮仕由朝邑縣尉凡七徙官至尚書祠部郎中以大府上英華作司佐授潞州司馬因英華作用考績彰聞拔為靑州刺史于時海岱貢篚衣履天下俗尚夸侈吏務豪奪英華作奢公以德禮示法度以誅賞禁淫慝宣明教化飭行帥先英華作尊師使刺繡倚市者悉返耕織於是貪者廉善者勸海濱之俗變至鄒魯按察使戶部侍郎宋遙以狀聞璽書褒異遷公於常州賜一子出身常之吏民望公風聲其奇邪英華作苛詭僭濫者解印綬自去比及下車無為而人和復以高第擢拜徐州刺史先是歲比大歉英華作旱人流者什五六公條奏逋逃之名削去其版然後節用務本薄征緩刑以來之歲則大穰人不患寡浮遊英華作墮自古者至數千萬優詔嘉歎英華作美賜帛二百匹元宗後後英華作天寶元年改宋州為睢陽郡命公為太守淮湖漕挽刀布輻湊萬商射利姦之所由聚也公謂非勝之艱安之惟艱故峻其侵漁之令宏其並容之仁吏或不廉不恪不惠不迪糾之詰之必誠必信誠信不欺故獄市不擾英華多獄市不擾故五字閭井輯睦由是飮英華有公字純固之德者如餒者得哺寒者得纊有司方將計課以聞天不惠於宋乃崇降癘英華作厲疾三年春賜告歸洛陽是歲十二月丙午薨春秋六十有四宗室悽欷士友矢圖英華作共悲宋人徐人輟舂相唁明年某月遷宅兆于京兆見子原先塋禮也公雅善屬詞有集二十卷晚節住英華作好禪味耽道論嘗傳道德上下經五千言為之訓解以究微旨其為政貞方廉靜明達端懿嚴不殘直不訐淸不矯時善不徇名友交推誠好惡中節博見強志親仁愛士居險英華作儉用晦遭時利往行藏之機與道屈伸未始以去就寵辱瀆其出處四字英華作繫于懷而壽位未極其量也故休祐復集於後昆夫人某縣太君廣平陳氏生元子曰涵以忠文孝讓儀型王室天子謂可內司九法外鎮百城大歷七年夏五月由尚書兵部侍郎為御史大夫蘇州刺史巡省江左邁德貽訓之所及也夫人沛國武氏以繼室生仲子汘汘弟弟英華作季子濃皆公英華作卿材而不幸早世英華作亡某年據英華補月日朝廷建推恩之令追贈公祕書監大夫之孝達于祖禰也及嘗忝禮官之屬知王侯英華作族之廟祧昭穆與功烈德善故受命於大夫酌而為志著之樂石以代蒸夷曰英華作云敦敘九族皇風所始公生德門運叶麟趾王曰叔父高陽才子纘乃祖服似英華作以續介祉底績三署舊章孔修赤舄彤襜牧彼四州明照姦訛仁覆隱憂神罔時怨民斯輯柔民之不幸公壽不永王曰彼天匪憗俾屏仁浹鰥寡道在彝鼎臧孫有後遺烈煥炳唐故朝議大夫申王府司馬上柱國贈太常卿韋公神道碑銘並序楚元王傅後五世長孺相漢始自魯國徙家杜陵其後十六世孫景略仕魏為靑州刺史靑州生隨倉部侍郎南皮公瓚南皮英華有公字生三子皆才同時為郎長曰季武實居主爵次曰叔諧典司庫部季曰叔謙歷吏部考功時人號曰三列宿考功生英華有而字知人以司庫員外郎為職方郎中自長孺至靑州二丞相一侍中十一二千石自南皮至職方二葉五尚書郎為當英華無二字世言婚宦者謂之郎官韋家楩柟瑤琨非崇山濬源不生故公侯卿大夫實鍾德門事業名聲與冠蓋俱四牡龍旗之慶百代彌熾盛矣哉公諱縝字某職方之仲子也忠廉無邪溫直好禮用誠明博厚祇若祖考之訓雖顚沛不違仁非得之不苟求言足以成事濟衆默足以居易愼獨鄉舉經行吏部登賢能拔英華作科授祕書省校書郎親纍徙英華作免官再遷至亳州臨渙縣令寬仁愷悌之政行乎千室期年而頌聲興遷薛王府文學轉祕書郎王宮圖牒天祿典籍公皆以儒服參焉藝文修而彝章敘歷佐濮徐仙三州淸恪如一入為申王府司馬以達才居陪臣之列宏道以奉職安義以直已諫從政肅繄忠亮是賴掌邦典者謂王門之治可移於公卿方議登之三府會寢疾終于位是歲開元十二年歲在甲子冬十月二十二日春秋若干夫人河南元氏益州唐安縣主簿知柔之女承先祖供祭祀之謂職閔勤勞勸以義之謂德莊敬恭順婉娩聽從英華作柔惠之謂禮顧復勞瘁均養善訓之謂慈夫人兼有焉某年月春秋若干卒某年月日合葬于某原嗚呼才宜貴仁宜壽世祿宜富三者公夫人皆居其地不臻英華作極其分鄉黨宗族以命不可説相弔焉唯明德必有後之言也信有若孟子幼成博見利器鏗若金錫英華作堅若金石天寶十年自尚書兵部郎出守漢中兼山南西道採訪處置使移典河內河內人至今頌之仲子幼卿洛陽縣丞縣丞英華作尉叔子幼奇宋州楚邱縣令季子幼章有貞幹密識恭寬而明前後八執憲而再起草自兵英華作武部郎中持節典泗楚二州錫金印紫綬咨以屯田英華有入字贍軍食如漢營平侯故事以言以立皆公之教訓也寶應二年春三月以子為大夫故詔追贈公太常卿君子謂公之義方慶及其身而楚州之孝誠格于宗祏禮也猶以為與化英華作物俱者人事不我期者邱隴雖大宗小宗可詳諸姓氏譜命官日時各存乎英華有其字屋壁之志若遺直與故事非金石刻則無以示後世也繇是楚州稽首于廟見託撰德垂懿萬億孝思罔極其銘英華作詞曰肅肅乃祖翼商屏周惣羣邦兮退傅間生扶陽重侯德乃英華作功降兮龜紐虎符黼衣彤弓世相副兮百代純嘏鍾仁於公德斯英華作乃懋兮為邦三年民足知方政之臧兮校文石渠觀書魯堂志自強兮三佐列郡曵裾遊梁道未光兮巳矣介福不充景行于嗟命兮一經之遺垂裕果盛哀榮並兮子子孫孫丕承忠敬荷餘慶兮唐故朝議大夫高平郡別駕權公神道碑銘並序開元天寶之際元宗始以八柄付三公由是台司得專其廢置其中或憑寵固位英華作因寵憑位懼天下有異己者諸附離之者皆出入三臺若公才令名以望見憚則稍稍優其俸而黜其職故天水權公幼明由新安縣英華無縣字令為絳郡司馬高平郡別駕而殁同於道者皆竊歎之是歲天寶六載秋八月也殁後草英華作二十有二載歲次己未春二月返葬洛陽故塋夫人新鄭縣君滎陽鄭氏祔焉縣君某縣某官某之孫某之子十字英華作某官某之孫某官某之子以仁儉好禮輔佐懿德柔明之風訓齊閨門壽六十五大歷二年十月某日終于丹陽初公娶于博陵崔氏生子曰驊而終新鄭以繼室生四子曰軼英華作駃下同曰申曰器曰舒舒不幸短命驊軼申器悉忠信好學善屬文位未顯而令名歸之慶之垂訓之流也至是既卜宅兆驊等懼日月逾英華作逝遠後裔不知其先人之德善謂及忝鄉舉英華作聲華之舊故使録而銘之云公諱徹英華作允字幼明隴西天水人也權氏之先出於顓頊其遠祖殷武丁之小英華作少子生而有文在英華有其字手曰權因以權受封且命氏二字英華作受疑作受氏焉至周為楚武王所滅國除其後有仕隴西者遂家于天水歷漢魏晉宋間子孫世都尉為郡守至裔孫翼與王景略同佐苻堅官至僕射後僕射數世至六字英華作翼生景宣景宣生士玢並知名於時士玢生萬春歷華州刺史封千金縣公華州嗣英華作生右領軍將軍曰文奬領軍嗣英華作生永興令曰懷育公永興之嗣也奕葉之明德粹氣藂于英華作乎其躬故融而為仁行播而為文學童子時舅氏崔湜奇其文嘗謂有何無忌之似其鄉舉也考功郎中蘇頲拔諸羣萃之中英華作間連尉湖城汾陰新繁渭南河南五縣開元二十三年拜監察御史會監祭太廟先時同會英華無會字事者約相與偕赴及將赴祭約者有故不至遽不暇告公曰人約我矣可先己而後信乎遂不赴坐是降為河南府法曹君子義之初選部舊制每歲孟冬以書判選多士至開元十八年英華作八年乃擇公廉無私工於文者考校甲乙丙丁科以辨論其品是歲公受詔與徐安貞王敬從吳鞏裴朏李宙張烜英華作恆等十學士參焉凡所英華作究其升奬皆當時才彥考判之目由此始也于時天下無兵百二十餘載搢紳之徒用文章為耕耘登高不能賦者童子大笑公攘臂其間以仁義為己任片言隻字動為學者所法時輩榮之而居家淸方唯德禮是仗潤身飭吏不過經術不矯持操以遊媚貴幸五字英華作以媚貴遊行威作福者忌之由是官徙而階不遷從法曹數歲而後有新安之拜及至歷絳郡高平任愈疏遠安貞中立英華作守中未嘗易方虛舟其心與位升降春秋六十四而終蓋道之行止與時不並論者以漢梁叔敬桓君山為比公所著文二十卷其立言之宗趙郡李華英華有嘗字編而序之英華有矣字若世系事業則書諸斯英華無斯字文其文曰咺兮權公有德有言忠恕廉淸道直而溫行有餘力足言斯文居官釐績勤約是守與明以信寧黜不英華作無苟迹屈志伸義彰身後冉政遊學左詩潘誄風流遺烈足以遺子九原與歸末由也巳毗陵集卷第八
