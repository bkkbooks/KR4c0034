body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及表下十三首爲江淮都統使賀田神功平劉展表爲杭州李使君論李藏用守杭州功表爲江淮都統使奏破劉展兵捷書表爲江淮節度奏破餘姚草賊龔厲捷書表爲張洪州謝上表爲獨孤中丞天長節進鏡表爲獨孤中丞謝讓官爵表爲獨孤中丞謝紫衣銀盤椀等表謝濠州刺史表謝舒州刺史兼加朝散大夫表謝加司封郞中賜紫金魚袋表謝常州刺史表常州奏甘露降松樹表爲江淮都統使賀田神功平劉展表上元二年臣某言得田神功等狀稱官軍以正月二十六日過江大破賊衆擒元惡於䔉音歷山之下兇殘撲滅江界無事臣某誠懽誠喜頓首頓首臣聞四時成歲秋爲英華作實司殺故英華無故字聖人則之以作五兵蓋姦宄寇賊或乘釁而起則英華無則字干戈弧矢亦有時而動自陛下率遏亂略再造區宇欃槍旬時英華作始竹破瓦解蕞爾狂狡敢干天誅作爲長蛇荐食江漢乃矯誣我天英華作詔命攘竊我王師暴殄我城邑俶擾我邊鄙荆吳之人若墜泉谷萬姓業業奔走英華作云我無所陛下神聰一作聽不測睿算無方將欲擒之必固縱之先侈其心而厚其毒然後制勝兩楹之下授略千里之外使神功等一戰而陷陣再戰而逐北三戰而擒其渠魁繫頸以索覆巢傾穴英華作卵刮野掃地如烈風之破駭浪嚴霜之隕英華作墜落葉浹辰之內平揚州定淮南下朱方收三吳流亡者復故業塗炭者返壽域扇以皇風與之更始遂令東土耆老英華作舊復見漢官威儀非陛下乃武乃文之鴻烈日用不知之元化熟能陰騭聖功如此其英華作神速臣無任慶抃之至爲杭州李使君論李藏用守杭州功表臣某言臣聞當逆賊劉展擁兵過江之日變起倉卒鋒不可當人心動搖英華作殆物情危駭五道節制望風潰散自淮而南至於海隅遂無敢保一城能守一節者唯少府少監李藏用以宗室近屬憂國如家臨危抗憤忠勇奮發收聚散卒糺令義師英華作士挺身履險出萬死一生之地與賊轉戰堅守蘇州相持經月殺獲過當使兇徒逆黨二字英華作賊徒鋒銳挫衂自此王師載英華作始張賊衆知懼其後以外援不至衆寡懸絕遂移師就險英華作嶮退保杭州當此之時江淮諸軍巳散平盧之師未至三分全吳賊有其二藏用且募且戰英華作戰士獨守孤城以忠義感激令驍雄樂用旬月之内致死士三千賊遣僞將張景超孫待封等盡銳率衆分道來攻藏用與將士等戮力一心義形於色殊死決戰奮不顧身遂能兵鋒所加無不摧陷皆一舉盡敵覆而屠之前後俘斬虜獲至數萬計向使微夫人之力扞此州之境則江介土宇盡爲戎疆海隅蒼生非復我有由是浙江之外英華作西南至閩嶺士庶免有波迸道路窮寇不敢英華作能搪揬藩籬屏息舊疑脫誤按英華無屛息二字便可讀風波晏然百姓樂業父不喪子兄不哭弟藏用之功也今都統使停本職巳罷孤軍無主莫知適從將士嗷嗷未有所隸天聽高邈無人爲言遂使殊勳見委忠節未錄口不言賞賞亦不及伏恐非聖朝旌有德表有功之意今逆寇英華作賊雖爾英華作殄人心猶攜山洞海島往往結聚睦州草竊爲蠧尤深唯憚藏用之兵是以未敢進逼若此軍一散必羣盜交侵則臣此州危亡是懼伏望早降恩旨以荅其勤錫之勲策委之英華作以戎政俾惣統所領以鎭遏江表實江東萬姓顒顒之望艱難之際人多二心英華作異言以宗子維城智勇如此必能使寇賊姦宄不敢窺伺間隟則江淮足以高枕而臥陛下可無英華作無有東顧之憂臣屬忝葭莩任居牧守安危之分臣實預焉臣無任懇款之至爲江淮都統使奏破劉展兵捷書表肅宗上元二年臣聞聖人之生不能使大盜不起唐堯英華作虞之代時則有四凶在英華作之列王制所以誅不恪討不庭小者市朝大者原野姦宄草竊何代無之劉展苞藏禍心爲日固久英華作久矣敢肆姦慝乘間阻兵長駈凶徒掩臣未備以僞言亂衆謂天命在已於是有豕食淮泗鯨吞荆吳英華作楚之心使黎庶播越人神憤怒臣職司靖難敢不戮力當英華作將憑廟略以殄寇讎謹遣副使少府少監攝侍御史史下英華有臣字李藏用屯兵杭州伺隟進討且分處英華作據隘害以遏其唐突賊衆狃于初役師輕而驕四字英華作驕舞輕脫不虞我軍能折其銳也乃以今月三日使其僞將軍張幹朱法雲英華作德裕一作德容等領步卒英華作兵七千馬軍英華作兵六百徑入杭州東門焚燒閭閻鼓噪而進藏用引其精卒設伏於英華作險途羸師張之使入死地然後整堂堂之陣以薄其壘使左廂兵馬使潭州長史李澄爲左軍左第一將張巖光先鋒將李強李陵等佐之都押衙高幹爲右軍左押衙楊履和都虞候魏守寂佐之左第二將皇甫山栖左三將梁朝康承寂左四將吳季之李楚玉顏光允等督游軍之騎以彌縫其闕表裏合戰奇正夾攻以將帥之餘勇因黎元之積憤奮皆敢死登必爭先赤羽交而三軍風生金鼓鳴而萬夫氣作自卯至午覆而敗之神扶電掃雷落山破噍類無餘隻車莫返鋒鏑之血朱殷長江甲齊崇山尸作京觀實賴陛下聰明齊聖與日月合照照字据英華補故能慮圖發於罇俎而威靈加於遠方臣等盡敵如拾芥成功如指英華作抵掌惡氣沴祲掃蕩無日海隅蒼生比屋何幸臣無任慶快之至爲江東節度使奏破餘姚草賊龔厲捷書表代宗臣聞皇天分時秋爲司殺王者立極兵以禁暴唐虞有共工苗人英華作三苗之患殷周有鬼方昆夷之戰蓋蠻夷猾夏自古有之自頃胡寇作逆吳越震恐龔厲父子乘閒起兵劫明州之人掠餘姚之地負阻英華作隘後萹作險海口憑陵江干蟻聚偷安蠶食分英華作取給屬王師北伐未遑南征逮兹二春英華作年侵掠益甚將擬復英華作得東甌故地窺南越僭迹邊邑黎庶爲之騷然臣方荷推轂之寄懷盡敵之計思所以扶乘天威圖制遠略料其貪而無整勇而無剛烏合英華作散獸聚不足當堂堂之陣山潛海後篇作水匿不足用桓桓之師難以力制易以計滅臣遂遣軍將潘景蘭領輜馱數十輩僞爲商旅傍山谷往來以餌之又遣軍將呂道光領拍音博刀手一百人取其便道爲伏以待之遣軍將左璋率弩手一百五十人爲左翼將軍英華作軍將將余能變率弩手一百五十人爲右翼皆三吳良家百越勁卒爭賈餘勇樂於公戰蓬頭突鬢焱英華作炎駭火烈相爲輔車夾敵之路又遣軍將張思覽率拍刀手一英華作二百人爲中軍操中權之制以節其進退以三月二十九日至靑煙洞口果如臣策賊遂出山先者遇伏鼓譟合戰於是奇正後篇作兵畢舉四軍夾攻賊衆奪氣不知所守鳴鞞雷動飛鏑雨集轉戰四英華作數十里殺其三百餘人龔厲尙稽天誅且偷晷刻收合餘燼八九十人更登高堽背山借勢英華作一張思覽等連弩亂英華作竝發引軍合圍天聲揚而勇士厲銳氣作而妖星隕遂斬元凶父子擒其妻孥餘黨僵仆原隰脂膏草莽猶恐蔣潢翳薈尙有伏姦遂攪山搜谷刮野掃地傾其巢窟一作穴返斾而旋累載逋誅一朝撲滅非陛下聖謨神策與天合契制勝兩楹加威後篇作威加四海則安能翦豺狼如拉朽掃攙搶如英華作同拾芥使吳越乂安江漢澄廓臣受鉞未幾覩兹英華作同成功無任慶快之至謹差攝福州泉山府別將左璋奉捷書以聞幷齎逆賊父子頭奉獻伏望後篇作請懸之藁街以示百姓其餘首級於當州梟示訖所獲賊物各令分賞將士器械官收山海餘祅自取誅滅旣非強敵不足敘功謹錄奏聞懷玉按此篇在文苑英華五百六十六卷又見六百八十四卷字稍不同篇中所注後篇是也爲張洪州謝上表英華洪州下有刺史二字臣某言伏奉某月日勅除臣使持節都督洪州英華作府諸軍事洪州刺史充洪府等七州都防禦觀察等使臣才不如人位忽過量仰戴天造兢然自失臣某誠惶誠恐頓首頓首臣往歲祿山以盜泉飲臣臣受左袵之辱而不能死陛下以鴻私活臣臣荷乾坤之施而不能答徒竊寵祿英華作榮類表作秩三典藩郡至如俗阜類表作幸不擾人或小康此實堯風被物比屋日用英華有臣字敢貪天功以爲已力不謂陛下奬勸是務以臣爲勤自春徂秋凡三錫命九州之伯臣忝其一況豫章重鎭荆揚奧區五嶺控其南九江在其北連帥所英華作軍師之統安危是繫分憂之寄豈臣足當負荷恩輝英華作光懼隕越句似徵有誤懼字上疑脫深字或大字于下于下二字据英華補今以某月日到所部英華作任所上訖謹當靖恭守位夙夜在公宣皇猷以導風俗仗天威以訓師旅庶以四境無虞百姓輯睦爲報力或或字据英華補不足則繼之以死臣之分也敢有二事臣無任喜懼之至謹奉表陳謝以聞至下七字据英華補爲獨孤中丞天長節進鏡表肅宗臣某言臣仕於太上聖皇之朝早蒙寵秩位至剖竹任兼干城摩頂至踵皆聖皇所錫陛下又不以臣菲薄加臣憲威殊私降臨榮命重疊臣頃雖罄誠竭節竟未能夷凶靜難思所以仰酬天造緬邈無階以去年五月五日於淮陽鑄上件鏡欲獻之行在爲聖皇壽冀申犬馬之意臣子之心屬豺狼方熾道路艱阻懇願空積上達無由今宸極正而乾坤貞觀驚塵英華作氛霧收而日月開朗當白露盛序之秋正黃河澄淸之日臣幸逢佳節願展微誠謹遣謹遣下英華有某官二字某乙進上件二鏡一獻聖皇一獻陛下輒以愚懇英華作悃上續聖壽英華作上黷聖聰臣伏以聖皇執契垂化有如金玉之式陛下時乘馭天騁飛龍於國步臣故以金龍飾鏡以表聖德伏冀纖塵莫翳朗鑒長懸挂仙臺而如日之昇含品物而無私不照而臣之肝膽亦庶呈於此輕黷宸房戰越交深臣無任爲獨孤中丞讓官爵表臣聞任非其賢則負乘之寇至寵過於分則尸素之患生所以建官者必惟賢是擇就列者亦量力而處臣幸以駑蹇遭逢盛明頃當遏亂之日謬以專城見委雖常嘗膽歴年然未有以報國陛下奬臣微効驟加崇班以執憲剖符之職兼推轂授鉞之寄位至十連澤及三族臣豈不知踰涯越分冒寵叨榮顧凶黨尙存王師未戢當聖主宵衣之日非臣子釋負之秋是以勉勵疲朽不敢陳讓然爾來竟未能奮一奇展一策掃蕩寇賊仰酬恩私而事乖誠願又加風疾無功而當厚賞抱病而處大藩尸位曠職臣實増懼今聞大軍長驅巳濟河圍鄴祓氛沴氣朝暮廓淸聖朝方當櫜弓矢而休牛馬搜俊乂以僃鴛鷺豈臣菲薄之質疲苶之身所宜猶握兵要仍居寵秩使上黷朝倫下速官謗以臣固陋猶知其不可況陛下聖心乎伏乞特降睿慈矜臣尫瘵許臣停官養疾以避其賢良則慺慺餘生於兹幸甚臣無任感戴之至爲獨孤中丞謝賜紫衣銀盤椀等表臣某言今月十九日越州長史盧漸至伏奉某月日勅書特賜慰勞聖藻御札降臨自天二十三日中使劉光俊至又奉宣口勅賜臣衣一副銀盤椀等各一兼百索一作素一筒紫衣十副分賜用命將士端午續命推心而澤流萬里頒賜而慶及三軍臣等捧戴恩渥隕越是懼臣某誠惶誠恐頓首頓首臣拔自周行見委戎律受金鉞分竹符荷天之寵歲一周矣竟未能虔奉廟略誅鉏殘寇使邊烽尙燃虜馬未郤臣之罪也陛下不以臣官非其據任重於力而驟降殊榮累加厚賜天文下矚而星辰爛燦宸翰俯臨而煙雲飛動況盤盂器用章服繒綵賜臣爲壽施及行閒投醪之恩未足言醉挾纊之德曾何喻暖臣等雖勉勵忠勤誓淸塵霧然絲髮之効未展雨露之渥亟加揣分循涯臣懼深矣謹當宣皇恩以勵將帥奉師律以練甲兵必使江海無虞士卒知訓然後畢力殄寇以荅鴻私臣無任謝濠州刺史表英華作濠州刺史謝上表臣及言臣伏奉今年五月一日勅授臣使持節濠州諸軍事濠州刺史臣頃待罪禮官僃位英華作員郞署職曠無補增懼且媿陛下不以臣愚擢居二千石之列今之刺史古之諸侯州人安否繫在一吏臣非其才無以稱旨奉詔之日懼又甚焉以閏六月十二日到所部英華作到任所上訖唯當奉宣聖猷竭誠帥下瞻戀天造酬効無階臣無任喜懼之至謹附驛奉表陳謝以聞臣及誠惶誠恐頓首頓首至下十九字据英華補謝舒州刺史兼加朝散大夫表代宗臣及言臣奉七月十八日勅加臣朝散大夫使持節舒州諸軍事舒州刺史充當州守捉使兼知淮南岸當界緣江賊盜臣典濠州無政可紀人幸不擾時和所致流者稍復年登之力臣敢貪此以爲己能陛下過聽驟降殊奬英華作私旣増之秩又命以服無德受賞媿英華作幸孰甚焉仰戴皇渥類表作澤且榮且懼今以九月二十七日到州上訖經積年寇盜瘡痍之後百姓流窳英華作浪十不一存臣以奉宣聖慈與之休息勞來鰥寡薄英華作寬其徭賦是以英華作以是招攜亡者撫柔存者庶經秋之後頗或頗或英華作或致安集非曰能爾冀竭力焉臣無任感戴之至謹奉表陳謝以聞無任下十一字据英華補謝加司封郞中賜紫金魚袋表代宗臣及言伏奉三月一日勅加臣檢校司封郞中使持節舒州諸軍事兼舒州刺史充當州圑練守捉使仍知淮南岸當界緣江賊盜賜紫金魚袋殊榮厚渥驟鍾臣身且喜且駭英華作驚以媿以懼臣聞堯舜建官三考黜陟漢代二千石以循良稱者於是有璽書勞勉増秩賜金之制臣到官始半歲職事未有所補見在戶口纔有地著其中鰥寡疲弱不能自存者十猶六七徵遣征賦未嘗及期此臣政不逮力不任之效獲宥罪戾幸固深矣豈謂皇恩驟降復以古典命臣加位授服寵過臣量伏讀詔旨英華作書懼孰大焉此則古荆舒之地詩人懲其剽輕復當賊寇虔劉比屋流亡之後其人心巳難安易動況加徭役稅斂日不獲己緩之則驕急之則散輯柔㡳綏之道尢非愚臣所及伏思夙夜英華作伏當宣風勉勵力安斯人省事以慰其愁示信以杜其爭亦冀俗稍務本人漸足食使貢賦之入歲増月長三歲大比以版圖歸於有司犬馬之心也敢有貳事臣無任感戴之至感戴四字据英華補謝常州刺史表英華作常州刺史謝上表臣及言臣伏奉去年十二月二十三日勅授臣使持節常州諸軍事守常州諸軍六字据英華補刺史充常州團練類表作當道守捉使臣伏以江東之州常州英華作最爲大類表作常爲大部陛下不以臣不肖拔臣於羣吏之中以考則年未久以勞則功無可錄而除拜之次加於人一等臣及誠惶誠恐頓首頓首臣往歲嘗忝諫官歴博士尙書郞之秩雖僃嘗獻納累黷天聽英華作聰竟無絲髮裨補明盛英華作盛明及典濠舒二州岀入七年又不能副陛下政平訟息與我共此英華作理之歎至如流人自占旱不爲災實由陛下當勤恤英華作雨之初下哀痛之詔寛減租稅入三分之二是以和氣傍感災變爲福福流臣州人是以乂類表作泰臣寧敢貪天之功以爲己力今陛下賜臣詔曰斷獄歲減流庸日歸以人俗之豐給當淮湖之災旱陟爾明效宜列中朝臣無其實謬奉殊恩英華作奬伏覽聖旨惶悚隕越況陛下厲精百揆之始日以堯吁舜咨㫄求俊造或經時不除一吏除必以公才爲先苟非其人位不虛授搢紳之輩僥倖望絕臣當如此如此二字非沿類表之誤英華作此時是獨荷榮寄人之多幸將自臣始致寇速謗實憂自貽今以三月十七日到州上訖雖顧顧字英華作欲勉二字勵疲鈍増英華作勤脩吏職懼力不逮上累皇明奉詔夕愓且慙且駭無任感戴喜懼之至謹奉表陳謝以聞至下七字据英華補常州奏甘露降松樹表臣及言臣州内㕔東階下二松樹自今年十月十三日夜至今月十八日夜前後二十七度甘露下降樹根枝葉霑灑皆徧潔白凝沍味同飴蜜餘澑滴地委積成泥傾州官吏咸共榮觀臣謹按鶡冠子云聖王之德上及太淸下及萬靈則甘露下瑞應圖曰王者德至於天則甘露降松柏陛下實行慈儉懷柔遠近無爲之政與太古同風故天地氣和合而呈瑞況休徵感應之始當陛下降生之日皇符昭哳天意炳煥蓋表聖壽寶歴將與天比崇臣爲州三年無績可紀疲朽何幸目覩禎祥臣無任喜忭之至謹奉表以聞伏望宣付史館毘陵集卷第五終
