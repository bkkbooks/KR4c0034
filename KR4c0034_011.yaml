  text: 毗陵集卷第十一
  hash: sha256:f17ef3f7e4111c097a773f85549a932adb49423aa8f1c5b15a9c155cc1f21349
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_011-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及墓志墓表中九首唐故正議大夫右散騎常侍贈禮部尚書李公墓志銘並序唐故祕書監贈禮部尚書姚公墓志銘並序唐故特進太子少保鄭國李公墓志銘並序唐故朝散大夫中書舍人祕書少監頓丘李公墓志唐故給事中贈吏部侍郎蕭公墓志銘並序唐故銀靑光祿大夫太子左庶子嚴公墓志銘並序唐故尚書庫部郎中滎陽鄭公墓志銘並序唐故吏部郎中贈給事中韋公墓志銘並序唐故河南府法曹參軍張公墓表唐故正議大夫右散騎常侍贈禮部尚書李公墓志銘並序歲在丁未七月丁卯有唐故右散騎常侍李季卿薨享年五十九文經邦國行滿天下無人非鬼責之悔以近後劇無中人十金之産以補祭於身沒顧謂宗子家老必以巾車一乘斂手足形還葬其孤馮翊縣令霸一作伯等泣奉遺命以某月庚寅附宅兆於長安九陴原之先塋名公上士護喪會葬同道必至哀纏都邑初公烈考日適神龍中歷官中書舍人昭文館學士工部侍郎才高而明為文章蓍龜公生而好學地使然也豁然閎達天所縱也臨大節而賈勇不私其身也進賢不進不止事君以忠也當昔天步方艱王師有征公入參諌臣出佐軍政直躬咨諏戎臣賴之其後領二曹判二州再司王言三二京尹由祕書少監為吏部侍郎復兼御史大夫慰撫山東淮南明年勞旋典選如故大歷三年拜右常侍其勤王家十有餘年舉措由道行止以直居貞守忠欲不能惑思賢求才若渴若飢推心吐誠親疏以之執德之經不為利回正進退於忠信視得喪如洟涕凡君子在位則不仁者遠攸徂之邦宜皆蒙福遽奪公算是不惠於斯人也天難忱斯嗚呼哀哉諸公以為不可奈何者壽夭之數若奮揚景行宜在知己由是尚書右丞長樂賈至作銘曰於維李公誕靈中和磊落瓌奇如山如河胸中洞開萬里長波孝友忠信詩之無邪早歲登科以文從吏纍擢大邑拔乎其萃時之方難朝愼名器帝曰忠讜爾居諫議出典方嶽入趨禮闈再掌絲綸翺翔鳳池乃作天官又侍紫微八使澄淸功濟危時諤諤正言有犯無隱詼諧善謔託諷脣吻雲衢未窮陰霜夙霣悽愴東川古來共盡人懷遺愛帝念謀猷褒贈春官悲感林丘己矣平生哀哉若浮獨有令名與天悠悠唐故祕書監贈禮部尚書姚公墓志銘並序有唐祕書監永安縣侯姚公諱子彥本作産據英華改字伯英其先馮翊蓮勺人也至高祖僧洪徙家河東祖思聰祕書少監父坦汝州梁縣丞贈祕書監公英華無公字忠諒孝愛寬仁願恭質方氣沖天所授也而力行博學溫故知新錯綜六藝公作詞賦初舉進士又舉詞藻皆升甲科尉淸苑英華作遠獲嘉永寧三縣開元二十九年詔立黃老學親問奧義對策者五百餘人公與今相國河南元公載及廣平宋少貞等十人以條奏精辨才冠等列授右拾遺內供奉歷左補闕於時英華作當是時天下無金革之虞七字據英華補選多士命百官先文行而後名法英華作吏事而柱下方書南宮章奏主張綸翰典司禮文英華作樂尢精其選非盛名莫居繇是遷公殿中侍御史禮部員外郎禮部郎中知制誥中書舍人太常少卿天寶十四年奉詔宣慰江東淮南覽觀風俗無何二京陷覆太夫人捐館公外罹憂患內纏惸疚銜憤泣血毁鄰英華作瘠滅性乘輿反正公適外除拜太子右英華作左庶子於時迍難始康百揆草創官復其職人亦求舊俄又授公中書舍人禮部侍郎光祿卿左散騎常侍加銀靑光祿大夫復知制誥廣德二年授祕書監以儒行懿德策名三朝遺迹故事周遍臺閣自以儒行至臺閣十七字英華作策名事君二十有七年文學一紀羽儀三朝凡六蹈瑣闈三掌訓誥四居禮官一典祕書其遺塵餘迹周遍臺閣言行事業著於天下資忠體和唯道是居正身奉上中立不倚恐懼戒愼形於隱微故遭值傾否出入夷險而未嘗有悔名與身偕德善英華作中庸是依明哲以保故也享壽七十有八大歷三英華作二年四月某日薨於位五月某日詔贈禮部尚書知言者以為壽富康寧攸好德考終命洪範謂之嚮用五福而公居四焉以淸儉貽厥子孫故所不至者富焉爾非明德介祉何以享茲有子曰驍曰驥曰驂曰駰英華作駟曰驌號于英華作呼昊天痛欲報之罔極也銜恤問禮抆血襄事十月丁酉卜兆此原惟盛德與公器若川流之無還垂芳如之何刻銘英華作石墓門其辭云英華作日恂恂祕書蘊粹含和服膺孔門行鄰英華作登四科遭時之康天下尚文公奮羽翰翶翔慶雲晚逢中興貴德尚齒公秉懿範入作卿士逮事三后出入二紀典禮司書媚於天子居貞保儉與祿終始鬱鬱佳城烈烈餘美英華作光烈遺美日月有逝令問無英華作不己唐故特進太子少保鄭國李公墓志銘並序少保諱遵皇唐太祖景帝七世孫也祖瑜鄭州刺史追贈太常卿烈考曰暈官至太僕贈太子太師揚州都督公聰朗奇偉豪邁曠達率性忠孝臨節有勇開元十年初仕天寶六年出守始於淄川歷濟南汝南以剛明蒞衆所居政肅民受其賜生為立祠十四年秋九月由執金吾為彭原郡守明年長安覆沒元宗遜於南京便橋之役我師敗績自新平屬之五原二千石皆反為賊守肅宗以餘騎十數次於彭原公頓首迎謁且憤且喜因獻衣服鞍馬泣問大計乃悉發倉庫募敢死士獲九百人公自誓衆扈蹕而北翌日師次臨涇又北至於平原收攜二逆命者斬之以殉破其餘黨進幸靈武旬日衆至數萬王師遂張於時法駕播越神器無主公與裴冕等率羣臣勸進陳天意上尊號上即皇帝位拜公尚書工部侍郎領宗正卿乘輿南旋公封鄭伯舊京始復公典營建社稷宗廟園陵壇墠罔不畢修百工咸若乾元二年論功行封策為鄭國公定食實封二百戶加特進工部尚書宗正如故上每拜公相命將帥建妃后公悉參焉渥澤滂沱羔雁盈門家有陸生之槖樂兼魏絳之賜中興宗臣荷寵無二會李輔國泄省中語且諷公卿舉己為相公不從密陳其姦明年肅宗崩公由太子少傅貶袁州刺史竟為盜憎且讒勝故也寶應二年拜鴻臚尋復加太子少保貶永州司馬大歷二年七月某日薨於永州春秋若干夫人盧氏蘄春郡長史諭之子以副笄宜室封范陽郡夫人而偕老愆願先公十二歲而殁大歷三年夏五月庚申合葬於萬安山北原禮也惟公宣力殷憂之際克扶艱難之業忘身衛上忠之至者及居職任事知無不為永泰之後以列侯朝請則放志達生以親其身再處左官皆非其罪知公者謂公進因策勳退不附邪善無近名直而忘懷斯可謂之達矣有四子謂誦諲諤願書其先人之勳烈使後嗣得酌而觀之於是公母弟祕書少監日勛謂及忝佐典三禮宜知先王先公之昭穆故命為志其辭曰貞松之姿匪寒不知公之淸規見於國危抗憤忠勤發民濟師戮力扶義天步乃夷奄有滎波遂荒鄭封帝曰俞往汝作共工澤流於家慶積恩重門羅軒蓋賜有歌鐘再謫湘源謂當後笑遂遊岱宗天實不弔寂寞舊館悽涼江徼琢石泉戶摛其光曜唐故朝散大夫中書舍人祕書少監頓丘李公墓志公諱誠字元成魏郡頓丘人也九代祖誕魏太傅陳留郡王從太傅七葉生左威衛將軍翊威衛生汾州長史升長史生濮陽令諒濮陽生公四歲知禮七歲善屬文十六戶部尚書姚珽以賢良薦比之終賈開元三年舉進士十年舉茂才十七年舉文學皆射策取甲科由太平尉為金吾曹監察御史河南司録美原令膳部員外郎天寶元年考功郎中知制誥修國史二年中書舍人五年祕書少監七年十二月終於京師自初仕至終二十七年歷官十享壽五十三動靜由禮交不諂瀆宏毅貞亮直而不肆居官必忠執事必敬未嘗以悔吝改操為權幸屈法由是自御史為河南府司録持正不阿故也宰美陽周月收案大猾除其根株然後布政及期而美陽無訟乃有涸泉湧流白雀馴於廷開元中蠻夷來格天下無事搢紳聞達之路唯文章先公以俊造文賦皆第一京師人傳寫策稿相示以為式無何司言載筆乃典祕書公才盛名與職位俱論者謂公以文學政事取公器如拾芥雖不至公卿其令問令望足遺後昆夫人孝義縣君宋氏萊州司馬元同之女禮樂風操家之範也柔明孝慈天之質也淸淨厭離修之惠也能修采蘋之職以正家節李氏之閨門肅九族睦實夫人是賴乾元元年隨長女從夫于洋州二年正月二十五日終於某居享年五十七遂權窆焉路難不克反葬故也有才子二人曰興曰殷悉能荷先大夫之德興三十為左補闕起居舍人殷舉秀才甲科永泰二年興請命於上迎夫人喪至自洋州十月二十七日合祔於澠池先塋夫唯天地能長且久若邱隴陵谷則無不遷者也故纂其先人之景行勒於石以為志唐故給事中贈吏部侍郎蕭公墓志銘並序公諱直字正仲梁長沙王懿七代孫有唐御史中丞臨汝郡守諒之孟子聰秀英達忠敏孝敬志強體和才方而圓果於從政當斷不惑有妙用明識足以濟衆利物與朋友然諾見於一貴一賤之際十歲能屬文工書十三遊上庠十七舉明經上第名冠太學二十餘以書記參朔方軍事中丞府君之遇讒謫居也公亦播遷漢東移尉穀熟至德二年乃由廷尉評授監察御史歷河南府戶曹京兆府司録參軍其後驟升尚書戶部庫部司勳吏部四曹郎自殿中進兼侍御史中丞徐州刺史廣德元年中一歲四遷更七職朝廷難奉使之選謂非公莫可故也永泰元年拜太子左庶子大歷三年授給事中前後居官二十辟書記支使判官副使行軍司馬二使臣之車者八出入冠柱後惠文冠者六所從之主則朔方元帥張懷欽汴州刺史李彥允揚州刺史李成式戶部尚書李公峘故相國今戶部侍郎第五公琦今相國黃門侍郎王公縉中書侍郎元公載其人也當乾元上元中大憝未靜王室之安危唯方面藩鎮是瞻公所佐之府必以忠力主畫疑謀危事談笑而決刀筆之所加應機成務談者稱其多才𥘉公居先公夫人之喪外除猶毁其後母弟立卒公期不絶哭再期懸不樂吳本作不懸樂食不肉談者高其孝友人緩急大小之請必儲必副內姻外姻與所知之喪必匍匐而救之賵唅加於人一等談者服其仁愛至是與為庶子給事黃門出入兩宮優遊三公間皆得其歡心方謂六卿九伯之位可坐而拾命不我與天孤人望歲在丁酉二月二日終於靜安里正寢春秋四十六談者歎其名與位與才與時四者皆並獨壽不至時輩以為痛三月二十五日詔贈吏部侍郎嗣子策密莒羸然銜哀奉喪來歸冬十月甲午卜葬於洛陽龍門岡先中丞塋之左禮也先其期論撰功烈以墓銘乞其父友孝也余欲塞其孝思之誠故録其實不華其文銘曰天地氣和靈芝吐葩德善下鍾才子承家為言為行是構是荷平聲天子謂公濟美忠文駱馬鐵冠俾佐使臣周爰海隅撫循斯民往踐諸曹亦倅戎車一麾出守言隼其旟乃推銅樓復登明廬竹花梧葉棲食茲始曷云不淑今也遄巳萬里可到中途而止逝者如斯化往莫留瑤林瓊樹零落山邱匪石之貞曷紀德休唐故銀靑光祿大夫太子左庶子嚴公墓志銘並序皇唐太子左庶子河內縣子馮翊嚴公諱損之故都督洮州諸軍事洮州刺史協之孫贈太常少卿方約季子中書侍郎挺之母英華作愛弟家之慶天之體鍾於公躬故英華有其字德僃少仕昌世遇權臣惡直官不登三臺晚值多難安貞不競故位不過郡守宮尹前後佐英華作羽疑當作翊兩衛參四府領二縣典七州再入石渠三升英華作登龍樓凡處任十八享年七十六未嘗以利苟合違道從欲用之則行見機不俟動靜允迪英華作忠信是履勞謙有光廣德二年六月二十五日終於襄陽是歲八月權窆楚山西原冡子曰式官至江陵少尹不幸道夭仲子曰士元由殿中侍御史為尚書虞部英華有員外二字郎少子曰士良領祕書三字英華作祕書省著作悉能裕父蠱懿文德取公器他日獨立訓所至也大歷三年歲在英華作次戊申五月二十九日返葬洛陽先塋禮之至者英華作也宗人故太常卿向嘗狀公往行貽諸有司謂公外寬內剛廉正篤敬溫而不厲直而不訐英華作輕學究原本行有枝葉故其適道求友蒞職任事核其實不居其華初公宰泛水也以莊明慈惠為政泛水英華有之字人不敢欺而戶口增倍獄訟衰止御史中丞蕭隱之以狀聞公是以有著作郎之拜其後歷太原上谷弋陽餘杭丹陽雖風俗殊異治效如一不曰才乎公在淸池會安祿山與當國者交惡公曰難作矣英華作難將本矣遂移疾請告姦黨惡之是以有弋陽之貶貶之明年河北為戎不曰智乎涉艱患不辱身踐祿位不徇名居義處順動罔違吉不曰貞乎嗚呼榮問素業與時皆逝可稱也而不可追也今採其實録刻石示後蓋欲報罔極者之志云英華作爾其辭曰君子之道容民畜英華作和衆公宰二邑二邑無訟與國共理本作此據英華改惟二千石公七剖竹英華作符七著成績乃師國子司成望苑考藝校德以弼三善中和其心正直是踐道亞羽翼名掩春華忠以事君孝施於家粲粲令子鮮侔晨葩若何不弔盛德既喪音徽永沫士友孤望千載九原遊者悽愴唐故尚書庫部郎中滎陽鄭公墓志銘並序永泰元年六月四日尚書庫部郎中鄭公卒春秋四十有九知舊茹痛行路嗟悼謂公口無擇言身無擇行得乾之貞固損之元吉坎之常德明夷之正志宜荷福履俾如山阜而秩止於三百石年不及知天命明神豈豫欺乎嗣子正藐然始孩孤窮何怙八月四日葬於先塋宗人家老於是乎以果行實録賁於豐石禮也公諱寵字若驚滎陽開封人也其先建國命氏有鄭世家言之矣大王父某澧州司馬贈衛州刺史衛州生襄陽令某襄陽生臨汾令某臨汾生郎中純懿休祉之所叢也貞亮忠厚仁讓孝敬融明而溫性與道並二十舉明經高第解褐鄴尉太尉房公之由鄴郡而為右扶風也表公茂材擢虢縣令虢土狹而人窳公用教化漬之謂任力不及任人聽訟不及使無訟故以直宏道以信齊政以禮肅墮以讓息競蒞止一歲虢人恥格至德二年拜監察御史徙太原戶曹領平遙令真拜太谷其在晉如在虢也詔書勞之錫以命服遷華原令拜尚書工部員外郎而唐人晉人猶歌詠盛德願得公常居其邦莫有由也太原守上其狀詔遷太原少尹未行轉庫部郎中凡歷十官宰四縣一持斧而再起草其政先道德而後刑法內精辨而外若訥戮力事上吐誠率下罔曲物以直己罔咈百姓以干名聲唯畏淸之知善之彰飮其教者欣然樂康而不知其惠之所由生也與公遊者靡親靡疏悉飽醇德而莫見其天機之弛張也其學而知者唯濟南之書淹中之禮田禾之易胡母之春秋酌其微言以治其身身之治移於閨門閨門之治移於官官之治可移於國而壽不可踰於域故位量未半良史無述焉自古有死彭殤同途獨有其身殁而其名存乎故老之口此之謂不朽不可以不識其詞曰剛德干時道家所忌抑抑鄭公直溫柔毅衆人缺缺鄭公見朴衆人昭昭鄭公若濁布政四邑四邑和樂雷震風偃物亦允若御史執法郎官草奏鄭公蒞止德音是茂於以經術潤色王度宗族敘惇鄉黨歸仁孝謹之風萬石之門兄也弟也夭夭申申善則無報天地不仁抑抑鄭公執德之中生不近其名殁不隤其聲于嗟乎鄭公唐故吏部郎中贈給事中韋公墓志銘並序郎中諱元魯字穎叔司農少卿德敏之孫衢州刺史魯縣康公璆之子天寶五載解褐尉邠州新平其後參佐使臣者五入御史府者三一居專城六為尚書郎大歷二年十二月乙酉以吏部郎中終於京師靜恭里之故宅春秋五十有五啓手足之日朋從僚吏親者疏者匍匐雨泣奔之如不及惟郎中寬靜博厚孝友貞儉朴而願達而好禮氣和於中而博之以文好惡嗜欲發皆中節以誠待人不務智巧雅尚儉愼臨事則虛己應物與道弛張性若踈緩赴急則慘怛之仁形於顚沛誦詩三百不以文自衒在官必聞未嘗近名尢樂間曠每以丘壑為己任機事嬰之而未遑也則公之殁也迹負其志壽違其德官屈其量君子以是三者思其人而哀其命公無允子以兄子某為嗣大歷三年正月癸酉卜竁於舊塋初執事者議三府高選欲以給事黃門待公既而弗及僉以為恨至是詔贈給事中以褒美之且復其言也嗚呼渭水東注時與之俱音容緬然何嗟及矣公之從父兄曰元甫與公友愛之外有知己之道焉故天倫之戚加於人一等謂及忝仲氏之舊故使為志云言罕兼德勇不必仁文行忠信獨鍾於身凡厥正人既富方穀缺叶於極命故不淑結志方遠為郎未老孰與若木先秋而稿變化誰宰天地何物目不容瞬盛德如失昨日容徽今如夢焉採君遺塵志君新阡唐故河南府法曹參軍張公墓表有唐逸士吳郡張從師英華作張師非沖和純粹辨博宏達卓犖好古儻蕩逸羣言不近名唯代耕是謀英華作媒貞不絶俗以忘機為心秀才高第起家臨濮縣尉歷馮翊伊闕二縣主簿乾英華作貞非桉後上元二年終則此當作乾元元年拜監察御史中丞鄭炅英華作旻一作昊之擁旄濟江辟為從事轉河南府法曹參軍凡歷官五政享年五十有八忘懷樂道終始以之攘臂于爵英華作壽祿聲利得喪虧盈之間如浮雲無心野鶴獨立形全神全身與化俱上元二年八月辛卯終於吳郡私第其孤惟儉惟靜能稟暮訓弱歲皆精左氏穀梁春秋藐爾在疚零丁何恃英華作怙是季弟祕書省正字曰從申乃茹天倫之哀謀及卜筮以是歲九月二十八日權窆於虎丘山之西原禮也初公祖損英華作捐下同之隋大業中進士甲科位至侍御史尚書水部郎損之生烈考浤英華作法以碩學麗藻名動京師亦舉進士自監察御史為會稽令文雅之慶施於後昆故擢秀才而衣繡衣者及公三葉君子以為榮少好英華有學字黃老且修禪慧晚節持英華作傳六經微言以遺三子三聖之學不墜於地君子以為博詼諧不羈頡頏傲世視軒冕纓􅌧如如字英華作無非塵埃必也臨事能斷義形於色推賢進善不進不止君子以為達當伊川啓戎歷陽為魚公力窘身陷者至於再涵泳鼎沸英華作沸鼎是厲揭橫流而迹無緇磷憂患不能及君子以為智宜享黃髮而升靑雲天胡降凶殲我仁人嗚呼先生往無返期談藪淸風詞林逸韻墨池真草三事永絶凡今朋友可勝痛哉英華作慟乎恐後代邱隴將平川澤相失求遺迹者莫知德音之所始乃志之以石永為靈表毗陵集卷第十一終
