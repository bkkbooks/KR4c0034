front:
  text: 獨孤憲公毗陵集序
  hash: sha256:b3f149946618a713c37436b9a7bfd48cc7c19da35c89045277fedb5e3fc1c2b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_000-1a}
body:
  text: 內閣中書舍人武進趙懷玉纂敘曰習為纂組詎知麻枲之有功長於蓬茨難語臯應之合制文章之道何莫不然故尚藻繢者目不眂典謨矯侈靡者口薄言騷雅硜硜之守其失維均不為泝沿恐昧流別有唐之興體凡三變天寶而後大歷以前燕許云徂韓柳未盛則蘭陵蕭功曹趙郡李員外與常州刺史獨孤憲公實比肩焉蕭雖忤於權門李乃汙夫偽命揆諸文行未免參差公則讜直著於朝寧愷悌洽乎方州淩轢四君見李舟序祖述六藝孝經一卷首志立身孔門諸科幾得具體此其可貴一也唐世文字存者寥寥苟有聞見亟宜購訪而茂挺之作厪收於什一遐叔之製尢掇於零星殘篇軼簡人以為病公則首尾草卷尚符唐志靈光之殿巋然獨存積玉之圃浩乎無涘菁華所鍾神物加護此其可貴二也退之起衰卓越八代泰山北斗學者仰之不知昌黎固出安定之門安定實受洛陽之業公則懸然天得蔚為文宗大江千里始濫觴於巴岷黃河九曲肇發源於星宿此其可貴三也琴瑟專一聽者思遷牲醪日陳食者生倦求其相濟是在兼長公則猷升邦國言炳竹素識大識小亦元亦史語其矜貴明堂淸廟之儀迹彼翛遠靑山白雲之概惟昭斯融雖淡不厭此其可貴四也然宋槧既失未聞續雕石渠之外世罕傳本是集從歙縣鮑君廷博假得為長洲葉氏奕所藏明吳文定寬在東閣時録出之本也葉以趙氏吳岫本馮氏曹甲本互相參校自詡完書披覽甫周訛舛百出病餘多暇悉意勘讎落葉漸掃珠船屢獲原集之外復得公雜文如干首其諡議誄傳有涉於公足資考鏡者並附篇後於是已三免訛夏五少闕永嘉本出人無􅉨讀之勞宏農帳深客見不傳之祕矣夫浚儀社古形圖去官峴山碑高涕隕行路秉彝攸好靡間今昔維公盛德克紹前軌故植檜巳朽見蔽芾而心逢召公降露無庭對膏雨而猶思郇伯矧夫撰述彌足珍焉余之為是刻也亦使人知遺愛勿替廉吏可為身登九列不若沒世有稱裝纍萬金不若名山藏業後之司土同致瓣香學優仕優咸有所勸匪徒表章篇翰搜輯叢殘苟侈山淵以恣采伐而已乾隆五十六年歲次辛亥秋八月唐常州刺史獨孤公文集序朝議大夫前守虔州刺史隴西李舟述傳日物生而後有象象而後有滋滋而後有數數成而文見矣始自天地終於草木不能無文也而況於人乎且夫日月星辰天之文也丘隴川瀆地之文也羽毛彪炳鳥獸之文也華葉彩錯草木之文也天無文四時不行矣地無文九州不別矣鳥獸草木之無文則混然而無名而人不能用之矣人無文則禮無以辨其數樂無以成其章有國者無以行其刑政立言者無以存其勸誡文之時用大矣哉在人賢者得其大者禮樂刑政勸誡是也不肖者得其細者或附會小説以立異端或雕斫成言四字英華作言遠二字以裨對句或志近物以英華作而玩童心或順庸聲以諧俚耳其甚者則矯誣盛德汙衊風教為蠱為蠧英華作盜為妖為孽噫文之弊有至是者可無痛乎天后時英華作朝廣漢陳子昂獨泝隤波以趨淸源自茲作者稍稍而出先大夫常因講文謂小子曰吾友蘭陵蕭茂挺趙郡李遐叔長樂賈幼幾洎所知河南獨孤至之皆憲章六藝能探古人述作之旨賈為􅏏宗巡蜀分命之詔歷歷如西漢時文若使三賢繼司王言或載史筆則典謨訓誥誓命之書可倣佛於將來矣嗚呼三公皆不處此地而連蹇多故唯獨孤至之常州刺史享年亦促豈天之未欲振斯文耶小子所不能知也巳矣常州諱及有遺文三百篇安定梁肅編為上下帙凡英華作分二十卷作為後序常州愛士而肅最為所重討論居多故其為文之意肅能言之比葬博陵崔貽孫又為神道碑悉載事行而痛其不登論道之位崔公剛而好直其詞不黨君子謂之知言昔班孟堅美漢得人之盛日文章則司馬遷相如又曰劉向王褒以文章顯是則四君子者有漢之文雄歟然而遷無鄉曲之譽虧大雅明哲保身之義英華作美相如薄於貞操有滌器受金之纍向無威儀遺文以繆而身幾不免褒多為歌頌當時議者以為淫靡不急其他無聞焉大較詞人多陷輕躁否則愞狹迂僻於事放弛其能蹈履中道可為物主者寡矣孰與常州發論措詞皆王霸大略孝弟之至達於神明善與英華作於人交久而敬之當官正色不畏強禦加之以仁惠愛物吏民敬鄉英華作畏而文又如是乎其餘則二君既言之矣今亶録崔氏之作綴於篇末云爾
