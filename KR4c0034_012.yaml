body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及墓志下十一首唐故右金吾衛將軍河南閻公墓志銘並序唐故范陽郡倉曹參軍京兆韋公墓志銘並序唐故商州録參軍鄭府君墓志銘並序唐故虢州宏農縣令天水趙府君墓志唐故衢州司士參軍李府君墓志銘並序唐太府少卿兼萬州刺史賀若公故夫人河南元氏墓志銘並序唐新平長公主季女薑氏墓志銘並序唐前楚州司馬河南獨孤公故夫人博陵崔氏墓志銘並序唐司直博陵崔公故夫人趙郡李氏墓志銘並序唐萬年縣尉崔肅洌故妻李氏墓志銘並序唐故天水趙琚墓志銘並序唐故右金吾衛將軍河南閻公墓志銘並序公諱用之遠祖曰文周昭王瑕之昭英華作後也生英華作昭生而手有文曰閻康王奇之命封閻城文四十五代孫滿仕後魏太祖為諸曹大夫自馬邑家河南其裔孫慶在隋為少司空慶生毗毗生立本立德唐永徽中立本為中書令立德為工部尚書立德生元邃以司空尚書之餘裕也官至澤州刺史邃生巨源嘗宰射洪有仁政射洪人詠歌之公射洪第二子也溫毅遜直廉恪寬信讀論語老子周易被服其教初仕彭州參軍嘗攝督郵一日糾按本州愆英華作愆謬不法數十事太守徐知人以為材後有詔擇舍人以公魁偉爽晤英華作悟有醞籍乃登其選會戎英華有師字侵我天子方愛人息戰將以辭讓屈之詔公使西域英華作戎以王命喻禍福戎人頓首請罪介馬不汗戈鋋不用而虜軍却遷右衛郎將知引駕仗金吾將軍李質上殿不解佩刀公呵下殿陛請按以法左右皆震悚自是環衛加肅先是有司以三衛執扇登殿引蹕公奏曰三衛皆趫悍有材力不當升階陛邇御座請以宦者代上曰可遂為故事天寶二英華作三年册拜公長女為皇子羲王玭唐書作玼妃加公左驍衛將軍遷榮英華作義王傅初元宗懲諸侯王之國任事率英華作或多驕蹇不奉法度而人英華無人字受其害故開元之後皇子皇孫雖荷封建之命未嘗離阿保之手悉無出宮閣英華作闕任卿大夫者公以為王居深宮則傅相職廢上疏陳古義謁請諸王英華作謁諸侯王申輔導之禮議雖廢格上以為忠公巳白首位為將軍諸侯傅太夫人尚無恙以銀印赤韍侍朝夕膳色難無違時人榮之太夫人捐館舍禮五十不毁公泣血死孝英華作泣血三年既免喪天子復目以端士四字英華作因以宮端事俾傅壽王加朝散大夫上幸英華作在溫泉經時未還宮京師人望屬車咸懷英華作惟怨思公獻四言詩十二章六字英華作四十言二諷諫優詔褒歎後遷左金吾將軍天寶十五載二京覆沒公為虜所獲明年戎師英華作陳奔然後以初服歸至德五字英華作初秋歸主非後二年十二月終於京師春秋五十九夫人雍州司倉參軍博陵崔眘言之女專靜沖懿慈惠而明用德英華作從禮以佐君子有古風烈亦天鍾其仁不遠其算年若干月日殁於私第殁六載而公薨俱權窆英華作厝少陵原有四子寧英華作定彚世系表止作定宷宰宣以家之不造世故之無寧英華作定歲也銜恤茹血不克喪事者九載廣德中寀以監察御史領高陵令明年辭英華有縣字職始卜葬英華作筮於故原吉乃歲在丙午十一月日遷兆合祔焉嗚呼惟音形事業悉如英華作知化往獨陳迹與與字英華作可知邱墓存焉非金石則無以示久遠故表而銘之孝子之志也其辭云郁郁金吾洵美且溫英華作靜事君之忠資於愛親英華作敬以德資身其祉宜繁彼美輔佐儀形閨門禮樂是悅孝慈是敦百歲之後合德九原獨以令軌英華作範垂諸後昆唐故范陽郡倉曹參軍京兆韋公墓志銘並序永泰二年五月七日有唐故衢州刺史魯縣子京兆韋璆第三子范陽郡倉曹參軍諱元誠葬於少陵原先塋夫人范陽盧氏祔焉從周禮也公少時為坊州參軍歷襄州司法試守棗陽縣令真授蒙城令凡五遷至范陽倉曹初安祿山以范陽叛劫脅元元以殺整衆士之因官因居而困窘顚躓墮圍中者數千計凶威所及不死則汚公掾吏也在偽署伍中溷迹佯狂冀以病免盜憎之乃加害焉春秋若干夫陽九厄會天地鞠凶燎火炎炎玉石何訴是歲天寶十五年也嗚呼人皆筮仕必以廉平公幹稱於州里人誰無死死則名不辱志不奪不咽盜哺以易其生生且不苟其事君事親之禮不待史氏而自明矣在官必聞則居家正身與朋友臨財之節可知矣有子曰彤龍鍾崎嶇於阻險之中十年不克返葬哀有何極歲在乙巳冬某月始跋涉太行恆山之路以公之喪至自某郡公季弟吏部郎中元曾既得吉卜痛天倫之歡莫之追也願以兄之忠於君恪於官友於家之德之美以播後嗣庶幾陵岸遷而德音不磨謬以及為習於禮者故使為志其辭云天地橫隤三象霾英華作霧是兮梟獍擇肉鸑鷟懼兮明夷於飛罹其故兮美玉寧折質不汚兮子子孫孫荷餘裕兮唐故商州録事參軍鄭府君墓志銘並序公諱密字愼微滎陽開封人也初韓哀侯滅鄭羣公子奔陳宋間始以國為氏惟桓公武公之德盛故國除而其姓彌大歷漢魏晉迄於今冠冕婚姻世莫與京公其裔也齊中書監南兗州刺史諡曰平諱述祖公之六代祖國朝衛州刺史府君諱某公之大王父也博州刺史府君諱某晉州臨汾令贈太常少卿府君諱某公之祖禰也公貞方介直勤而愛人初仕趙州柏鄉尉所蒞不過一扄而政行一邑廉使省風俗至趙趙父老率吏人數千遮道稱公之能識者韙公材且得衆滿歲歸洛陽家於鳴臯山南趣深險以避安祿山之難親故數百家攜老幼往依之公悉發竇窖無親疏皆仰給餓者窘者得公全活先是纍歲力耕致粟至千斛至是而盡談者稱公之義二京返正天子選賢守相令長將蘇瘡痍之人殿中侍御史王政以公充賦拜商州洛南令數月訟平賦均監察御史李椅殿中侍御史王延昌御史中丞元公載並表言其狀詔書褒稱加公壽王府戶曹參軍洛南如故無何遷上津令專知轉運水陸漕挽邦都移用賴公而濟徙大理評事商州刺史盧浦以公前後課積條奏遂以本官兼商州録事參軍御史中丞王延昌表公才任御史奏未下會疾終於位春秋五十是歲廣德元年八月七日也其年權窆於商州夫人淸河崔氏某之女生子雅弟幹大歷九年歲次甲寅十一月某日返葬於洛陽北邙山某原禮也公世業尚文伯仲皆才公尢深於詩言合麗則究緣情之美天性孝悌檢身端方居官廉恪其家道足以勸所不至者位止於中士壽不過知天命命矣夫公母弟尚書刑部郎中宣祕書省著作郎寶以其兄之德善授牘於及及跪讀三復敢以實録刻石其辭曰緇衣之宜敝豫改為蔚彼明德蔭此本支乃公乃侯典則是貽藂祉於公實生令儀試吏柏仁嶷然忠規淸不奪節剛不干時以道蒙難處險若夷臨財務施依者如歸匪愛千鍾仁為吾師亂已運開乃從縶維先禮後刑以牧煢嫠商於之人家肥俗移督郵廷評九仞之資曷云不淑命夭功虧明略未申詒痛所知吉凶匪忱今古同悲桐鄉之愛懷縣之詩令聞顒顒子孫承之唐故􅉑州宏農縣令天水趙府君墓志府君諱令則字某天水人也其先造父實佐周穆有平徐偃王之勳因封命氏至晉而大以成季宣孟之慶故家化為國及武靈而稱王語在太史公趙世家秦滅諸侯使趙王嘉子公輔主西戎戎人懷之子孫因家隴西世為天水著姓其源遠矣曾祖元楷隋殿中監工部尚書淮安公祖崇基國朝岐州郿縣令符璽郎右衛長史烈考慶逸正議大夫許州長史府君長史第二子也好古博學涉獵百家之言善屬文尢注意詩賦外剛毅峭直內溫良而仁率由天性果於行己起家幽州薊縣尉敏洽強濟聞於河朔以直道事人忤幽州刺史張守圭貶封州開建縣尉遇赦遷建州建安縣丞稍移湖州安吉縣丞天寶九載選授虢州宏農縣令宏農甸服也地邇賦殷號為難治府君治之如治家刑以肅淫怠德以哀鰥寡為政期年邑民知方三歲績成人無不均不安之患虢人頌之解龜後貧無餘資因遊方河朔會天寶十五載幽都為戎薦瘥鍾運明夷垂翼至德二載某月日遇疾終於某州春秋若干嗚呼民莫不穀我獨百罹才如府君胡不朋三壽綏百祿而生世坎壈殁身喪亂若之何不弔命矣夫夫人河南獨孤氏朝議大夫汝南郡長史府君之孫武功縣丞府君之女明哲柔懿實天生德結帨宜室四十有四載內修法度輔佐君子躬勤慈儉以化閨門趙氏之家肥族睦繄夫人是賴有子若干人訓以義方咸能被服文藝幹父之蠱使有德者必壽夫人宜登期頤奈何不淑遽奪長算天實不信人烏徼福大歷十年五月二日寢疾終於郿縣官舍春秋六十有七嗚呼哀哉長子湖州安吉縣丞琪琪弟某官瓘蘇州嘉興縣丞璒太子舍人兼京兆府郿縣令玕晉州臨汾縣尉珮臨晉縣尉珦珦弟玘是歲秋八月某日奉府君夫人之喪合祔於京兆某原禮也府君有集若干卷遐遠之志見於詞矣若言行才業官族歲月非銘無以示後裔也故著於石唐故衢州司士參軍李府君墓志銘并序公諱濤皇唐太祖景皇帝六代孫也曾祖道立嘗典陜濟陳三州刺史封高平郡王祖景淑畢國公父仲康官至尚書主客郎中楚州刺史世秉懿德為公族領袖語在皇室譜公純孝忠厚貞信廉讓直而遜明而晦朴而不固靜而應物克己復禮時然後言策名居官淸畏人知弱歲好學篤志經術專戴氏禮晚節耽太史公書酌百代之典故以輔儒道以經明行修宗正寺舉第一初仕許州臨穎縣主簿歷宋州宋城縣尉皆以恭寬信惠聞於千室議黜陟幽明者謂公文行吏事宜登三臺會河朔軍興避地江表相國崔渙承詔署衢州司事參軍於時五府辟召之權移於兵間務苟進者多由徑而致顯位公儉德正志安貞俟時未嘗以得喪夷險慸芥方寸視榮辱晏如也論者高之乾元二年某月日寢疾終於揚州春秋若干某月日權窆於衢州嗚呼仁可以師表搢紳而無貴仕禮可以軌範風俗而不遐壽沖用休績卷而未形溘焉化往使善人相弔嗚呼哀哉公殁後十有二載從父弟涵以宗室柱石為御史大夫按節江東痛仁兄生不登公侯卿大夫之位殁不僃踰月外姻至之禮遂茹哀筮日減月俸以庀喪具由是大歷九年夏四月二十七日公長子居介及居佐居敬居易奉公之輤柩歸葬於洛陽先使君夫人宅兆之側凡今孝乎唯孝友于兄弟者於此乎觀禮及謂知公者宜莫若懿親今將以無愧之詞申報幽路故作銘以紀於石其辭曰天地方否君子安卑世道既夷隟駒莫追仁而不壽才既無施積善必慶天何余欺襜襜裳帷泝江絶淮蒼蒼故山玉樹斯埋死喪之戚弟兄孔懷令德家風與天壤偕唐太府少卿兼萬州刺史賀若公故夫人河南郡君元氏墓志銘並序夫人諱某魏景穆皇帝九代孫也祖諱某皇朝議太子少保父諱某克荷前烈不幸早世夫人在孕而孤鞠育於叔父相國潁川公天機聰明生知仁孝被服法度綜習文史年十四嫁河南賀若璿璿積功勞剖符為郡夫人輔佐以副笄宜室能睦其族且勸以義而風藻禮範儀形閨門晚節厭離心垢嚴持禪誦而道機未宏壽量有極永泰元年三月某日終於渠州享年若干嗚呼以夫人之柔明孝慈溫惠淑茂況承景穆之餘裕少保之貽則季父當國良人專城河潤澤及福綏宜遠胡弗眉壽鍾是短歷潁川公之慟其可既乎大歷二年二月二十二日反葬於京兆鄠縣之某原宜列景行詒於彤史恐陵岸或遷音徽將沫故月而日之銘諸金石蓋猶父之志也其辭曰人亦有言天祚明德於嗟邦媛未階壽域家節既成蕙牙方植仁而無報為善者惑夜臺超忽神斯冥默貞石有磷德音罔極唐新平長公主故季女薑氏墓志銘並序乙巳歲四月二十六日有唐新平長公主季女薑氏卒於京師昊天觀五月六日葬於某原長公主歎季女姿度榮茂溫惠淑愼能修女師之訓動中禮範其曾祖柔遠位至尚書地官侍郎祖皎以勳舊歷太常祕書剖符封楚其父慶初能踐修祖考之耿光嗣爵舊國復居太常元宗其外王父也肅宗其舅也天池波瀾澤潤本根謂德鍾下錫祉與壽宜君子家室且貽芳於彤管乃未筓而夭命也夫嗚呼窈窕專柔含德而未形雖當鵲巢小星采蘩殷雷之德今巳矣夫史氏蔑由記之矣長公主之慟其庸可及乎故月而日之銘諸堅石其辭曰思孌季女生於公族稟懿德兮天世其祿不遐其福胡不淑兮彭殤同躅數不可續哀靡極兮唐前楚州司馬河南獨孤公故夫人博陵崔氏墓志銘並序夫人諱某博陵平安人也曾祖恭禮國朝駙馬都尉延齊易三州刺史封博陵郡男祖興宗饒州長史考雋亳州臨渙縣丞夫人少孤在家以純孝稱既笄莊明而賢柔順有識年若干歸於獨孤氏奉蘋藻供祭祀事長撫幼糾合宗族敬恭而誠孝愛僃至動必由禮非法度未嘗踐也生子四人教之以義方夙夜貞厲家道以正娣姒服其義親戚稱其慈天不降衷於我大歷八年十一月某日享年若干殁於壽州少長行哭六姻涕泗傷夫人有宜室之美勸義之明而司命奪其長算使德與壽反嗚呼哀哉明年十一月日公使長男績奉夫人之喪返葬京師某原先塋之側禮也刊石以志庶德不朽其銘曰夫人之德柔明淑愼從夫以禮承筐以順奉若家節率由􅉓訓遐福是期溘至何迅謂仁者壽天實不信同塵彭殤歸根大運於以刊石永播淑聞唐司直博陵崔氏故夫人趙郡李氏墓志銘並序夫人諱某趙郡人也皇朝德州將陵縣令銛之長女天生柔懿齠齔知禮年十六歸於崔氏丕承宗祀虔恭中饋謙敬恭儉貞固淑溫閨門化之宗族以睦生一子年十一而殤有女四人長女夭於襁褓次女適范陽盧履純第三女適河南獨孤及年若干早世少女適樂安蔣鎮皆柔明好禮淑愼有德循度勸義雖造次不違仁實夫人之教訓也輔佐君子三十有九年夙夜靡違家道以正向使神祈正直天報德善宜登期頤與君子偕老嗚呼不造春秋五十四而殁凡所顧復太半道夭撤琴瑟之日無兒主祭德與事反哀有何極嗚呼哀哉是歲十月某日卜宅兆於某山某原追紀往行以志幽石禮也及忝婚姻之故嘗瞻淸懿逝殁相尋報德靡及敢不僃書實録期於不朽其辭云莊敬柔順婦行之極抑抑夫人秉是懿德襟鞶為戒蘋藻惟職四始之美六姻是式仁而必報當躋壽域天實匪忱古今同惑變化忽恍音徽冥默闑右遺範是效是則唐萬年縣尉崔肅洌故妻李氏墓志銘並序夫人其先隴西人也皇唐高平郡王道立之元孫畢國公景淑曾孫祖仲康開元中為尚書主客郎中楚州刺史父濤以貞信篤行為宗室冠冕歷宋城尉衢州司士參軍而殁德重而位不稱啓手足之日為守道所痛夫人吾之姊子也稟氣於家君之中和母氏之柔明故姿度淑茂恭儉謙順天性孝慈聰慧有識讀書善鼓琴造次必以禮自持莫見其喜怒之容言歸於崔以德宜夫事姑禮節儀刑閨梱輔佐之美六姻是瞻有識者謂當有鵲巢之貴鮐背之壽天則反是使春秋二十七而終醫不至歟命有極而然歟適來適去皆忽然與吾痛且惑傷悼之不足故形於文且遂為志其文曰爾德爾容天實爾鍾爾志爾年天胡不從勸義孤望歸安迹絶哀哀母氏泣盡繼血刻字此石紀爾芳烈唐故天水趙琚墓志銘並序琚字遙憐宏農令府君第五子厥生之初會府君先有封州之役契闊萬里愛而不見故遙以字之太夫人顧之復之訓視加等及長溫厚孝謹文敏好學美姿儀有材藝戊戌歲十月以櫛縰笄總從府君徙河十一月卒於深州嗚呼未婚未祿夭夭是絶不見其成六姻所痛大歷五年八月某日葬於洛陽先府君塋之次禮也其銘曰彭氏殤子其壽未易歎子之往死生艱躓末如之何刻石以記毗陵集卷第十二終
