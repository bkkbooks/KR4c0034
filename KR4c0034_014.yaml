  text: 毘陵集卷第十四
  hash: sha256:8d944e6446116ec6686f32eef59a9f16591dfa3da1d1d0ef7af1dd95d58a988f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_014-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及序上二十送張徵君寅遊江南序送李白之曹南序送張處士申還舊居序宋州送姚曠之江東劉冉之河北序送張泳赴舉入關序送史處士歸㵚陽別業序送開封李少府勉自江南還赴京序送陳畱張少府鄖東都赴選序送弟愐之京序送韋評事赴河南召募畢還京序奉送元城主簿兄赴任序送廣陵許戶曹充召募判官赴淮南序仲春裴胄先宅宴集聯句賦詩序幷詩鄭縣劉少府兄宅月夜登臺讌集序華山黃神谷醼臨汝裴明府序按圖經仙人黃盧子得道昇仙之所原註建丑月十五日虎邱山夜宴序冬夜裴員外薛侍御置酒宴集序送宇文協律赴江西序送賀若員外巡按畢歸朝序送長洲劉少府貶南巴使牒畱洪州序送王判官赴福州序送薛處士業遊廬山序送張徵君寅英華無寅字遊江南序初貞元二年進賢星明於是夫子與廣陵馬曾俱以元纁辟焉一命而俯受服赤墀之下子甘英華作守節不奪歸耕南陽議者稱馬之利用陋子之獨善及以爲不然君子之道舒之則雲蒸雨降以救大旱卷之則天倪道機不盈一握姑務忠信以安聖時則歌國風於畎畝是亦爲政有民人焉有社稷焉何必薄遊然後稱德至是夏六月以菰菜之興扁舟而東是行也與夫乘桴揚舲者不同日矣津樓直望英華作望極江漢在目少別非志士所悲深衷豈短章能見桃源秋至僕當搴其仙實俟子於武陵之南溪送李白之曹南序曩子之入秦也上方覽子虛之賦喜相如同時由是朝詣公車夕揮宸翰一旦襆被金馬蓬累而行出入燕宋與白雲爲伍然則適來時行也適去時止也彼碌碌者徒見三河之遊倦百溢之金盡乃議子於得失虧成之閒曾不知才全者無虧成志全者無得失進與退於道德乎何有是日也出車桐門將駕英華作特之于曹仙藥滿囊道書盈篋異乎莊舄之辭越仲尼之去魯矣送子何所平臺之隅短歌薄酒擊筑相和大丈夫各乘風波未始有極哀樂且不足累上士之心況小別乎請偕賦詩以見交態送張處士申還舊居序海水不揚波久矣故昆蟲草木得遂本性夔益巢許英華作由各安其節天鍾靜於子而博之以文大英華作洞壑無底虛舟任觸世皆尙白獨守太元顧流俗而不言退將修乎初服吾於是見全人之操矣乃英華作了知白雲上下蓋無心自出黃鶴飛去當有時而來他年孤舟冀再會於五湖之口宋州送姚曠之江東劉冉之河北序春葉尉吳興姚曠至自洛陽中山劉冉至自長安俱以文博我相與交歡於睢渙之涘始則開靑天豁其雲霧亦旣窺武庫見其矛戟凡旬有五日而姚適吳劉濟河余歸梁各有四方之事將爲千里之別夏四月抗手於盧門議別故也夫別與會悲樂存乎其中故賢智所不能遣然達者遊世隨變所適靜而與陰同德動而與陽同波異乎金柅之有繫匏瓜之莫食子其行矣別何爲者北斗在已南風始來藂臺草長京口水闊何以送遠唯當賦伐木以爲仁人之贈送張泳赴舉入關序彼馳鶩乎士林者鮮不爭九流之勝負徇三川之聲利而張侯獨以善閉關乃知純白内充天機外朗則塵垢糠粃所不能入癸巳歲六月始以出處之道問仕於余余洒然曰今四表文明入紘屢頓此志士所當登秀造而取靑紫不奮不躍如休明何由是罷琴高臺投竿舊浦單車匹馬是日西上君子以爲知幾吾見垂天之雲不復顧北溟矣盍使居者歌吾子乎送史處士歸滏滏舊譌淦淦水在豫章郡與文不合今改正陽別業序初史侯至自英華作是帝邱僕方釃酒於蔣氏之館揖讓堂下由東階升於是一酌而賓禮舉再酌而交態接三酌而威儀幡幡深衷畢見醉中英華作裏投分客中忘形吾固知握手難常嘉會可惜其聚也言不浹日而意氣感其散也興未及盡而離憂至則臨觴徙倚孰能不以之黯然窮陰欲臘漳滏冰厚班馬連嘶歸雲無色非詩何以見離羣者之志送開封李少府勉自江南還赴京序世或謂邦有道穀或謂全於德者不以徇名降志彼於致命猶數數然孰與李侯兩忘而脗合之張其天機與道出處道長則陳力筮仕績成而退藏於密戰勝江海之上然後乘歸流而返舊京乃知凌雲麗天則切玉利器於夫子爲鄧林之一葉耳而精微純粹豈中士所能得其門哉然當今堯親九族契敷五教材之美者工將度之子雖忘機機未忘子庸詎知泥蟠沙臥不爲雲霄之鑿柄乎但蘭舟桂楫倏忽鳥逝朔方英華作風秋草柰離憂何緣情者莫近於詩二三子盍詠歌以爲贈送陳畱張英華有二十七三字少府鄖東京赴選序每歲孟春英華作冬大冢宰懸象魏之法以官民材天下髦士於是乎雲屯詞鋒角立智刃今子投袂而起將鼓行乎其閒其於湛盧發硎批郄如玉繁弱在手捨拔則獲者吾惟子之望當知君子廣其業達其道則榮譽貴仕可得而拾孰云嫋嫋秋風悠悠遠道足爲志士之感哉十七字英華作區區秋風瑣瑣岐路又足爲志士之感哉雜珮可以申永懷罇酒可以慰別緒其贈言之分顧謂坐者志之送弟愐之京序蒼龍居元枵之歲與爾吹塤箎於長安靈臺之下當時予方靑襟子適紈袴各志小學相期大來其後爾以經術薦遂觀光於英華作藝乎上國予牢落兩河爲病所繫星分雨散十有二載中閒蹔攜手一笑者及今而三而三英華作二三年昨日遊寓今成疇昔此會綿邈空存英華作在夢想豈不欲申橘柚之性詠和樂之什樂未終也別又繼之然君子脩誠則物應尅已則名彰爾能珪璋特達甲胄忠信致逸足於千里吾有望焉方務遠圖何嗟少別到秦地有問吾事者爲報江湖閒心送韋評事赴河南召募畢還京序自唐蒙司馬相如開牂柯鑿零山於是西南夷君長始受漢印及國家綏以大道振以長策滇越卭僰世亦皆爲外臣蠢兹六蠻獨抗王旅天子方將開外戶掃絕漠故授相國衞公鉞俾出作方叔入爲吉甫且募如貔之介士將翦長蛇之速飛由是分命我廷尉評事韋公實佐其任公以止戈諭之采薇歌之使政有典則人知義所故燕齊少年韓魏勁卒召募如景附赴敵如焱馳自春至於是月受命羽檄之下者凡萬八千計然後頒賜算級將朝於京師夫勤王集事之謂忠周爰咨詢之謂智復命而不僭英華作愆是于素之謂信姑樹三德載馳六轡行當以柱下之書讚幕中之畫是役也冥冥羽翰非瞻望所及矣請偕英華作俱賦以知魏風奉送元城主簿兄赴任序往歲兄之尉匡匡英華作鉅鹿德刑成禮義舉粃政杜紊綱緝人曰莅民如此其達達一作志必大十四年春春字据英華増王正月再命于元城元城地雄人悍土壤賦錯處宋衞中山燕齊趙魏之都會三川輻湊四術轂擊兄方以德舉吏此大邦英華作都則千里之迹兆於是矣彼徒勞者其鶱翥之濫觴乎歲物己春秦山日英華作草綠亦旣選英華作撰吉駕言徂東豈不知棠棣之詩廢則和樂之好英華作詩缺盍使伯氏仲氏偕詠歌之以贈行邁送廣陵許戶曹充召募判官赴淮南序冉駹不庭三年矣王師戒嚴將問罪荒服於是上將分職愼選乃僚以許公有持斧舊名斷犀餘地故授以戎政俾發卒于東夫三河之人豪全齊之人武荆吳之人悍籍其餘勇可以盡敵信以致之繄公是賴然則諭王命敦師律度程以料民徵騎以濟衆歌事以遣役輯謀以定功在是行乎高天晚秋殺氣動地靡靡岐路悠悠斾旌送離如之何賦小戎以爲好仲春裴胄先宅宴集聯句賦詩序先是先淸明一日右金吾倉曹薛華陳嘉肴釃淸酤會河東裴冀滎陽鄭裒河南獨孤及于署之公堂引滿舉白自午及子促席於花陰賦詩於月波文粹作下是樂極不醉夜艾而罷後淸明三日二三子春服成思欲脩好尋盟選勝卜晝裴侯是以再有投轄之會是會也鄭不至吾兄惠然而來堂有琴庭有篠芳草數步落花滿席中和子冠烏紗帽相與箕踞嗢噱傲睨相視稱觴乎其閒趣在酒中判爲酩酊之客家本秦也能無嗚嗚之聲其詩云上天垂光兮熙予以靑春今日何日兮共此良辰與君觥濁醪而藉落英兮不知年華之相親蹇淹畱以醉止孰云含意而未申歌數闋裴側弁慢罵曰百年懽會鮮於別離知開口大笑幾日及此日新無已今又成昔不紀而賦之如春風何其演爲連珠以志此會鄭縣劉少府兄宅月夜登臺宴集序夏五月小暑至矣吾兄方幕夜天掃月榭有酒如乳醑我乎城隅城臨近山俯瞰平隰秦郊漢苑相錯如繡且有顥氣足以娛人故數君子稱觴焉其誰同之有若功曹隴西李華參軍滎陽鄭洵瑯琊王休河東裴貺鄭尉京兆韋造皆卿材也聲同而形骸相忘道契故機事不入是以有高會遠望危言浩歌或心愜淸機寓興於物或語及陳迹䏏衡而笑於是初筵而惠好脩中飮而意氣接旣醉而是非遣夫彭澤採菊隱侯臨風謂之盛矣況高城古臺深夜朗月芳罇良友佳境勝事今夕何夕八者俱幷盍亦皆賦於此乎觀二三子之志華山黃神谷醼臨汝裴明府序按圖經仙人黃盧子得道昇仙之所黃盧子滅景上漢千歲矣畱碧峯白雲以貽後世故淸機勝事未始有極余吏于華之明年道侶裴冀亦再命爲臨汝令夏六月假道敝邑稅鞅此山思欲追高步詣眞境於是相與攜手及二三友生童子將命者六七人挈長瓢荷大壺以濁醪素琴會于黃神之谷興也案谷之西頂實三峯東面石壁叢倚束爲洞壑乳竇濳泄噴成盤渦兩崖合鬪若與天接二三子將極其登探也至則繫馬山足披榛石門入自洞口至於梯路蹋連嶂與疉崿度嶇嶔而躡凌兢夤緣絕磴及橫嶺而止澡身乎飛泉濯纓乎淸漣想夫君俟我於花峯下碧空而嬋娟愛而不見搔首空山然後靡靈草以爲席傾流霞而相勸楚歌徐動沂詠亦發淸商激於琴韻白雲起于筆鋒是日也高興盡而世緒遣幽情形而神機王頽然覺形骸六藏悉爲外物天地萬有無非秋毫亦旣醉止則皆足言以志仙跡且旌吾友嘉會之在山也建丑月十五日虎丘山夜宴序方今内有夔龍臯伊以佐百揆外有方叔召虎以守四方江海之人高枕無事則琴壺以宴朋友嘯歌以展霞月吾黨之職也我是以有今兹虎丘之會巖巖虎丘奠吳西門崒然如香樓金道自下方而湧鎖丹霞白雲於蓮宮之內會之日和氣滿谷陽春逼人嵒煙掃除肅若有待余與夫不亂行於鷗鳥者銜流霞之杯而羣嬉乎其中笑向碧潭與松石道舊兕觥旣發賓主醉止狂歌送酒坐者皆和吳趨數奏雲去日沒梵天月白萬里如練松陰依依狀若畱客于斯時也撫雲山爲我輩視竹帛如草芥頽然樂極衆慮皆遣於是奮髥屢舞而歎今夕何夕同者八人醉罷皆賦以爲此山故事冬夜裴員外薛侍御置酒讌集序二公以大司馬之命領浙河東西十有三州之政相與周爰咨度乎均邦賦者三月矣當割而遊刃無閒臨機而捨拔則獲由是在簿領之際無江海而閒冬十月辛未徵會于此堂醼朋友故舊也賢豪畢萃升降有序縫衣淺帶十有五人聲同故窮達不閒意得而鄙吝皆遣肴芳酒濃夜寂琴暢慷愷言志駱驛舉白盱衡抵掌啞啞大笑三爵耳熱萬念如洗不復計名身之親疎憂患之去來也況他累乎旣醉余以箸擊唾壺扣商而歌其詞曰簿領日盈機知君傲煩囂飮和自忘渴況以初筵招道契跡自親誰爲列宿遙何用結同心綠琴復長瓢日月若走馬炎涼催斗杓一年解頤笑幾日如今宵奉君千金壽莫使歲寒凋是日禮成於易歡生於同滯憤積慘彗掃湯沃方今溟海始波世屯未康二公克壯其猶以立事爲已任行當自致靑雲之上不復與適莽蒼者羣矣吾儕浮其閒與風水俱他日或濳泉唳天一離一合雲動雨散然後知今日樽酒未易再得將子無金玉其音姑偕賦以卒貺明旦不共顧懷安敗名無勇也怨別傷離非丈夫也苟將申其道而成其務則萬里咫尺少別何有二三子其詠歌之以代雜佩送賀若員外巡按畢歸朝序今年春上以富人侯爲丞相百揆時敘九州賦錯方欲齊職貢之法崇厎愼之典使六府修九序成謂尙書吏部郞英華有中字賀若公貞明直躬特達公器才足以茂功蕆事政足以宏道救物故俾繡衣持斧巡撫江介分王命也公電發神機霜淬智刃其始至也問謠俗省疾苦命司書示年數之上下削邦縣之版圖實其衆寡以差井賦然後勞來安集宣皇恩而煦之飢者如得食寒者如得績使苞茅之貢必敘而杼軸之詩不作冬十一月命郡吏致事言旋于京師且將捧府檄于南陔侍板輿以西上禮也夫其由自家以刑國資事親以事君奉慈訓不廢陳力將君命不違色養忠孝之大者況姦宄以弭英華作已殄干戈將戢朝廷方以律令章程責成三府然則操六轡驟四駱周爰咨詢以成天下之務在是行乎翰飛方騁瞻望何及唯獻酬英華作熟東閣弼成大猷使蒸人粒海水靜農夫高枕及亦預焉凡執手英華作拜首非于路英華有岐字者請偕賦鴻雁取之子于征劬勞于野爰及矜人哀此鰥寡以爲善頌送長洲劉少府貶南巴使牒畱洪州序曩子之尉于是邦也傲其跡而峻其政能使網不紊吏不欺夫跡傲則合不苟政峻則物忤故績未書也而謗及之臧倉之徒得騁其媒孽子於是竟謫爲巴尉而吾子直爲已任慍不見色於其胸臆未嘗蠆芥會同譴有叩閽者天子命憲府雜鞫且廷辨其濫故有後命俾除館豫章俟條奏也是月也艤船吳門將涉江而西夫行止者時得喪者機飛不摶不高矢不激不遠何用知南巴之不爲大來之機括乎由圖南而致九萬吾唯子之望但春水方生孤舟鳥逝靑山芳草柰遠別何同乎道者盍偕賦詩以貺吾子送王判官赴福州序松梓楩枏茂于深山不能逃匠石之顧賢士君子晦其英華作於言跡不能使人不已知其勢然也之子言忠信行篤敬以文雅麗則括而羽之而世皆觀頤我獨儉德吾固知長風六翮必有時而去及御史大夫李公之命介也辟書四下果以嗣宗爲首歲二月載驟四駱脂車而東閩中者左溟海右百越嶺外峭峻風俗剽悍歲比飢饉民方札瘥非威非懷莫可綏也議者其謂君匡戎幕以義佐師律以禮報國士以直導罷人以德使安危懸于指掌勝負決于談笑則咨謀之道宏矣豈椎髻殊俗覆車畏途足爲志士之怵惕哉凡我出祖者亦旣偕賦送薛處士業遊廬山序薛侯敦於詩固於學敏於行時然後言言而寡尢口弗言祿祿亦不及識其眞者以英華作也爲永歎而薛侯居之澹如君子哉若人也方以城市鄙於丘壑倦遊不如嘉遯是月也拂纓上之塵西遊廬山山上有峯頂大英華作尖林下有東林西林化成英華作城非遺愛六寺惠遠道生二公昔常眷戀於斯焉履痕屐齒徧滿崖谷神期肸蠁恆若對面之子之往獲心契矣苟藏器於身時行則行大之將來隱顯一致彼安貞者其或爲英華作有利涉之樞機乎趙補闕驊王侍御定張評事有略各以文爲貺記行邁之所以然余亦持片言用代疎麻瑤華之贈毘陵集卷第十四
