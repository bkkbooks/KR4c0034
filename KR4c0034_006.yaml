body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及議九首景皇帝配昊天上帝議故太保韓國公贈太師苗晉卿諡議故御史中丞盧奕諡議故左武衛大將軍使持節隴右節度經略大使兼鴻臚卿御史中丞贈梁州都督太原郡開國公郭知運諡議並酬答三首故江陵尹兼御史大夫呂諲諡議並酬答三首行狀一首唐故尚書祠部員外郎贈陜州刺史裴稹行狀景皇帝配昊天上帝議永泰二年謹按禮經王者禘其祖之所自出以其祖英華作而以祖配之凡受命始封之君皆為太祖繼太祖以英華無以字唐志會要有下六廟則以親盡迭毀於英華作而太祖之廟雖百代不遷此五帝三王所以尊祖敬宗也故受命於神宗禹也而夏后氏祖顓頊而郊鮌纘禹黜夏湯也而殷人郊冥而祖契革命作周武王也而周人郊稷而祖文王則明自古必以首封之君配昊天上帝唯漢氏文粹無氏字崛起豐沛豐公太公皆無位無功德不可以為祖宗故漢以高皇帝為太祖其先細英華無細字微故也非足為後代法伏唯太祖景皇帝以柱國之任翼周弼魏肇啓文粹作成王業建封於唐高祖因之遂以為有天下之號天所命也亦猶契之封商后稷之封邰禘郊宗祖之位宜在百代不遷之典郊祀太祖宗祀高祖八字文粹但作郊禮高祖非猶周之祖文王而宗武王也今若以高祖創業當躋其祀是棄三代之令典遵英華作尊漢氏文粹作代之末制黜景皇帝之大業同於豐公太公之不祀反古違道失英華作斯孰甚焉失孰甚焉舊唐志孰莫大焉會要作孰將甚焉夫追尊景皇帝廟號太祖高祖太宗所以崇尊尊三字英華作崇尊會要作尊崇之禮也時更七聖載經二百名臣碩儒僃經討論未嘗有獻同異於宗廟今將議其全典變更先聖制度曷知其可自時更至此四十一字英華無若配天之位既易唐志作異則太祖之號宜廢祀之不修廟亦當毀尊祖報本之道其墜於地乎漢制擅議宗廟以大不敬論今武德貞觀之憲章未改國家方將敬祀事以和神人禘郊之閒恐非所宜臣謹稽禮文二字英華作禮之舊文參諸夏殷周漢故事配饗天帝四字英華作配食天地之制自謹稽至之制唐志作謹稽禮文參諸往制請仍舊典英華作禮謹議故太保贈太師韓國苗公諡議懷玉按此題與目録不合文粹又作唐丞相故太保贈太師苗晉卿諡議未知孰是太師稟天純懿為唐股肱兩朝當國庶績唯允論道賦政送往事居協恭秉彝動罔違德惠和以懋其事明哲以保其身昔嘗懸衡九流剖竹四郡刀尺之下無泄文粹作滯用襦袴之間無貧人洛陽居守東夏輯睦天寶之季二京為戎皇輿西狩億兆左袵太師踐危機不易心處橫潰不忘國奮身拔跡于豺狼之口道不汚而節不奪忠之大者至德乾元年文粹無年字中天下多故皇綱未張肅宗循文粹作修漢宣故事用刑名繩下而太師以曹參為師持淸靜守職勵翼王度將順事典人亦寧一厥猷茂焉能知人能官人愼選乃僚言刈其楚至有拔羣萃而取公器不五六年比肩衮職者光映策府當代榮之漢史稱胡廣與故吏陳蕃竝為三司太師有焉夫九德咸事寬之為首百工惟時能哲則惠文粹作哲則能惠宜其享天眉壽為國元老古者生以行觀其志殁以諡易其名諡之美惡視行之大小後代或三字以表其德貞惠文子是也或二字以彰善酇文終侯留文成侯是也蓋有績二字文粹作其跡大名盛則禮優諡崇太師德冠搢紳位侔周召將加誄諡之制宜以酇留為準謹按大戴禮體和居中曰懿文賢有成曰獻稽千載之令典合二名以配德請諡曰懿獻謹議故御史中丞盧奕諡議時任太常博士盧奕剛毅朴朴字舊唐書會要同英華作而忠直方而淸勵精吏事所居可紀天寶十四載洛陽覆沒于時東州人士狼狽鹿駭猛武英華作虎磨牙而爭其肉居位者皆欲保性命而完妻子或先策高足四字英華作競先策蹇爭脫羿彀或不恥苟活甘飮盜泉奕獨正身守位英華位下有蹈字諸本無義不去以死全節誓英華誓下有之字諸本無不辱勢窘力屈以朝服受英華作就執猶慷慨感憤英華無感憤二字數賊梟獍之罪觀者股栗奕不變色文粹無猶慷慨至變色十九字西向而辭君英華無君字舊唐書作西北面辭君會要作西面辭君然會要作而後受害雖古烈士方之者鮮矣或曰洛陽之存亡操兵者實任其咎非執法吏所能抗師敗文粹無敗字將奔去之可也委身寇讐以死誰懟及以為不然勇者禦文粹有而字忠者守必社稷是衛則死生以之危而去之是智免也忠於舊唐書文粹作於忠何有蓋舊唐書作昔荀息殺身於晉不食其言也仲由結纓於衛舊唐書不避上有食焉二字不避其難也元冥文粹作石正勤其官而水死守位而忘軀也伯姬待保姆而火死先禮而後身也彼四人者死之日皆於事無補夫豈愛死而賈禍也以為死輕於義故蹈義而英華無而字捐生古人書之使事君者勸然則祿山之亂大於里克英華作丕孔悝會要二唐書悝下有奕字廉察之任切於元冥之官分命所繫不啻保姆逆黨兵威烈舊唐書作甚於水火於斯時也能與執干戈者同其戮力挽之不來推之不去豈不以師可虧義吳華作免不可苟身可殺節不可奪故全其操持舊唐書作特操於白刃之下孰與夫文粹無夫字懷安偷生者同其風哉謹按諡法圖國忘死舊唐書作身下同曰貞秉德遵業曰烈奕執憲戎馬之閒志藩王室可謂圖國矣國危不能救英華作拯而繼之以死可謂忘死矣歷官十一任言必正事必果而淸節不撓去之若始至可謂秉德矣矣字据英華補下同先時英華無時字是黃門以直道佐時奕嗣之以吏士任必以才往往超倫績用茂著王君奐文粹誤作奐以果勇代處分閫之寄牛仙客出將入相以淸幹信謹稱斯又奬拔之明也當時議者謂知運與郭虔瓘王晙薛訥竝為中興名將至今隴上將士思之或有起祠宇於故城遺壘尸而祝之者上元中肅宗加太公望以武成王之號知運列於配食之位則是文粹作其勳伐事業宜有以美稱易其名者謹按諡法服叛懷遠曰威易曰厥孚威如繫辭曰弧矢之利以威天下虞書曰董之用威傳曰非威非懷何以示德則威者聖人所以佐仁義以濟文粹作齊天下者也施於名號可以表將帥之德請諡知運曰威謹議附崔厦駁議左司員外郎崔厦議曰郭知運承恩詔葬向五十會要有餘字年今請易名竊恐非禮謹按禮經英華作記云禮時為大又曰過時不通典會要有及字為禮也昔衛公叔文子卒將葬其子戍請諡於君曰日月有時將葬矣請通典會要有所以二字易其名者蓋時不可踰也節度既通典有卒字名不浮行數紀之間英華無間字前門生故吏已合謀諡今乃申請竊將有為而作節度嗣子英乂頃屬多故屢制方隅朝廷䇿勳位表端揆附從者竊不中之文粹脫之字禮會無妄之求況節度當開元之英華無之字初賵贈特加碑志竝建英華作踰等皆出恩命追悼之遇文粹作過亦巳當矣今又鹵莽外於典章追送往之闕遺啓將來之冒昧況今裂土者接畛專征者百輩若率而行之誰曰無請不唯有司疲於簡牘抑恐名器等於草芥雖欲曲全竊將不可又禮經云已孤暴貴不為父作諡若節度合諡而不以其時則嗣子廢先君之德若不合諡而苟遂其志則先君因嗣子而見尊以僕射而言之英華無之字恐貽越禮之議英華作讓以國家而言之英華無之字又殊旌善之體請下太常重議謹議博士獨孤及英華無五字議曰禮時為大順次之葬將二字文粹作將次葬按當作將葬易名時也有故文粹作古有非闕禮追遠請諡順也假如諸侯五月而葬魯惠公之薨也有宋師一本師下有太子少葬有闕六字至隱公元年十月而文粹作已改葬不以踰時英華有而字廢禮又公叔戍請諡適當葬前謹按禮經二字通典會要作三百禮經三千威儀曾不言已葬則不可追諡況帝王殊途不相沿襲會要作禮新禮會要作制則死必有諡不云日月有時今請易名者五家無非葬後苗太師一年矣呂諲四年矣盧奕五年矣顏杲吳本作真非卿八年矣竝荷褒寵無異同之論獨知運以其子不幸遂以過時見抑苟必以已葬未葬為節則八年與五十年其緩會要作後一也而與奪殊制無乃不可乎議云已孤暴貴不為父作諡此謂其父無位而子居大官英華作貴位不當以已通典作子之貴加榮於父也禮不云乎父為士子為大夫葬以士禮英華作耳若知運者處方面之寄通典會要作重位列九卿茂勳崇名與衛霍侔飾終之禮宜加於他將一等豈待因依嗣子然後作諡今之專征舊作政据英華改通典作征鎮者者字下通典會要有卒多起屠販皂隸之中九字雖逢風雲化為侯王其其字通典會要作而其閒有祖父爵位與知運齒者鮮矣通典會要作與知運等當請諡者有幾奈何通典作何乃懼名器等於草芥以是殺通典會要作廢禮竊謂近誣乾元以來纍有詔追贈百官祖父內外文武具寮之先悉蒙恩錫或音徽久沫或墓木巳拱受大名貴位於九原者以萬數未嘗以沒代遠近為限夫贈諡一也贈者一時之寵諡者不刊之令今以歲久而廢易名是王澤浹於天下而獨隔於一人也當開元二年吐蕃以舉國之師入五原塞擊柝之聲聞於咸英華作秦雍知運與郭虔瓘英華有等字討平之以張王室當時微知運則汧隴之西左袵是懼今朝廷方命將帥四字英華作方將命師以征不服討不庭宜褒寵文粹無寵字之以勸握兵者安可以葬久而廢大典況夫諡法者蓋考其言行事業之邪正必以字褒貶之使生者聞美諡而慕覩惡諡而懼不待賞罰而賢不肖皆勸是一字之諡賢於三千之刑本非為沒者之子孫以為哀榮寵贈之具假令知運無子且未嘗立勳苟位至上將則諡不可廢豈以其子之存亡為請諡之可否竊稽載籍徵諸舊章易名之禮請如前議謹議故江陵尹兼御史大夫呂諲諡議文粹故上有唐丞相三字呂諲任職從政聰敏肅給能以才智潤飾吏道至德中與三司同鞫大獄獨引律文附會經義而平反之當時卒用中典諲參其論在台司齪齪雖無匪躬之能然平章法度守而勿失其為荆州一年有成號令明具賦斂均一物有制而事有倫大抵以威信為主戮陳希昂按申太芝之姦而三楚之人悅服厥功茂焉自至德以來荷推轂受脤之寄處方面者數十輩而將不驕卒不墮政修人和如諲者蓋鮮文粹有矣字豈不以人散久矣而兵未戢本作戰据文粹改挹濁流者難俟淸整棼絲者難為功諲當此時能以慈惠易其疾苦且訓其三軍如臂使指闔境無拔葵噉棗之盜而楚人到於今猶歌詠之此其才略必有過人者雖欲文粹無欲字勿褒之其可乎按諡法威德克就曰肅禁暴威也愛人德也考禮議名而擬諸文粹有其字形容請諡曰肅謹議附嚴郢議度支員外郎嚴郢議曰伏以故相國江陵尹兼御史大夫贈吏部尚書呂公諲昔事先朝纍當大任至德之初天步艱難公首披荆棘文粹作榛扈蹕靈武忘軀進忠一日三接先朝察匪躬之節納沃心之議爰立作相弼諧神人其嘉謀嘉猷獻可替否之跡入則造辟出則詭辭溫樹不言難可得而知也至有爛焉明白欲蓋而彰者請區而載之乾元收復之際兩都衣冠多繫於三司詔獄御史中丞崔良器議事失入時宰相文粹脫相字苗太師崔趙公等雖廷諍之然未堅決公有犯無隱引經正辭上是其言刑為之省所全活者蓋數百人明主收雷文粹作霜電之威聖朝行寬大之典者繄公之力也古者進賢受上賞書不云乎咎繇曰都在知人公踐台衡專以推賢任人為務故相國房公琯故吏部尚書韋公陟入登左職皆公之由今相國黃門侍郎杜公之涖江陵也公薦在方面之任今相國中書侍郎元公之在度支也公咨以幕府之政曾未數歲而二相接武於上台天地交泰聖賢相得庶績咸熙五典克從者資公之舉善也則子皮之舉子産鮑叔之舉管仲蕭何之舉曹參武侯之舉蔣琬方之前人我有餘地其在荆南也戢兵和衆令行禁止理績為天下最雖古之羊杜無得而踰今太常議荆南之政詳矣而曰在台司齪齪無匪躬之能者乃抉瑕掩德之論非適中文粹作中適之言也國家故事宰臣之諡皆有二字以彰善旌德焉夫以呂公文能無害武能禁暴貞則幹事忠則利人盛烈宏規不可備舉傳敘八元之德曰忠肅恭懿若以美諡擬於形容請諡呂公曰忠肅謹議博士獨孤及議曰呂諲任宰相日淺當時會肅宗躬親萬幾庶政羣臣畏威奉職而巳雖有謨謀於巖廊之上莫由有知之者及文粹無及字其荆門之政為仁由已其略見於事其恩惠被於物其文粹無其字風謠存乎人故文粹有人字得而稱之議名之際敢不闕其所疑而録其尢著者有司之職也其閲實詔獄在未執政之前已文粹無已字議之詳矣敢辱再告至若推進名賢使當大任既同溫室之樹且行狀所不載孔子曰君子於其所不知蓋闕如也故不書今奉符令必用二字且以忠配肅謹按舊儀凡殁者之故吏得以行狀請諡於尚書省而考行定諡則有司存朝文粹無朝字非廷辨可否宜在衆議今駁議撰諡異同之說竝故吏專之伏恐亂庖人尸祝之分違公器不私之戒且非唐虞師錫僉曰之道昔周道衰孔子作春秋以繩當代而亂臣賊子懼諡法亦春秋之微旨也在懲惡勸善不在哀榮在議美惡不在字多文王伐崇周公殺三監誅淮夷晉重耳一戰而霸諸侯武功盛矣而皆諡曰文以冀缺之恪德臨事寧俞之忠於其國隨會之納諫不忘其師謀身不失其友其文德不優乎而竝諡曰武固知書法者必稱其大而略其細故言武不言文言文不言武文粹故下十字倒三代以下朴散禮壞乃有二字之諡二字諡非古也其源生於衰周施及戰國之君漢興蕭何張良霍去病霍光俱以文武大略佐漢文粹有時字致太平其事業不一謂一名不足以紀其善於是乎有文終文成景桓宣成之諡雖瀆禮甚矣然猶褒不失人唐興參用周漢之制謂魏徵以王道佐時近文直言極諫愛君而忘身近貞二德竝優廢一莫可故曰文貞公謂蕭瑀端直鯁亮近貞性多猜二近褊言褊則失其謇正稱貞則遺其吝狹非一言所能名故曰貞褊公其餘舉凡推類大抵準此皆有為為之也若跡無殊途事歸一貫則直以一字目之故杜如晦諡成封德彝諡明王圭諡懿陳叔達諡忠溫彥博諡恭岑文本諡憲常巨源諡昭唐休璟諡忠魏知古諡忠崔日用諡昭其流不可悉數此竝當時赫赫以功名居宰相位者諡不過一字不聞其子孫佐吏有以少稱屈者由此言之二字不必為褒一字不必為貶若褒貶果在字數則是堯舜禹湯文武成康不如周威烈王愼靚王也齊桓晉文不如趙武威文粹作武靈魏安釐秦莊襄楚考烈也杜如晦王圭以下或成或明或懿或憲不如蕭瑀之貞褊也歷考古訓及貞觀以來制度似皆不然今奉所議云國家故事宰相必以二字為文粹無為字諡未知出何品式請具示謹當以為按據若忠者臣事君之常道苟靖恭於位誰則非忠非有炳然之異則不以為諡至文粹無至字如議獄緩死任賢舉善德之美者然肅者威德克就之名足以表之矣月令曰孟秋天地始肅詩曰曷不肅雍及曰肅肅王命仲山甫將之肅嚴也敬也忠之屬也天地不肅則歲不成宗廟不肅則禮不立軍旅不肅則人不服肅之時義大矣哉以諲之從政也威能間邪德可濟衆故以肅易名而忠在其中矣亦猶隨會寧俞之不稱文豈必因而重之然後為美魏晉以來以賈詡之籌算賈逵之忠壯張既之政能程昱之智勇顧雍之密重王渾之器量本作重据文粹改劉惔之鑒裁庾翼之志略彼八君子者方之東平宜無慙德死之日竝諡曰肅當代不以為貶何嘗徵本作微据文粹改一字二字為之升降乎謹上稽前典下據甲令參之禮經而究其行事請依前諡曰肅謹議唐故尚書祠部員外郎贈陜西刺史裴公行狀曾祖仁基隋光祿大夫行左光祿大夫皇朝贈使持節都督原州諸軍事原州刺史諡曰忠祖行儉皇朝銀靑光祿大夫禮部尚書聞喜縣開國公贈太尉揚州大都督諡曰獻父光庭皇朝光祿大夫行侍中兼吏部尚書正平縣開國男英華作公非贈太師諡曰忠獻絳州聞喜縣崇慶英華作唐鄉太平里裴稹年若干行狀公天姿英拔德字宏曠顒昂公器磊砢高節武庫森戟玉山照人起家以門調補千牛僃身歷太子通事舍人太常寺主簿是時萬邦方乂獻公當國天子垂衣穆淸以有天下而衮職之闕疇咨之府公入則竭力出則匪躬外詢輿人以僃過庭之問陰薦多士用宏審官之選既而濟濟俊士英華作乂爛盈東閣邦之得賢於斯為盛畫一之詩作而嘉魚之頌興公之幹蠱也轉京兆府司録參軍輦轂之大綱轄之劇牒欣浩穰文墨填委公投刃餘地而大郤斯批若網英華作綱在條而衆目不紊談笑之隙簿領肅如論者知逸驥英華作倫之足方自此始開元十一年獻公捐館惸然在疚哀越乎禮會執事者醜正作福怙寵匿怨乃因喪乘釁將逞憾於我言之如簧上亦投杼公乃含恤進牘叫閽抗憤危言自明至誠旁感由是宗祏垂祉高天聽回恩方照微神英華作尋亦悔禍卒令臧孫有加等英華作葬之葬英華作禮公業有不忘之歎公之克家也服闋授起居郎載筆赤墀書法不隱開元二十四年三庶人以罪廢事出宫闈變生飛語時壽王以母寵子愛議者頗有奪宗之嫌道路憫默英華作然朝野疑懼公乃從容請聞慷慨獻諫上述新城之殷鑒下陳戾園之元龜謂興亡之由在廢立之地天子感悟改容以謝因詔以給事中授公公曰陛下絶招諫之路為日固久今臣一言而荷殊寵則言者衆矣何以錫之上善其敏而多其讓乃止不拜尋除尚書祠部員外郎恪居禮闈休問惟穆宏濟之略因英華作固為己任于是搢紳高議方以靑雲期公不弔昊天降此短歷開元二十九年某月日薨于英華有私字第春秋若干君子謂公貂蟬之葉瑚璉之器壽不及黃耉名不登明堂天其未亡狐趙之勳成宣之德也非昌其身必大於後果介繁祉有才子四人長曰倩尚書駕部員外郎兼殿中侍御史江西道租庸鹽鐵等使次曰警尚書司勳員外郎兼殿中侍御史參中軍元率雍王軍事次曰倚殿中侍御史試守萬年縣令季曰侑太原府榆次縣尉搆厦瓌材切玉利器價敵三虎族擬八王朝廷褒之方倚以成英華作戎務元年春建辰月肆大眚因命有司録勳追舊於是詔贈公諫議大夫猶以禮未超倫位不充德秋八月詔曰贈諫議大夫裴某操履貞純器能溫敏素推雅英華作令望嘗踐淸班志業屈於當時風猷悲於既往顧其允嗣久在周行雖禮及前修己英華作以申追遠而恩霑後命宜有贈榮俾高列嶽之班更表重泉之飾可贈使持節陜州刺史禮也公天機超邁雅有大略氣直而溫性擾而毅貞可英華作乃幹事善足救物外坦蕩豪舉朗然不羈內敦敏純固忠而能力至苦輕死重義貴身賤名視錢帛英華作刀如糞土戲公卿若草芥其於履危機英華作險臨大節則氣冠賁育徑侔風霜未嘗以得喪夷險蠆芥於胸臆詩云昭明有融高朗令終公實有焉謂宜荷天之休俾熾而大龍泉未試隙駟先往天乎斯才而有斯壽今寵優八命澤及九原一作泉己伸英華作沐追遠之恩請遵易名之典寶應二年某月日故吏某官某謹上英華作謹狀上尚書省考功夫存以行觀其志沒以諡表其德則名英華作賓實不虧善英華作美惡知勸謹按故尚書祠部員外郎贈使持節陜州刺史裴稹鼎鉉公族圭璋令名孝克負荷忠能匡諫宏圖方壯利涉未息舟壑遽遷音徽巳沫命官褒德合荷寵章英華作寵荷令章考行飾終敢徵前典謹上毗陵集卷第六終
