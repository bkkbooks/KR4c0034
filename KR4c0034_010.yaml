front:
  text: 毗陵集卷第十
  hash: sha256:213bbb1bc8dff095de057453a466f21f4ec4e1f14b91456076d8796df4acb37c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_010-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及靈表一首唐故朝散大夫潁川郡長史贈祕書監河南獨孤公靈表墓志上七首唐故潁川郡長史贈祕書監獨孤公第三子憕墓志唐故浙江東道節度掌書記越州剡縣主簿獨孤丕墓志唐故潁川郡長史贈祕書監獨孤公第六子萬墓志唐故亳州刺史鄭公故夫人河南獨孤氏墓版文前左驍衛兵曹參軍獨孤公故夫人韋氏墓志殤子韋八墓志唐故大理寺少卿兼侍御史河南獨孤府君墓志銘並序唐故朝散大夫潁川郡長史贈祕書監河南獨孤公靈表公諱某其先劉氏出自漢世祖光武皇帝之裔世祖生沛獻王輔輔生釐王定定生節王正正本作丏英華同誤據後漢書沛獻王傳改生長子廣嗣王位次英華作少子廙仕漢為洛陽令廙生穆穆生進伯為度遼將軍擊胸奴兵少援不至戰敗為單于所獲遷居獨孤山下生戶英華作尸是下同利單于加以谷蠡王之位號獨孤部戶利生烏和和生二子長曰去卑為右賢王建安中獻帝自長安東歸有李傕郭泛之亂右英華作左賢王率其部衛車駕還洛英華有陽字遂徙遷許復英華作後歸國卒次弟猛代立生嗣英華作富下同論嗣論生路孤路孤生眷眷生羅辰從魏文帝遷都洛陽遂為司州洛陽人始以其其字英華作獨孤部為氏用勳伐錫爵永安公位征東將軍定州刺史征東生萬齡官至廷尉諡曰貞廷尉生稽字延平善左右射學窮一作究金匱之奧魏世祖初從平滑臺以功授散騎常侍歷守冀定相三州時新定律令愼選廷尉徵公拜焉再世為法官俱以廉平不苛顯名當時榮之加鎮東將軍薨諡曰文鎮東生歸辨聰而才又為鎮東薨贈太尉太尉生冀字希顏以博學侍講東宮歷安南將軍定州刺史贈司徒司徒生永業以文武兼僃佐齊王入洛定鄴都督幽洛二州由行臺尚書令升司徒封臨川郡王語在齊史臨川王生忠孝大略不索隱𦣱四字英華作不探𦣱索隱屬詞止乎禮義不止英華作主詠性情而巳太極元年詔舉文可以經邦國者宣勞使源乾曜以公充賦時對策者數百人公與滎陽鄭少微特冠科首起家拜同州郃陽縣尉歲滿授好畤縣尉開元十四年元宗初登封泰山注意二千石令長以煦嫗下民授公益州溫江令公治縣如治家明不至察威不至猛去煩苛繳繞之政施德信刑禮以訓齊之溫江人飮公之化逋者復疲者悅善者勸英華有而字不善者知恥益州刺史張敬忠以狀聞詔授監察御史轉殿中侍御史會權臣惡直斥去不附已者貶公廬州長史明年惡直者罷位公稍移武功令未到官病免二十三年除寧州司馬二十八年遷潁川郡長史初公為御史嘗以直忤吏部侍郎李林甫至是林甫當國嘗欲騁憾於我而五府三署每有高選羣公皆昌言稱公全才且各以臧文竊位自引由是免咎然十年再遷位英華無位字不離郡佐或勸公卑其道可以取容於世公曰可卑非道也屈伸天也非人也人如豫何天寶元年加朝散大夫二年七月七日寢疾終於位春秋五十七位不尊壽不遐志不行善不報其英華作與直虛語守道者相弔以為痛是歲八月殯于郡東至德二年歲次癸酉按通鑑目録當作丁酉十月十有英華無有字四日權遷窆于洛陽龍門山西岡大歷四年五月十三英華作二日詔贈祕書監命卿之位錫于身後嗚呼哀哉夫人河南洛陽人也薛國長孫覽之元孫咸陽縣英華無縣字丞諱頓英華作頲府君之女左英華作右金吾將軍諱子哲府君之妹稟天元和生知孝慈含德之厚與坤體合執笄助祭四十餘載人莫見夫人喜怒之容躬歡英華作勤是順承動協英華作合禮經宗族以睦長幼以序無言無為化成於家公之加命服也夫人封封英華作雍邱縣君泛等既孤夫人棄采蘋之度修釋氏教受正觀法於長老英華作者比邱尼上方服勤一年得四念處三昧視去諸結猶棄涕唾至德二年隨子東征明年歲在甲戌七月二十四日終于會稽享壽六十有四八月某日權殯于雷門之南泛巨及正等遭天不弔無恃無怙英華作無怙無恃以世故坎壈不克遷祔者十一年矣欲報顧復天胡有極今年問宅兆于前都水使者張係係卜甘泉東伊水西甘泉鄉之原吉謹以歲次已酉秋七月壬午遷公夫人靈坐合英華有安字厝于此原猶懼陵谷世人四字英華作人世陵谷之不我期也故不敢不志抆血勒石以遺後嗣唐故潁川郡長史贈祕書監獨孤公第三子憕墓志唐天寶元年歲次壬午潁川郡長史府君第三子曰憕寢疾卒于潁川至德二載冬十月四日權窆於洛陽龍門西山大歷四年五月十二日詔追贈潁川府君祕書監是歲七月壬午遷宅兆于壽安甘泉鄉之原以君之喪葬於塋之左禮也君沈毅果斷聰敏好學弱歲專左氏春秋工於畫尤善音律圖書之奧靡不深究性倜儻達節不欲以細行竊名志氣方遠未仕不幸多病年才二十二而殁修短之經聖人罕論同塵顏冉茹恨何言嗚呼唐故浙江東道節度掌書記越州剡縣主簿獨孤丕墓志皇唐故潁川郡長史贈祕書監河南獨孤公遷宅兆于壽安縣甘泉鄉之原公第五子丕陪葬于塋之西序第三兄憕墳在右第六弟萬墳在左三穴齊列如平生侍立之序禮也丕字山甫少聰明有志操好學博古年十五能屬文祖述典謨實而不華有古人風彩至若探綜圖緯推步六甲昊天歷象太乙之奧悉究其趣尤好黃老道與􅎃藏榮衛之數奉之以為衛生之經每餌藥錬氣謂丹砂可學乾元二年從季父峻為御史中丞都督江東軍事盛選僚佐表為剡縣主簿軍書羽檄悉以咨訪觀其志氣遙遠沖然有騁長途致靑雲之勢不幸短命臥疾纍旬卒于會稽春秋才二十三位不過部從事其宏識明略真氣妙用藏於身而未形也世無得而稱之矣嗚呼哀哉是歲乾元三年歲次己亥秋九月也臨殁歎曰孝道以冀全真策名期于顯親未中道二志俱棄命也夫是月也殯于雷門之南先夫人壽宮之傍行巳十年反葬此宮無兒可以主祭悲孰甚焉故月而日之以僃朽壤灑淚紀德哀罔有極唐故潁川郡長史贈祕書監獨孤公第六子萬墓志萬潁川長史府君第六子性專靜內敏有幹局多才藝嗜學好古誦老聃莊周之書究其大略罹于多難未遑筮仕乾元三年夏六月與昆弟同侍板輿將如吳遇疾殁于楚州春秋二十九七月殯於廣陵山光南之西大歷四年五月詔贈潁川府君祕書監是歲七月壬午奉遷神座令祔于壽安縣甘泉鄉之原先是萬之喪至自廣陵是日陪葬于塋西隅禮也夫惟夭壽之數雖聖智所無奈何今尅石志美冀其名之悠久也唐故亳州刺史鄭公故夫人河南獨孤氏墓版文夫人河南洛陽人也其先劉氏出自沛獻王輔其裔孫因山命氏中復劉自獻王十九世至齊行臺尚書令永業始復為獨孤氏自臨川至潁川郡長史府君六葉明德道炳于世夫人潁川府君長女性聰略有志尚寬仁慈順加之以明柔而不惑儉必中禮歸鄭氏生二男二女而寡男始孩女未齓鞠而育之導之義方長男曰季華次曰子華既長皆敦閲詩禮被服文行時人稱夫人善誘善教乾元三年因洛陽再擾隨子北征永泰二年某月終于巨鹿郡享年若干嗚呼仁而宜壽慈儉宜福二者反是為善者惑焉初夫人少因有行思歸寧而不得晚值多故去邦族而無復由是終身有遠父母兄弟之痛焉臨終故謂二字吳本作顧其子葬我必於先夫人之壠季華等泣奉遺旨大歷三年歲在戊申以夫人之喪至自巨鹿冬十一月庚寅反葬洛陽龍門潁川府君塋兆之側夫人之志也及敢書伯姊之德銘諸墓石云前左驍衛兵曹參軍河南獨孤公故夫人京兆韋氏墓志夫人諱某字某楚王交傅孟裔孫唐許州司馬皎曾孫渭南英華有縣字主簿懿唐世系表及英華皆作憼之孫兖州金鄉縣尉商伯季女祕書省著作郎英華有偉字睦州刺史儹之妹其先自彭城郡徙京兆從丞相賢後九世至本州大中正穆始有東西眷之號二十三世至徵士敻居魏周二代出不降志處不隨英華作遁俗時人號為逍遙公夫人之七世祖也逍遙公生民部尚書建世系表作達安公世恭世系表作瓘字世恭建安生上大將軍宋州刺史仁祚表作仁祚乃仁基之子本脫祚字據表增仁基乃世恭之弟也將軍生給事中旅即英華有為字許州之禰也夫以四言之遺直一經之餘烈十徵之高風焯于古今英華作今古宜其秉哲垂懿百代不隕地之華望之崇與春秋之唐杜范氏漢晉之袁楊王謝侔其熾大矣哉二英華作三是十八葉之明德茂祉降衷于夫人故孝慈貞儉溫惠淑愼文敏好禮三者皆天機生知不待師訓而至廣德二年夏六月歸于我衣服飮食躬自菲薄夙夜戒敬致孝于荇菜接娣姒以謙馭幼賤以敬敦善勸義恕不知而矜不能喜怒未嘗見英華作形于容止也其德禮所化宗族以睦兒童知讓生一子四歲而夭大歷四年夏六月癸丑再孕不育乙卯殁于舒州春秋若干仁厚英華作人至而不福德僃而不壽是天不惠于我家也向使錫厥永年正家承筐宜爾子孫百祿英華作福是享非夫人曷歸啓手足之日長幼號咷外姻內姻英華作內外親姻親疏英華無二字皆行哭失聲也宜哉是歲九月甲申以輤裧裳帷遷于洛陽十一月丁酉英華作丁巳是安宅兆于舅姑先塋之西南隅恐時逝事遷景行不貽于後故刻石以志卒葬且謹而日之殤子韋八墓志殤子河南獨孤氏小字韋八以其弱而未名也故以字稱北齊司徒行臺尚書令臨川郡王七代孫左驍衛兵曹參軍公之元子祕書省著作郎京兆韋儹二字英華作偉之甥生有奇表溫明英華作朗聰秀賈訏于保姆傅婢之手嶷然異于凡童氣間體和取豫必時諸父諸姑英華作母每謂興我家者必此兒也賓客之至者看玉人不暇倘英華有蒙字假以壽命則成器致位未易度也不幸多病大歷六僕射洛州刺史永業府君五代孫國朝明威將軍文惠府君第二子越州都督浙江東道節度觀察處置使兼御史中丞左英華作右金吾大將軍峻府君之季弟也聰明仁恕專直寬信擾而毅溫而厲弱冠筮仕以藝即戎藏器安卑非其志也天寶十四年安祿山反朝廷以淮淝英華作服海沂三吳咽喉宜擇良佐以二藩鎮命府君為泗州長史無何換滁英華作徐非濠二州倅戎僃參吏職忠敏英華作毅肅給所蒞英華作屆繄賴御史中丞崔公昭之尹河南也盛選僚佐表府君為太常丞兼殿中侍御史營田判官使罷轉湖州別駕大歷五年崔公受詔持節牧宣歙擁旄浙英華作是東也拔崔公於羣吏英華有人字之中升為軍司馬推誠委政之兮猶晉得韓厥宋得子罕及中丞之開府辟掾府君為首既而府君之喪也中丞哭之慟贈賻賙給加于人一等由是稚子孀妻得奉喪而西三月而葬禮無違者賻布之餘足備祭器君子謂金吾之明哲貽厥兄弟宣州之交情見于死生知己之道斯其行者鮮矣及敢不以直詞書仲父之美于墓石其辭曰叔父懿德承家令儀惠迪哲兄踐修靡違移治于官發迹淮沂及佐皇華亦繡其衣天子命我再參軍機駱馬嘽嘽所從其誰顯允君子為諸侯師府君委質咨諏載馳式壯其猷耄未及之陰陽為寇子鵩洽英華作語期昔也陟岡哀哀永思今也反英華作還真匪公曷依伯兮叔兮今乎巳耐他年九原公誰與歸毗陵集卷第十終
