front:
  text: 毘陵集卷第二十
  hash: sha256:ddbdc56e1b17cc433c5852c95474cdab920d56ecd466dda5abbc1112a0e70141
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_020-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及祭文下祭吏部元郞中文祭壽州張使君文祭揚州韋大夫文爲楊右相祭西嶽文祭韋端公炎文祭賈尚書文祭相里造文祭滁州李庶子文祭博陵郡君文後序唐故常州刺史獨孤公毘陵集後序安定梁肅祭吏部元郞中文年月日禮部員外獨孤及謹以蔬飯壺酒敬祭於故吏部郞中元公之靈上士齊死生下士愛生惡死而惑之知生死若幻而不能忘情於其閒者我輩所不克免始者與公同弔死問生論議亦頗嘗及此豈謂言未絕口而公又長往昨日經過遽成疇昔何變化之速乃至於是視不及瞬言不及英華作容息嗚呼元君今已返於機夫彭祖殤子同歸於盡豈不知前後相哀達生者不爲歎公齒髮未老官途方半相視而笑冀前路各有所展豈圖閒闊數日而死生閒之竹林如故階塵未掃唯人琴兩亡影絕響滅湯湯淸弦豈可復聞承以令辰將赴塋闕痛天道之茫昩予豈無言而悲來從中遠英華作遂復抒意匪祭也永以爲別也尚饗祭壽州張使君文年月日舒州刺史獨孤及謹以淸酌嘉蔬柔毛之奠敬薦英華作祭于故尚書工部郞中壽州刺史兼侍御史張公之靈頃者剖符爲郡與公鄰邑祇役往復日以攜手嘗辱嘉惠愛我則深柰何故英華作此是別後盈魄未周相去無山川之閒纔聞嬰疾遽吿不幸古詩稱一息不相知今乃爾二字英華作而果爾耶別時高論精義在耳袖中尺書灑翰猶溼而形影驟滅了無還期雖欲效古賢謂悲哀爲怛化情莫可遏徒虛語耳惟公貞亮溫毅強學好古人皆窪而盈曲而全公獨以峭直英華作全眞接物雖悔恡不改其度人多求田問舍公獨以百家言爲寶藏書至八千卷而不止以斯道也施于有政故其德形於事業其仁浹於百姓楚人壽人如得陽春識者揣公壽與位偕今也溘焉英華作然而人何望嗚呼王事拘限會葬莫及思賢歎逝執紙涕零若久要之不敢忘也豈不顧饗於今日蘋藻之奠尚饗祭揚州韋大夫文年月日朝散大夫檢校尚書司封郞中英華作員外郞兼舒州刺史充本州團練守捉使賜紫金魚袋獨孤及謹以嘉蔬柔毛之奠敬祭於故揚州大都督府長史兼御史大夫淮南道節度觀察處置使韋公之靈王命九伯厎綏四方惟公剖符作藩維揚往歲斯民匪迪匪康自公戾止視之如傷飾吏以儒出言有章革剗煩苛載戢暴強將吏奉君英華作之若網在綱罔或作威以紊典常英華作章民斯輯睦政亦允臧和氣被物豐年降祥天之輔仁公宜熾昌奈何不淑景命遽央英華作殃百城悼心萬民何望及忝列城僃守封疆獲宥罪戾庇身餘英華作余光德宇所覆今也則亡偏思遺愛追蹈餘芳俛仰興懷望慕悽涼拘限所職路阻且長遙抒下情旨酒一觴尚饗爲楊右相祭英華作賽西嶽文維年月日司空英華有兼字右相楊國忠吏英華作禮部尚書同中書門下平章事韋見素等謹以少牢之奠敬祭於西嶽金天王英華無王字之神頃自獻歲達於三月畜極不雨屯膏未光元元其咨滌滌是懼國忠等是用虔奉􅐶慮英華作謨聿遵祀典謹遣鳴臯山人韋朝眞敢徼福于大神之靈精意纔申而休祐肸蠁宸衷遙達而瑞澤滂沛非神之幽贊叶于國英華有非字神之景命符於人則疇能降祥薦祉如此眞速故簠簋犧象英華作牲敬修享禮雖冥應無方非馨香所荅而神威如在庶明靈惟歆尚饗祭韋端公炎文維年月日司封郞中兼舒州刺史獨孤及前舒州司馬皇甫曾等謹以淸酌庶羞之奠敬祭于故侍御史舒州桐城縣丞韋公之靈昔公執法柱下某等接武英華作足周行嘗趨後塵飽聽公議某英華作及旣出守曾復播遷公亦負譴黜官二字英華作玷辱同官爲寮之好敢不知孝悌忠信強毅正直樂善惟恐不及嫉惡不去英華作盡不止分枉直於心識英華作職以澄淸爲已任形於造次發於自然謂必眉壽且鍾介福奈何強壯英華作仕之年大才先謝志業所趨未申萬一有生之涯溘然永已慈親羸老弱子未齓反葬無望委骸英華作體他山等爲歸眞艱痛太甚天不我弔哀有何極某等頃嘗以罇酒豆肉邀君同懽今之所獻猶前罇也但夙昔志氣比來話言遽悉冥寞無非夢想往旣不及來莫可英華作我非追猶持此奠英華作尊以抒永別英華有至苦二字夭閼之痛夫復何言尚饗祭賈尚書文維大歴七年四月二十一日朝散大夫檢校尚書司封郞中兼舒州刺史賜紫金魚袋獨孤及謹以淸酌庶羞之奠敬祭于故散騎常侍贈禮部尚書賈公六兄之靈嗚呼性命之源仲尼罕言頃者與兄存而不英華作勿論亦謂景福必鍾德門未虞昊天驟忍我欺所以分手容易前期日往書札祇嗟別離孰云別中死生閒之賈生謫去遭世不用以命問鵩千古猶痛兄逢盛時任適梁棟靑雲咫尺巨鱗始縱溘爾中止俄同大夢天下孤望非英華作年非遄已民之所望今也胡俟某守職拘限會葬英華作喪願乖白馬素車欲往無階寢門一號心酸骨悽容徽自此永不復見若魂魄無不之也豈不覩平生心於今日斗酒之奠乎尚饗祭相里造文年月日舒州刺史獨孤及謹以淸酌之奠敬祭于河南少尹贈禮部侍郞相里公之靈嗚呼往歲嘗與公度論死生變化豈不知身與萬物悉當歸無猶謂不惑於道者可以不奪其算豈圖論猶在耳目未及瞬而公度之身復爲異物益知觀化而怛自古皆妄而哀來從中妄豈易遣嗚呼公度有志有文量足韜世善可救物宰賜言語冉季政事古莫兩大繄公兼之伊昔密薦可否廷折凶佞京師童兒亦知公名其後江人杭人頌德不暇洛表耆老傒公而蘇秉公論者無賢不肖孰不謂公致君致身方自此始奈何吉未會也凶問隨之天下悼惜士友悽欷況某投分於策名之始竝命於剖符之列久要不忘平生實唯公度是望同心同病英華作心同病同我身子身也子與化往奈我心何名跡畱爲故英華作政事話英華作語言存乎耳目唯音形眇忽無前期可望每一念至哀塡胸臆往矣公度去我何之勿言一罇永無英華作難共持倘肯顧饗表公我思尚饗祭滁州李庶子文年月日常州刺史獨孤及謹以淸酌嘉蔬之奠敬祭于故右庶子滁州刺史揚州大都督府司馬兼侍御史隴西李長夫之靈嗚呼才與上壽幷者吾不得見之矣得見中壽者斯可矣嗚呼長夫曾未半之官不展才事不如志奄謝昭世溘歸黃泉雖欲茹哀哀可茹乎追惟長夫行茂神俊孝愛友睦諒直仁勇卓犖夸邁英明曠達英華作遠文武志略邦家必聞爲州治行居百城之最詩賦歌辭窮六義之美休聲喧於里巷佳句被於管弦珪璋令問中外注耳謂當入拜九卿出分四岳萬人所望一旦中止行路悼惜豈直同心者之心滄洲長挹之談玉溪獨往之興竟英華作競迫身世永孤願言英華作志願儻魂而有知當飮痛泉下往歲滁城之會俱未以少別爲慼英華作感臨岐道舊坎坎鼔我酒酣氣振言盡歡甚孰知此際以是永訣今萬事如昨英華有日字非書札猶新唯故人音容不可復見悲莫悲兮生別離況長往之別乎王事拘限莫出執紼巵酒豆肉後會無期彼蒼悠悠逝者何之長夫長夫魂兮來斯尚饗祭亡妻博陵郡君文維大歴八年二月十五日檢校司封郞中兼舒州刺史獨孤及謹以淸酌菜果之奠英華有敬字祭于故博陵郡君之靈嗚呼及顧惟鄙薄謬忝好合英華作合好采蘩助祭歲時未幾執手偕老昊天遽奪齊體苦晚遺跡太早猶未知壽域有涯短長已臻其極耶將及薄祜速舋宜爲淑明所弃耶屋壁挂存琴瑟響絕修法勸英華作勤義今將疇依日月有時龜筮吿協將涉英華作陟故路祔于先塋及爲印綬所拘不獲親自封樹豈虞此別死生閒之往歲方舟偕來今也單輤獨歸郊圻一英華作不非慟心骨可絕頃者萬事無非去塵變化茫茫往矣何道今也巵酒將抒永別尚饗後序唐故常州刺史獨孤公毘陵集後序安定梁肅大歷丁巳歲夏四月有唐文宗常州刺史獨孤公薨于位秋九月旣葬梁集無此五字英華有門下生集作客英華作士安定梁肅咨謀先達稽覽故志以公茂德映乎當世美化加乎百姓若發揚秀氣磅礴古訓則存英華作在乎斯文斯文之盛不可以莫之紀也於是綴其遺草三百篇爲二十卷以示後嗣且集作乃繫辭曰夫大者天道其次人文在昔聖王以之經緯百度臣下以之弼成五敎德文下衰則怨刺形于歌詠諷議彰乎史冊故道德仁義非文不明禮樂刑政非文不立文之興廢視世之治亂文之高下視才之厚薄唐興接前代澆漓英華作醨之後承文章顚墜之運王風下扇作者迭起英華作舊俗稍革不及百年文章英華作體反正其後時寖和溢而文亦隨之天寶中作者數人頗節之以禮集無其後至以禮二十三字英華有洎公爲之集作之爲於是集作則又操道德爲根本惣禮樂英華作經籍爲冠帶以易之精義詩之雅訓英華作興春秋之褒貶屬之於辭故其文寛而簡直而婉辯而不華博厚而高明論人無虛美比事爲實錄天下凜然復覩兩漢之遺風善乎中書舍人崔公祐甫之言也曰常州之文以立憲誡世褒賢遏惡爲用故議論最長其或列于碑頌流于歌詠峻于崧華浩如英華作浩於集作盛如江河若贊堯舜禹湯之命爲誥爲典爲謨爲訓人皆許之而不吾試論道之位宜而不陟誠集作哀哉公諱及字至之祕書監府君之中集作第四子道與之粹天授集作付之德聰明博達剛毅正直中行獨復動靜可則仁厚英華作孝弟積爲本行文藝成乎餘力凡集作其立言必忠孝大倫王霸大略權正大義古今大體其文中雖波騰雷動起復萬變而殊流會歸同致英華作志于道故於賦遠遊頌嘯臺見公之英華無之字放懷大觀超邁流俗於仙掌函谷二銘延陵論八陣圖記見公識探神化理英華作智合權道于議郊祀配天之禮呂諲盧奕之諡見公闡明典訓綜覈名實若夫述聖道以揚儒風則陳畱郡文宣王廟碑福州新學碑美紀英華無二字非成功以旌善人則張平原頌李常侍姚尚書嚴庶子韋給事韋穎叔墓志英華作銘鄭氏孝行記李雎陽楊懷州碑纂世德以貽後昆則先祕書監靈表陳黃老之義於是有對策文演釋氏之奥於是有鏡智禪師碑論文變損益於是有李遐叔集序稱物狀之美而暢其情性二句英華作稱物狀以怡情性於是有瑯琊溪述盧氏竹亭記抒久要於存殁之閒則祭賈尚書相里侍郞元員外英華作郞中李庶子文其餘紀物敘事一篇一詠皆足以追踪往烈裁正狂簡噫天其以述作之柄授夫子乎不然則吾黨安得遭遇乎斯文也初公視肅以友肅亦仰公猶師每申之以話言必先道德英華作德禮而後文學且曰後世雖有作者六籍其不可及巳荀孟朴而少文屈宋華而無根有以取正其賈生史遷班孟堅云爾吾子可以共學庶乎成名肅集作鄙承其言大發蒙惑集作用發吾覆今則巳矣知我者其誰哉遂銜涕爲序俾來者于是觀夫子之志若立身行道終始出處皆載易名之狀故不僃之集作於此篇吾子十字集作唯子可與共學當視斯文庶乎成名四字英華作當視庶子成名大繆毘陵集卷二十
