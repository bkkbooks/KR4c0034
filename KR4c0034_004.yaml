  text: 毗陵集卷第四
  hash: sha256:ddcc8403f984051282c2374ec55befdebcfb49a2df59d8549c269d2eaacea49a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0034_SBCK_004-1a}
body:
  text: 朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及表上代文武百官賀芝草表賀擒周智光表代宗永泰二年賀袁傪破賊表請降誕日置天興節表賀櫟陽縣醴泉表賀太陽當虧不虧表賀潞州芝草嘉禾表諫表為李給事讓起復尚書右丞兼御史大夫表六首為譙郡唐太守賀赦表為張濠州謝上表代文武百官賀芝草表英華無文武二字臣某英華某下有等字無臣等二字言臣等伏見開府儀同三司魚朝恩奏含暉院及白華亭院內竝芝草生者臣等謹披圖按牒五字英華作謹按圖牒竊考前志英華作典蓋王者以道蒞天下而德及庶物則有神木靈草英華作靈木神草儲祥英華作祉效異陛下賢聖恭儉慈仁愛人開闡學校尊教勸德將以五經根本庶政風化所浹人神以和和氣㫄感蒸而為瑞八字作和氣㫄達感蒸為瑞不然豈靈芝菌蠢異處同植不産他宇必於宸居曄曄九葩之蓋煌煌三秀之質蓋表陛下之欽明光宅以人文成化靈根碩茂萬葉無疆神應炳然天意如答臣等獲忝朝列幸覩禎祥臣無任嘉慶之至賀擒周智光表代宗永泰二年臣等言臣聞征而無戰王者之師也將而必誅春秋之義也臣伏見周智光傲佷頑虐昏迷猖狂英華作狡敢專生煞之威以慢王度崇飾姦慝之志自干天誅陛下謂罪在己躬視人如子永言式遏之義不得巳而用師而將才受鉞兵未血刃巳梟元惡之首載安舊汚之俗昔漢征黥布望陳英華作塵而憂殷伐鬼方積年乃克豈若陛下朝命將帥夕殲渠魁制勝神速從古未有臣等無任英華作不勝慶快之至懷玉桉此表文苑英華誤作獨孤受賀袁傪破賊表代宗寶應二年臣某等言臣等伏見河南副元帥行軍司馬太子右庶子兼御史中丞袁傪露布奏今年五月十七日破石埭城賊方淸並降烏石山賊陳㽵等徒黨二一作三萬五千五百人者臣聞聖人之生不能使大盜不起故唐虞之代時則有三苗之師姦宄草竊為患舊矣山賊方淸等蕞爾狂狡敢干天誅聚椎英華作輕剽之徒謂險遠可恃作為蛇豕以荐食句吳乃有跨據大江吞噬東土之計七州之地人罷耕織英華作物弊百姓業業全活無所陛下方鋭志於偃武不得巳而用兵英華作師乃命將受略使先勝後戰故傪等役不再舉而師英華作用有成績巢窟皆傾俾無遺類詿誤之輩得返故業汙俗更始流人汔康此三代之舉也非陛下齊聖格天文思柔遠豈能底綏盜亂如此其速臣等幸覩成功不勝大慶臣無任抃躍之至云云請降誕日置天興節表臣某等言臣聞天有春秋冬夏之氣時也時有分至啓閉之候節也至若寒食上巳端午重陽或因人崇尚亦播為風俗況歷運光啓聖人降生固宜紀載震之辰與八節同號故元宗生日命曰天長節肅宗生日命曰天平地成節竝以飮食宴樂布慶萬方使賜及同軌風流後代陛下纂祖宗純懿與天地同德禮樂克修憲章咸備而誕聖之日未有嘉名將何以表出震之期慶流虹之瑞率土延企思扇舊風是以臣等顒顒不勝大願願以十月十三日為天興節其王公士庶上壽作樂悉如開元乾元故事上以殷薦崇先天不違之德下以布澤錫萬代無疆之休使知社鳴河淸實在兹日臣無任賀櫟陽縣醴泉表臣等言伏見京兆尹李勉奏櫟陽縣有醴泉湧出飮之者痼疾皆愈臣聞王者澤周庶類則神降百祥天地之心去人不遠陛下厚德載物與坤同符以善利人如水潤下故后土獻瑞湧泉療疾靈源酌而不竭沈痼飮而皆痊勿藥之喜萬人是賴仰窺天意豈不以是彰陛下之德施乎不然何衆庶顒顒強名聖水彼丹井朱草白麟赤雁徒稱太平之瑞未聞功施於人方之聖泉豈喻神異臣等無任喜慶之至賀太陽當虧不虧表代宗大歷十三年臣某等言伏見今月一日雲物陰晦太陽當虧不虧者臣聞殷太戊宋景公皆修德立言而妖變為福陛下以日月薄蝕勞謙惕厲而災不勝德雲為垂陰若天降衷使其謫收英華收作故不見易象曰既憂之咎不長也臣等無任欣戴之至賀潞州芝草嘉禾表臣某等言臣伏見陳鄭澤潞隴右節度使奏潞州使院行軍司馬裴政㕔梁柱上生紫芝草七莖長子縣厚載鄉生嘉禾兩莖同一穗者臣聞靈芝嘉禾太平之瑞昔在周漢嘗表休徵當時福應疾如影響今庶政方乂而二瑞荐臻是天降殊祥用彰有德豈非陛下寶持慈儉輯柔遠邇克俾天下和平當如周漢之盛乎神祇景貺實甚昭晰彼唐叔之獻與齊房之歌明德所感古今同契臣無任諫表臣某言伏見陛下屢發德音招延獻納使左右侍臣得直言極諫忠謇者無不聽狂英華作犯訐者無不容又辛丑唐書作壬辰詔書詔裴冕崔渙等十有三人竝集賢殿待制以僃詢事考言之問此五帝之盛德也而臣以目睹生則幸矣然頃者陛下雖容其直而不録其言進匭上封者大抵皆事寢不報書留不下但有容諫之名竟無聽諫之實遂使諌者稍稍自引英華作省鉗口就列飽食倫安相招為祿仕此忠鯁之士所以竊歎而臣亦恥之十室之邑必有忠信如孔丘者況以朝廷之大卿大夫之衆而陛下選受之精與假令不能如文王之多士堯舜之比屋其中豈不有溫故知新可使懋陳政要而億則屢中者乎陛下唯虛存其儀令條奏不曠及議政之際曾不採其一說堯之疇咨禹之昌言豈若是耶昔堯設謗木於五達之衢孔子亦曰以能問於不能以多問於寡又曰丘也幸苟有過人必知之然則多聞闕疑不恥下問聖人之心也臣不勝大願願陛下試英華作誠以堯孔之心為心日降淸問啓其宏說英華有其字不可者罷之可者議之於朝與執事者共之英華有使字知之必言言之必行行之必恭則君臣無私論朝廷無私政英華作事天下無私是英華作政陛下以此辨可否於獻替而建太平之階可也況國體乎自師興不息十年矣萬英華作百姓之生産空於杼軸擁兵者第館亙街陌奴婢厭酒肉而貧人羸餓就役剝牀英華作刻剝及膚長安城中白晝椎剽京兆尹不敢而師友之黜棄貪佞不肖而竊位者下哀痛之英華無四字詔去天下所疾苦廢無用之官罷不急之費禁止暴兵節用愛人罔使宦官亂國政佞言敗厥度兢兢乾乾以徼福於上下必能使天諴感而神心應英華作天神感而地祇應反妖灾以為和英華作嘉氣彼太戊桑榖宋景熒惑焉足為陛下道哉臣一英華無一字昨陳奏請減江淮山南等諸道兵馬以贍國用陛下初不以臣言為愚妄許當施行然及今日未有沛然之詔臣竊遲之今天下唯朔方隴西有吐蕃僕固之虞邠涇鳳翔等兵足英華有以字當之矣自此而往東洎海南至番禺西盡巴蜀萬里無鼠竊之盜巳積歲矣而兵不為之解傾天下之貨竭天下之穀以給不用之軍英華作兵而為無竭英華作端之費臣不知其故假令居安思英華作慮危用唐書作以僃不虞自可於厄要英華作害之地少置屯禦餘悉休之以其糧儲屝屨之資充疲人貢賦歲可以減國賦之半陛下豈遲英華作持疑于改作逡巡于舊貫使大議有所壅而率土英華作兵卒之患日甚一日是益其弊而厚其疾也臣竊惑焉夫療癰者必決之使潰今兵之為患猶癰也不以漸戢之其害滋大大而圖之必力倍而功寡豈周易不俟終日之義與伏惟圖其始而要其終天下幸甚臣無任懇款之至為李給事讓起復尚書左丞兼御史大夫等二表草土臣某言臣昨以哀瘵愚懇昧死上陳冀回日月之光曲全英華作成螻蟻之志英華作命伏奉丁酉詔報未蒙矜允捧讀聖旨五情殞絶臣某中謝臣伏以適四方宣王命之任必擇職位素貴英華作高聞望炳著學能專對才有餘力者以充其選臣以宗室末屬妄荷寵命惟英華作推才與智俱不如人況今衰羸殘喘加以病苦支離沈瘵歷夏及秋終日不過一食不杖不能自起自料若力疾祗命適數千里雖欲自強必中道委頓璽書詔旨廢失是憂臣伏見廣德二年七月赦書罷天下起復之官許英華作俾終喪禮此陛下孝德過於兩漢英華作雨露然渙汗之發率土霑霈霈英華作濡豈獨令臣隔在赦外又尚書右丞會府之樞轄御史大夫天下之繩準英華作準繩宣慰巡檢英華作撫朝廷之大寄今臣授此三職而以起復為名因臣過舉破陛下法英華作德今使百寮師師何以取則臣夙遭不造僃生人之艱官始一命先臣棄背慈英華作養非母鞠育至於成立遭罹二京覆沒弱弟以宗室見害臣惸然茹痛獨侍板輿僃嘗險阻冀及榮養才擢掖垣慈顏違代罔極之痛終天莫追今靈筵未塵墳土尚溼遽令英華作命臣荷金印之寵處皇華之榮使繐帷廓然奠祭無主此恆情之所不忍也陛下其忍之乎伏乞以聖慈曲臨皇明下照矜臣尫英華作哀瘵察臣不逮更擇時彥授之使職許臣得以羸骸終其喪紀實天地之施鍾於臣身倘殘魂未英華作不滅朽英華作賤質可委誓當摩頂至踵以答聖造臣無任哀瘵懇迫之至敕卿朝廷雅望宗室良才爰自居喪頗聞過禮將宣國命允藉親賢舉其權道之文以申必行之旨載循來表具悉哀誠宜抑情而奉公佇銜恤以從政即宜斷表也第三表草土臣某言臣再以微誠伏闕英華作閣請命綸言纍降天聽未回仰戴聖情俯循哀感感吳本旁校作戚悲懼交迫悼心失圖臣某中謝臣才能不及中人且未嘗有毫髮勳效陛下不以臣不肖特降殊私授以驅馳之任賜以親賢之目臣且匍匐奉詔戮力將命寧敢矯禮為名以讓自飾顧臣羸瘵奄奄行步支離力有所不任用有所不逮風憲重任也宣撫大典也誠恐以疾墜王英華作天命隳使職負陛下所舉以重臣之罪方今濟濟多士盈於朝列陛下捨而勿英華作不用而拔臣於苫廬之中必以臣智識英華作守職為小有可採臣之他日猶不如人況今尫劣餘息方寸紊矣焉能為陛下震揚休命覽觀風俗竊自惟忖知不勝任是以拳然丹誠猶冀識察陛下仁聖孝德錫類海內豈令善貸不霑臣身敢希英華作冀殊造俯遂微懇則死之日生之年也臣無任哀懼之至第四表臣某言一昨臣以哀瘵叨奉恩私封章三上不蒙矜允猥以羸薾之質謬銜出疆之命賴陛下威靈免貽咎責復得待罪朝闕英華作廷許英華作拜守几筵仰荷天慈英華作恩俯慙靈祐臣某中謝頃陛下不以臣駑蹇特加寵渥者豈非知臣屬忝宗盟曾奉使河朔謂能闡揚天旨懷柔遠方而尚書省材賢如林庶政必舉陛下垂拱羣臣守職固不假臣以區區之力重尸省闈明矣今將命既復本職未解敢恃皇眷輒復陳乞臣煢然在疚獨無兄弟荼毒日淺創巨痛甚且又疾疹英華作病四體支離重寄榮遇人之所欲力有不任名英華作豈敢虛受此臣所由拳拳不巳有望於陛下也臣伏以三年之喪未足申罔極之恩先王制禮以節人情臣在喪未踰英華作及一年奉使巳歷三月若又假國家名器食陛下祿俸是臣亡母於臣有終身之愛而臣於亡母無數月之報先聖以孝感為號陛下以孝德格天錫類之恩宜及海內今寵命一降使臣有不孝之目子而不孝如臣英華作臣亦不忠不孝不忠人所當棄豈足為陛下操持綱轄彌綸憲章臣之頑固猶知不可況天下僉論朝廷公英華作輿議乎伏願許臣免官遂臣私志倘終喪紀尚有餘息誓當摩頂粉骨以答殊恩臣無任第五表臣某言臣去冬十一月某日又詣銀臺門下上表陳情英華作乞至今積旬未奉恩旨屏營無地哀惶疚心臣某中謝臣蕞爾朽質叨奉明恩違天固辭豈不知罪實由恃陛下蒸蒸之德故敢守臣子區區之意伏以忠孝之道禮生於情資親事君愛敬同等臣生處聖代齒力未衰致身日長效節途遠獨慈親違棄永往莫追先王制禮居喪之紀有限昊天不弔欲報之德罔極而今茹痛緘哀冒英華作恃寵干責雖欲僶俯從事使臣何以為心蓋三年之喪金革無避自魯公伯禽晉襄公始也實以徐戎秦師之役有為為之非是則否故孔子對子夏問曰以三年之喪從利者吾不知也今朝廷無徐秦之難臣非金革之任竊陛下名器是從利於喪也食稻錦衣之責捨臣誰歸凡曲全萬物使不失性英華作情天地之仁也鞠育嫗煦知寒熱疾痛父母之慈也兼英華有仁慈二字而有之明君之惠也臣是以又持悃款昧死上言竊希天父之恩不奪臣子之志泣血待命惟陛下省察臣無任第六表臣頃頓首昧死詣闕纍陳情狀肝膽悉以披露懇誠冀蒙識察於今浹辰德音不下實由臣詞淺意陋無以動天哀懼英華作惶失圖局蹐無地臣某中謝臣雖親忝葭莩才實駑鈍位忽過量英華作重恩亦加等宜竭筋力仰酬造化豈敢飾讓自言企禮顧望嘗聞上有至仁之君則下無失性之人英華作臣陛下以蒸蒸聖德格於上下故哀哀孝思敢辭榮祿英華作寵榮陛下豈忍抑其微誠假令臣損情變禮陳力就列亦猶雙鳬乘雁何補江海況敢貪不次之寵遺罔極之報因喪從利以哀為榮此臣所以屢黷天威望回宸英華作卑聽懇至之願形於纍表拳然待命惟聖慈察之臣無任第七謝免起復表臣某言伏奉某月日批敕矜臣荒謬英華作涼之情許以殘喘終喪使奉几筵獲展哀報陛下誕敷五教惇敘九族以臣屬忝枝葉哀纏蓼莪故恤以皇慈使及於禮天地之意曲全人欲日月回照下及苫廬伏讀詔書感懼交集仰戴聖造若蚊負山屏營瞻奉惶懼隕越臣無任哀戴之至為譙郡唐太守賀赦表臣某言伏奉二月五日制書大赦天下喜氣動天榮光被物百英華作鬼神踊躍衆庶悅豫臣某中謝臣聞大英華作天道所寶莫先於慈聖人之德無以加孝陛下執大象以御物不得已而用兵假一戎之威為萬物戡難再造區宇以匡英華作康黎元慈之至也纂服配天不失舊物然後增鴻名以嚴父正榮號以恭已元元本本尊尊親親孝之大也猶慮物有不遂其性政有不阜於俗宏肆眚之恩與天下更始滌瑕蕩穢燭幽及微風行物表鏡照海內雷作而萬戶蟄振網開而三面鳥飛陽春無私品物何毗陵集卷第四終
