body:
  text: 毗陵集卷第十九朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤及祭文上弔道殣文並序禜土龍文祭纛文祭岏山文祭吳塘神文為吏部李侍郎祭李中丞文為元相祭嚴尚書文為楊右丞祭李相公文為吏部楊侍郎祭李常侍文為明州獨孤使君祭員郎中文祭衢州李司士文為華州李太守祭裴尚書文弔道殣文並序辛丑歲大旱三吳飢甚人相食明年大疫死者十七八城郭邑居為之空虛而存者無食四字從英華增亡英華作殁者無棺英華作柩殯悲哀之送大抵雖其父母妻子亦啖其肉而棄其骸英華作體於田野由是道路積骨相支撑枕藉者彌二千里春秋巳來不書或謂縣官處師旅飢饉之弊宜禳災于未然既將英華無將字不時賑恤又苦之英華無之字以杼軸故及是及以為不然當陽九之厄陰陽英華有俱字錯而災沴降天也非人也於是延陵包佶作道殣文蓋小雅雲漢之流英華有也字及亦斐然英華作裴回獻弔且告之運命云八風不和六氣不均上天疾威大厲薦臻俾災流行殄殲斯人此當作北自淮沂達於海隅札瘥夭昏亦既毒痡匪蹈密網匪罹萑蒲飢饉降喪淪胥以鋪人生寄世孰非遠客嗟爾賦命天年逼迫生不糊其口死不掩其骼曠野茫茫僵尸纍纍髑髏崢嶸如堆如坁里閭無煙雞犬去之死非爾所鬼其餒而水陷英華作滔歷陽貴賤同之英華作傾秦坑趙卒內填長平實天不傭謂禍莫京爾復胡為無辜命並將英華有天字夭閼之則如勿生司殺之網英華作柄是孰云孔明伊昔太古上元同之世英華無世字非與下弟字韻不可天無鞠凶物無疵厲英華作癘疵父不喪子兄不哭弟亦有華胥民壽千年陰陽常和玉燭常然彼何人斯而生斯時聖人既興大盜亦隨外戶反閉賢愚相欺我先王乃作五兵固不得巳而用之堯舜既殁揖讓不傳黃鉞白旄謂之應天德乃下衰干戈相連陽九祅興災纏凶年鳥皆夜鳴英華作啼人失其全食盡力疲守死道邊不自豫英華作爾後不自爾英華作我先萬世一時運有固然帝在法宮淸問下民靑旗鸞輅時令惟新叶風和布天下皆春爾往莫及委骸窮塵命不可問嗚呼蒼旻禜土龍文陽驕陰伏女魃作孽孟夏不雨至於是月后土將乾百谷恐竭天道下濟龍德正中宜甘其雨亦祥其風曰歲與時俾和而豐胡然屯膏英華作胡屯其膏物乃殄瘁民用艱食神將乏祀豈天不仁豈龍不智盍本誤蓋據英華改正直以自輔憫雲漢於下土詔列缺使舉火命商羊以鼓舞暡兮為雲霖英華作霈兮為雨滲我王土而毛之取我黍稷而膏之俾爾稼如茨俾爾穗如坻實廩實藏為盛為粢無貽龍羞俾神我欺尚饗祭纛文年月日都統江淮之南節度觀察處置等使戶部尚書李峘謹以少牢之奠敬祭于六纛之神天地不仁神明無親惟德英華作正是與若響之答敢有象恭英華作龔滔天構釁稱亂國有明罰神其捨諸賊臣劉展假寵多難敢包狼心竊發蠆毒將敷虐於我上下神祇使東溟揚波羣動昏墊皇帝震怒俾剿亂略英華作按劍授鉞命我上將砥天之伐於是虎牙鷹揚之臣蛇矛犀渠之羣橫行而東我伐用張月弧英華作羽雲旗已英華作以先啓行方將歷潯陽下南陵收京口掃建業斫梟獍以釁鼓封鯨鯢為文粹作于京觀俾萬里浪破三象霧廓今以令月吉日整駕即路是用徼福于爾有神惟神降衷尚弼豫志敢告無靡旗無絓驂無汰輈無僨車命五將護野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不率俾莫我敢遏為神祇羞尚饗祭岏山文英華作祭皖山神祈雨文年月日朝散大夫檢校司封郎中兼舒州刺史充當州團練守捉使賜紫獨孤及奉敕以淸酌之奠敢昭告於岏英華作皖山神之靈頃緣亢陽不雨粢盛將敗敢以人欲乞靈於神謂必肸蠁遄賜英華作錫介福俄以浹日未蒙降衷潤礎不徵觸石無望稼穡盡瘁澗溪將竭豈有悔怒將為毒痛不然何癲我以旱使滌滌至此今元元怨咨皇帝旰食下罪已之詔崇羣神之祀將以敬恭之懇邀福于英華無于字明神神其沛然回慮驟降以雨使枯苗復生飢者得食上以應聖主乾乾之心下以副萬人顒顒之望是人性命與神存亡敢不以太牢少牢剛鬛翰音之薦以為明祀以報純嘏若猶陽固陰蓄蘊沖六字英華作固陰蘊蓄沖沖非不如原文如初神則不明人將何賴亦當撤惟馨英華作馨香之奠寢嚴禋之儀祭禮興廢在此一雨敢因陳告庶無神羞尚饗祭吳塘神英華有祈雨二字文年月日朝散大夫檢校司封郎中兼舒州刺史獨孤及謹以淸酌之奠敢昭告於吳塘神之靈五字英華作吳塘之神山作靈鎮神實司之人作神主及實尸之神非人罔以薦馨香人非神罔以降福祥馨香不薦伊人之尢福祥不降亦神之羞及剖符為邦今二年矣制節謹度不敢怠遑庶無英華作逃罪悔以奉禋祀祀未豐潔政或頗纇實及之責英華作守實及責非人之愆惟神祐之俾大有年今盛夏旱蒸五稼將枯田畯訴號靡知其辜神明豈不降鑒下土油然為雲沛然作英華作為雨使萬人歡康百穀阜滋灑我公田遂及我私我京我庾維萬維億豈伊人粒神亦血食衆心顒顒非歲曷望望之濟否惟神所相尚饗為吏部李侍郎祭李中丞文某年月日某官某乙謹以淸酌少牢之奠敬祭于故蘇州刺史兼御史中丞贈吏部侍郎李公之靈嗚呼天以純粹鍾美於公孝友慈惠公廉貞直事君以忠臨節有勇可以師表鄉黨儀刑搢紳宜荷百祿乃朋三壽孰司物化曾莫輔德諸公英華作父不死公獨返真官不過八命年未踰六十豈五藥乖養九藏失節以及此乎將修短之域窮達之數止於是乎前期幽報如所修乎俯觀生前亦有恨乎昔公出入臺閣勤勞王事馳驅使車周旋天下克已奉職一何正也姑蘇之役姦幸構難公秉義勇誅其渠魁每寇圍逼勾吳震駭公率羸師克翦大敵奇謀生於死地貞節見於孤城夫豈惡生誓無奪志臨危致命一何壯也濯纓來朝祗若王命三府高議方以黃散咨公天乎無知不從人欲旅櫬委於空館妻孥恨於遠道其來也駟馬朱轓其往也孤轊丹旐天子興悼台臣雪英華作雨泣情鍾我輩哀英華作其可既乎某乙等英華作綰等非義惟寮友季卿等屬忝宗族歡愛如昨書札猶新伸睂未幾英華作久交臂忽英華作或失形骸留此魂魄何之鳴琴潺湲恍若在耳前路冥寞良遊無期靈之來兮歆此薄酹英華作酌尚饗為元相祭嚴尚書文年月日某官某乙謹以淸酌少牢之奠敬祭于黃門侍郎兼吏部尚書御史大夫嚴公之靈嗚呼天惟匪忱英華作難諶才不必壽冉耕斯疾顏回短命吉凶兆英華作無眹凡聖共惑惟公茂質見於芳年菌蠢九葩磊砢英華作落千丈頃嘗戮力當代以智開物若發硎之刃決雲切泥英華作玉長安浩穰憲網疏漏天子命公尹京執法能秉直道以張皇綱以智至皇綱三十七字英華止作以智開庶物以道張皇綱盜奔訟淸周月報政巴蜀亟擾上為旰食公之英華作自公攸徂亂亦英華作亦既遄已昆夷授首邛僰飮化乃加英華作及位冢卿為天喉舌謂當任極台鉉壽如岡陵靑雲可攀白日忽暮嗟來桑扈溘與化往孰云夫君而有斯命藂蘭英華作芳叢春敗大壑夜失非君興哀吾誰為慟昔公先中書以道消讒勝不踐衮職公復算屈短歷卒無相印蒼生孤望前後同悲曩子論交於豫投分形接意敵聲應事感懼涉世故纍荷寵榮豫忝台司公亦亞相大駕東狩獲陪英華作卒屬車各負羈絏同扞英華作又同牧圉誠節見於多難交態彰於困蒙願言悉心共奬王室鎮蜀之役英華作後南北頗限猶易前期未嗟少別別未艾也死生間之夙昔歡愛今反為悲真宰何人壽夭誰司善而無報天豈豫欺憶昨攸往火旗電輺今也來斯白馬龍當作輀鯉書遂絶雞黍無期惜無寶劍挂君松枝旨酒一壺幽明此辭尚饗為楊右丞祭李相公文年月日尚書左丞楊綰吏部侍郎李季卿吏部侍郎王延昌刑部侍郎魏少遊工部侍郎徐浩謹以淸酌少牢之奠敬祭於故相國李公之靈嗚呼宗祏儲祉降神生公稟天純懿為國柱石負荷大業儀刑本枝九居專英華作邊城六處八座五領憲府兩登台司唯公廉忠信是務惟寬厚淸靜是守危言獻可未嘗脂韋取容直躬而行不為權幸改操三巳無慍一麾乃出其茂勳崇名遺芳餘事輝映䇿牘標準搢紳所蒞之邦於今頌美若鄭人之思子産周人之歌邵伯謂公福如山阜壽登期頤為天子元老以弼成庶政溘與化往嗚呼曷歸何萬人之具瞻與天命之相違窺遺塵於臺閣想見公之容徽嗟道申而壽屈英華作短痛迹是而人非綰等恭承嘉惠昔嘗登門接後堂之歡娛參東閣之討論謔浪在耳書札是存奈何少別忽間九原英華作泉尚饗為吏部楊侍郎祭李常侍文年月日某官某乙謹以淸酌英華有少牢二字之奠敬祭於故右散騎常侍贈禮部尚書李公之靈嗚呼沖粹英華作和之氣生德於公忠孝貞諒聰明宏達卓犖特立英明虛受自司翰持衡觀風執法周旋三閣出入十載能直其道而正其身致命臨節仁而有勇造次顚沛義形於色莊敬發于談笑孝謹扇乎英華作于閨門若天祚明德神與正直公宜錫慶鍾壽俾大而昌于何官不至三事年不及六十積德無報為仁者惑焉今行及先遠將安宅兆嗟來桑扈往無返期追思平生夙背歡好懇款交臂之分殷勤英華作勤拳同心之言今則冥寞無非夢想非夫人之為慟吾英華作而誰為慟不知神之所在彼乎此乎旨酒一樽庶以為別英華作以為別乎尚饗為明州獨孤使君祭員郎中文年月日某官某乙謹以觴豆之奠敬祭於故某部郎中兼某州刺史員公之靈吳越愆歲元元艱食帝咨四嶽分命於公克勤於邦克儉於家忠而能力剛亦不吐出入臺閣將十五載動合律度言為程式及兹剖符銜疾受命而慨然有表正東夏澄淸江湖之心海隅蒼生方望英華作仰公以大庇朝廷搢紳期公以上台而悠悠蒼天屈公以下壽時既須英華作得而命不與智未窮而生有涯嗚呼哀哉昔公繡衣持斧豫忝接武於朝公負譴投荒豫亦左衽異域山川有間交情無極各隨流波英華作波流在天一方險阻艱難亦既僃嘗邂逅相遇荆蠻之鄉惠而好我何日能忘浙右巨鎮甬東孤城風煙相接英華作接壤弔伐同盟未及前驅莫申微誠遽聞沈疴英華作痼忽間死生九原誰歸萬事長往夙昔惟愛無非夢想舟逝壑走吾將安仰隻雞之薦靈兮歆英華作來饗祭衢州李司士文年月日前華陰縣尉獨孤及謹以淸酌庶羞之奠敬祭於衢州司士參軍李君之靈惟君砥節礪行抱粹含純剛亦不吐直而能溫筮仕誠立安卑道存宜錫難老亦高其門奈英華作如何盛德迫此短辰追惟夙昔修好於君託以良援申之昏姻勸我以義敦我以仁各徇薄宦俱期致身頃復離別幾為胡秦契闊乖阻艱難苦辛君限靡盬陳力甌閩豫集荼英華作于蓼零丁海濱弔恤何深舊好殷勤贈言如昨尺素猶新倏忽長往吾誰與親常日音徽平生懿文今則已矣長為古人憐君不知哭君不聞瀝酒墳草灑淚隴雲庶因薄奠髣佛精神尚饗為華陰李太守祭裴尚書文年月日華陰郡守李某謹以淸酌庶羞英華作少牢之奠敬祭於故禮部尚書英華有河東二字裴公之靈嗚呼元精純粹生德于公峻極降祉貞明在躬濯纓登朝事君以忠出入三閣周旋兩宮褰帷井陘推轂盧龍喉舌是寄淑英華作令問斯崇鯤背垂天鴻毛順風亦既左官時更困蒙夷險能齊英華作一高明有融三巳無慍再命滋恭肇受方伯俄升秩宗將陳謨謀以佐時雍如何不弔降此鞠凶珠履聲絶蒼生望窮機返太素勳留景鐘英華作區中杳杳龍轜瞻言徂東敬飾薄奠邀神昊穹靈顧來饗髣佛音英華作聲容嗚呼哀哉尚饗毗陵集卷第十九
